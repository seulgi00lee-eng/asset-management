// ── 건물 선택
function selectBldg(id) {
  inpState.building = id;
  document.querySelectorAll('.bldg-pick').forEach(el => el.classList.remove('selected'));
  document.getElementById('bpick_' + id).classList.add('selected');

  // 관코드 버튼 갱신
  const campuses = INP_CAMPUSES[id] || [];
  inpState.campuses = [];
  const btns = document.getElementById('campus_btns');
  if (btns) {
    btns.innerHTML = campuses.map(c => `
      <button class="campus-pick-btn" id="cpick_${c}" onclick="toggleCampus('${c}')">
        <span style="width:10px;height:10px;border-radius:50%;background:${INP_BG[c]};display:inline-block;border:2px solid ${INP_FC[c]}"></span>
        ${c}
      </button>`).join('') ||
      `<span style="color:var(--text-sub);font-size:13px">데이터 미등록 건물입니다</span>`;
  }
}

// ── 관코드 다중선택 토글
function toggleCampus(c) {
  const idx = inpState.campuses.indexOf(c);
  if (idx >= 0) inpState.campuses.splice(idx, 1);
  else inpState.campuses.push(c);
  // UI 업데이트
  document.querySelectorAll('.campus-pick-btn').forEach(btn => btn.classList.remove('selected'));
  inpState.campuses.forEach(sel => {
    const btn = document.getElementById('cpick_' + sel);
    if (btn) btn.classList.add('selected');
  });
  const label = document.getElementById('campus_sel_label');
  if (label) label.textContent = inpState.campuses.length
    ? '선택된 관: ' + inpState.campuses.join(', ')
    : '선택된 관: 없음';
}
// ── 구 단일선택 호환
function selectCampus(c) { toggleCampus(c); }

// ── 전월 레이블 업데이트
function updatePrevMonthLabel() {
  const [y, m] = inpState.month.split('-').map(Number);
  const pm = m === 1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
  inpState.prevMonth = pm;
  const el = document.getElementById('prev_month_label');
  if (el) el.textContent = pm;
}

// ── 전월 데이터 불러오기 → STEP2 이동
function loadPrevAndGo() {
  if (inpState.campuses.length === 0) {
    alert('관코드를 하나 이상 선택해주세요.'); return;
  }
  // 전월 heatmap에서 해당 캠퍼스 관련 셀만 추출
  const b = BUILDINGS[inpState.building];
  inpState.cells = {};
  inpState.loadedFromPrev = true;

  // 임차A 기준 우선: 7일 모두 동일 관이면 A형, 요일별 다르면 B형, 같은 요일 내 시간분할이면 MIX
  Object.entries(b.heatmap).forEach(([room, pat]) => {
    const vals = DAYS.map(d => pat[d] || '');
    const nonEmpty = vals.filter(v => v && v !== '-');
    if (nonEmpty.length === 0) return;

    // A형 판단: 7일 모두 동일 단독 관
    const allSame = nonEmpty.every(v => v === nonEmpty[0] && !v.includes('/') && v !== 'MIX');
    const isMyA = allSame && inpState.campuses.includes(nonEmpty[0]);

    DAYS.forEach(day => {
      const val = pat[day] || '';
      if (!val || val === '-') return;
      const key = room + '__' + day;
      const isMix = val.includes('/') || val === 'MIX';

      if (isMyA) {
        // A형: 전용 호실 → 단독 표시
        inpState.cells[key] = { campus: nonEmpty[0], isMix: false, times: [], fromPrev: true, typeA: true };
      } else if (isMix) {
        // MIX: 시간 정보는 비워두고 팝업으로 입력하도록 안내
        const calcRows = b.calcRows.filter(r => String(r.room) === String(room));
        const times = calcRows
          .filter(r => inpState.campuses.includes(r.campus) || true)
          .map(r => ({ campus: r.campus, start: '09:00', end: '14:00', mins: 300 }));
        inpState.cells[key] = { campus:'MIX', isMix:true, times, fromPrev:true, needsTimeEdit:true };
      } else if (inpState.campuses.some(c => val === c)) {
        // B형 단독: 이 관이 쓰는 요일
        inpState.cells[key] = { campus: val, isMix: false, times: [], fromPrev: true };
      } else {
        // 다른 관 셀도 수정 가능하게 표시
        inpState.cells[key] = { campus: val, isMix: false, times: [], fromPrev: true };
      }
    });
  });

  goStep(2);
  buildInputTimetable();

  // 안내 토스트
  const cnt = Object.values(inpState.cells).length;
  showToast(`전월(${inpState.prevMonth}) 데이터 불러옴 · ${cnt}개 셀 반영됨. 변경 셀만 수정하세요.`);
}

// ── 토스트 알림
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#27500a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
}

// ── 캠퍼스 목록 (건물별)
const INP_CAMPUSES = {
  b7: ['테디','영재','중사'],
};
const INP_COLORS = {
  '테디':'c-tedi', '영재':'c-youngjae', '중사':'c-jungsa',
};
const INP_BG = {
  '테디':'rgba(217,72,15,.13)', '영재':'rgba(47,158,68,.13)', '중사':'rgba(24,100,171,.13)',
  'MIX':'rgba(112,72,232,.13)',
};
const INP_FC = {
  '테디':'#6b3410', '영재':'#27500a', '중사':'#27500a', 'MIX':'#27500a',
};

let _mixTarget = null; // { room, day }

function buildInputTimetable() {
  const b = BUILDINGS[inpState.building];
  const rooms = [...new Set(b.calcRows.map(r => String(r.room)))];
  const campuses = INP_CAMPUSES[inpState.building] || [];

  const modeBadge = document.getElementById('inp_mode_badge');
  if (modeBadge) modeBadge.textContent = inpState.loadedFromPrev ? '전월 불러옴 · 수정 모드' : '신규 입력';
  const bldgBadge = document.getElementById('inp_bldg_badge');
  if (bldgBadge) bldgBadge.textContent = b.name;
  const monthBadge = document.getElementById('inp_month_badge');
  if (monthBadge) monthBadge.textContent = inpState.month;

  const legend = document.getElementById('inp_legend');
  if (legend) {
    legend.innerHTML = campuses.map(c =>
      `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:${INP_BG[c]};color:${INP_FC[c]};font-size:11px;font-weight:700">${c}</span>`
    ).join('') +
    `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:${INP_BG['MIX']};color:${INP_FC['MIX']};font-size:11px;font-weight:700">MIX</span>` +
    (inpState.loadedFromPrev
      ? `<span style="padding:3px 10px;border-radius:20px;background:#fff3cd;border:1px solid #c9a227;font-size:11px;font-weight:700;color:#7a5c12">수정됨</span><span style="font-size:11px;color:var(--text-sub)">· 좌클릭 변경 | 우클릭 전월값 복원</span>`
      : `<span style="font-size:11px;color:var(--text-sub)">· 좌클릭 관코드 순환 | 우클릭 초기화</span>`);
  }

  let html = `<table class="tt-inp"><thead><tr>
    <th style="min-width:90px">호실</th>
    ${DAYS.map(d=>`<th style="min-width:100px">${DAY_KR[d]}</th>`).join('')}
  </tr></thead><tbody>`;

  rooms.forEach(room => {
    html += `<tr><td class="room-label">${room}</td>`;
    DAYS.forEach(day => {
      const key = room + '__' + day;
      const saved = inpState.cells[key];
      const isModified = saved && saved.modified;
      let bg = 'var(--surface2)', fc = 'var(--text-sub)', label = '+', extraStyle = '';

      if (saved) {
        if (saved.isMix) {
          bg = INP_BG['MIX']; fc = INP_FC['MIX'];
          if (saved.needsTimeEdit) {
            label = `<div style="font-size:10px;font-weight:700;color:#7a5c12">△ 시간 입력 필요</div>`;
            extraStyle = 'outline:2px solid #c9a227;outline-offset:-2px;';
          } else {
            label = saved.times.map(t => `<div style="font-size:10px;font-weight:700">${t.campus}</div><div style="font-size:9px">${t.start}~${t.end}</div>`).join('');
          }
        } else {
          bg = INP_BG[saved.campus] || 'var(--surface2)';
          fc = INP_FC[saved.campus] || 'var(--text-sub)';
          label = saved.campus;
        }
        if (isModified) extraStyle = 'outline:2px solid #c9a227;outline-offset:-2px;';
      }

      const ctxHandler = inpState.loadedFromPrev
        ? `restorePrevCell('${room}','${day}',this)`
        : `clearCell('${room}','${day}',this)`;
      const tipTxt = inpState.loadedFromPrev
        ? '좌클릭: 수정 | 우클릭: 전월값 복원'
        : '좌클릭: 관코드 선택 | 우클릭: 초기화';

      html += `<td class="tt-cell" id="tc_${key}"
        style="background:${bg};color:${fc};font-size:11px;font-weight:700;cursor:pointer;
               vertical-align:middle;text-align:center;padding:4px;
               border:1px solid var(--border);height:44px;${extraStyle}"
        onclick="handleCellClick('${room}','${day}',this)"
        oncontextmenu="${ctxHandler};return false;"
        title="${tipTxt}"
      >${label}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table>`;

  const area = document.getElementById('tt_inp_area');
  if (area) area.innerHTML = html;
  updateCellCount();
}

// 우클릭: 전월값으로 복원
function restorePrevCell(room, day, el) {
  const key = room + '__' + day;
  const b = BUILDINGS[inpState.building];
  const origVal = b.heatmap[room] ? (b.heatmap[room][day] || '') : '';
  if (!origVal || origVal === '-') {
    clearCell(room, day, el); return;
  }
  const isMix = origVal.includes('/') || origVal === 'MIX';
  inpState.cells[key] = { campus: isMix ? 'MIX' : origVal, isMix, times: [], fromPrev: true, modified: false };
  // 시각 복원
  const bg = isMix ? INP_BG['MIX'] : (INP_BG[origVal]||'var(--surface2)');
  const fc = isMix ? INP_FC['MIX'] : (INP_FC[origVal]||'var(--text-sub)');
  el.style.background = bg; el.style.color = fc;
  el.style.outline = ''; el.innerHTML = isMix ? 'MIX' : origVal;
  updateCellCount();
  showToast('전월값으로 복원되었습니다.');
}

// 셀 클릭 → 인라인 선택 패널 표시
function handleCellClick(room, day, el) {
  // 이미 열린 패널 닫기
  const existing = document.getElementById('_cell_picker');
  if (existing) existing.remove();
  if (existing && existing.dataset.key === room + '__' + day) return;

  const campuses = INP_CAMPUSES[inpState.building] || [];
  const key = room + '__' + day;
  const cur = inpState.cells[key];

  // 인라인 선택 패널 생성
  const picker = document.createElement('div');
  picker.id = '_cell_picker';
  picker.dataset.key = key;
  picker.style.cssText = `
    position:fixed; z-index:3000;
    background:#fff; border:1.5px solid var(--accent); border-radius:10px;
    box-shadow:0 4px 20px rgba(0,0,0,.15);
    padding:10px; display:flex; flex-direction:column; gap:6px; min-width:160px;
  `;

  // 위치: 셀 아래
  const rect = el.getBoundingClientRect();
  picker.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  picker.style.left = Math.min(rect.left + window.scrollX, window.innerWidth - 180) + 'px';

  // 헤더
  const hdr = document.createElement('div');
  hdr.style.cssText = 'font-size:11px;font-weight:800;color:var(--text-sub);padding-bottom:4px;border-bottom:1px solid var(--border)';
  hdr.textContent = `${room} · ${DAY_KR[day]} 사용 관코드`;
  picker.appendChild(hdr);

  // 관코드 버튼들
  campuses.forEach(c => {
    const btn = document.createElement('button');
    const isCur = cur && !cur.isMix && cur.campus === c;
    btn.style.cssText = `
      padding:7px 12px; border-radius:7px; border:1.5px solid ${isCur ? INP_FC[c] : 'var(--border)'};
      background:${isCur ? INP_BG[c] : 'var(--surface2)'}; color:${INP_FC[c]};
      font-size:12px; font-weight:700; cursor:pointer; text-align:left;
      font-family:'Pretendard',-apple-system,sans-serif; transition:all .1s;
    `;
    btn.textContent = (isCur ? '✓ ' : '') + c;
    btn.onclick = (e) => {
      e.stopPropagation();
      const wasFromPrev = inpState.cells[key] && inpState.cells[key].fromPrev;
      inpState.cells[key] = { campus: c, isMix: false, times: [],
        modified: inpState.loadedFromPrev, fromPrev: wasFromPrev };
      el.style.background = INP_BG[c];
      el.style.color = INP_FC[c];
      el.style.outline = inpState.loadedFromPrev ? '2px solid #c9a227' : '';
      el.style.outlineOffset = '-2px';
      el.innerHTML = c;
      picker.remove();
      updateCellCount();
    };
    picker.appendChild(btn);
  });

  // MIX 버튼 (같은 요일, 시간 분할)
  const mixBtn = document.createElement('button');
  const isMixCur = cur && cur.isMix;
  mixBtn.style.cssText = `
    padding:7px 12px; border-radius:7px;
    border:1.5px solid ${isMixCur ? INP_FC['MIX'] : '#c4b5fd'};
    background:${isMixCur ? INP_BG['MIX'] : '#f5f3ff'};
    color:${INP_FC['MIX']};
    font-size:12px; font-weight:700; cursor:pointer; text-align:left;
    font-family:'Pretendard',-apple-system,sans-serif;
  `;
  mixBtn.innerHTML = 'MIX <small style="font-weight:400;font-size:10px">시간대 분할 입력</small>';
  mixBtn.onclick = (e) => {
    e.stopPropagation();
    picker.remove();
    _mixTarget = { room, day, el, key };
    openMixModal(room, day, campuses);
  };
  picker.appendChild(mixBtn);

  // 초기화 버튼
  if (cur) {
    const clearBtn = document.createElement('button');
    clearBtn.style.cssText = `
      padding:5px 12px; border-radius:7px; border:1px solid var(--border);
      background:none; color:var(--text-sub); font-size:11px; cursor:pointer;
      font-family:'Pretendard',-apple-system,sans-serif;
    `;
    clearBtn.textContent = '✕ 초기화';
    clearBtn.onclick = (e) => {
      e.stopPropagation();
      clearCell(room, day, el);
      picker.remove();
    };
    picker.appendChild(clearBtn);
  }

  document.body.appendChild(picker);

  // 외부 클릭 시 닫기
  setTimeout(() => {
    document.addEventListener('click', function closePicker() {
      picker.remove();
      document.removeEventListener('click', closePicker);
    }, { once: true });
  }, 0);
}

function clearCell(room, day, el) {
  const key = room + '__' + day;
  delete inpState.cells[key];
  el.style.background = 'var(--surface2)';
  el.style.color = 'var(--text-sub)';
  el.innerHTML = '+';
  updateCellCount();
}

// MIX 팝업
function openMixModal(room, day, campuses) {
  document.getElementById('mix_room_label').textContent = `${room} · ${DAY_KR[day]}`;
  const rows = document.getElementById('mix_time_rows');
  rows.innerHTML = '';
  // 기존 저장값 있으면 복원
  const key = room + '__' + day;
  const saved = inpState.cells[key];
  const initRows = saved && saved.isMix ? saved.times : [
    { campus: campuses[0], start:'09:00', end:'14:00' },
    { campus: campuses[1]||campuses[0], start:'14:00', end:'22:00' },
  ];
  initRows.forEach(t => appendMixRow(t, campuses));
  document.getElementById('mixModal').classList.add('open');
}

function appendMixRow(val, campuses) {
  const allCampuses = INP_CAMPUSES[inpState.building] || [];
  const rows = document.getElementById('mix_time_rows');
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px';
  div.innerHTML = `
    <select style="flex:1;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none;font-family:\'Pretendard\',sans-serif">
      ${allCampuses.map(c=>`<option ${c===(val&&val.campus)?'selected':''}>${c}</option>`).join('')}
    </select>
    <input type="time" value="${val&&val.start||''}"
      placeholder="시작"
      style="padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;width:88px">
    <span style="color:var(--text-sub);font-size:12px">~</span>
    <input type="time" value="${val&&val.end||''}"
      placeholder="종료"
      style="padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;width:88px">
    <button onclick="this.parentNode.remove()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:0 4px">×</button>
  `;
  rows.appendChild(div);
}

function addMixRow() {
  const campuses = INP_CAMPUSES[inpState.building] || [];
  appendMixRow(null, campuses);
}

function saveMixTime() {
  if (!_mixTarget) return;
  const rows = document.getElementById('mix_time_rows').children;
  const times = [];
  for (const row of rows) {
    const sel = row.querySelector('select');
    const inputs = row.querySelectorAll('input[type=time]');
    if (!sel || inputs.length < 2) continue;
    const start = inputs[0].value, end = inputs[1].value;
    if (!start || !end) continue;
    const [sh,sm] = start.split(':').map(Number);
    const [eh,em] = end.split(':').map(Number);
    const mins = (eh*60+em) - (sh*60+sm);
    if (mins <= 0) { alert(`${sel.value}: 종료 시간이 시작 시간보다 늦어야 합니다.`); return; }
    times.push({ campus: sel.value, start, end, mins });
  }
  if (times.length === 0) { alert('최소 1개 이상 입력하세요.'); return; }

  // 비중 계산
  const total = times.reduce((s, t) => s + t.mins, 0);
  times.forEach(t => { t.ratio = (t.mins / total * 100).toFixed(1); });

  inpState.cells[_mixTarget.key] = { campus: 'MIX', isMix: true, times, needsTimeEdit: false,
    modified: inpState.loadedFromPrev };

  // 셀 업데이트
  const el = _mixTarget.el;
  el.style.background = INP_BG['MIX'];
  el.style.color = INP_FC['MIX'];
  el.innerHTML = times.map(t =>
    `<div style="font-size:10px;font-weight:700">${t.campus} ${t.ratio}%</div>`
  ).join('');

  closeMixModal();
  updateCellCount();
}

function closeMixModal() {
  document.getElementById('mixModal').classList.remove('open');
  _mixTarget = null;
}

function updateCellCount() {
  const cnt = Object.keys(inpState.cells).length;
  const el = document.getElementById('inp_cell_count');
  if (el) el.textContent = cnt > 0 ? `${cnt}개 셀 입력됨` : '';
}

// ── A/B 자동 판단 핵심 로직
function classifyRooms() {
  const b = BUILDINGS[inpState.building];
  const rooms = [...new Set(b.calcRows.map(r => String(r.room)))];
  const result = {}; // { room: { campus: { type, days, mixDays } } }

  rooms.forEach(room => {
    // 이 호실의 요일별 입력값 수집
    const dayMap = {};
    DAYS.forEach(day => {
      const key = room + '__' + day;
      const cell = inpState.cells[key];
      if (!cell) return;
      dayMap[day] = cell;
    });
    if (Object.keys(dayMap).length === 0) return;

    // 캠퍼스별 집계
    const campusData = {};
    Object.entries(dayMap).forEach(([day, cell]) => {
      if (cell.isMix) {
        // MIX: 각 관별로 mixDays에 기록
        cell.times.forEach(t => {
          campusData[t.campus] = campusData[t.campus] || { days:[], mixDays:[], mixTimes:{} };
          campusData[t.campus].mixDays.push(day);
          campusData[t.campus].mixTimes[day] = campusData[t.campus].mixTimes[day] || [];
          campusData[t.campus].mixTimes[day].push(t);
        });
      } else {
        campusData[cell.campus] = campusData[cell.campus] || { days:[], mixDays:[], mixTimes:{} };
        campusData[cell.campus].days.push(day);
      }
    });

    // 임차A/B 판단
    Object.entries(campusData).forEach(([campus, data]) => {
      const totalDays = data.days.length;
      const mixDays = data.mixDays.length;
      let type;
      if (mixDays > 0 && totalDays === 0) {
        type = 'B-MIX'; // 순수 시간분할
      } else if (mixDays > 0) {
        type = 'B-MIX'; // 일부 요일 MIX
      } else if (totalDays === 7) {
        type = 'A';     // 7일 전용
      } else {
        type = 'B';     // 일부 요일 단독
      }
      if (!result[room]) result[room] = {};
      result[room][campus] = { type, days: data.days, mixDays: data.mixDays, mixTimes: data.mixTimes };
    });
  });
  return result;
}

function submitInpData() {
  const cnt = Object.values(inpState.cells).length;
  if (cnt === 0) { alert('입력된 데이터가 없습니다.'); return; }

  // MIX 시간 미입력 체크
  const needsEdit = Object.entries(inpState.cells).filter(([k,v]) => v.needsTimeEdit);
  if (needsEdit.length > 0) {
    const rooms = needsEdit.map(([k]) => k.split('__')[0]).join(', ');
    alert(`△ 시간 미입력 MIX 셀이 있습니다: ${rooms}\n해당 셀을 클릭해서 시간을 입력해주세요.`);
    return;
  }

  // A/B 자동 분류
  const classified = classifyRooms();
  const b = BUILDINGS[inpState.building];

  // 검토 모달 표시
  showReviewModal(classified, b);
}

function confirmSubmit() {
  document.getElementById('_review_modal').remove();
  const b = BUILDINGS[inpState.building];
  const classified = classifyRooms();

  // 최종 요약 (STEP 3)
  const campusSummary = {};
  Object.entries(classified).forEach(([room, campuses]) => {
    Object.entries(campuses).forEach(([campus, data]) => {
      if (!campusSummary[campus]) campusSummary[campus] = { A:0, B:0, BMIX:0 };
      if (data.type === 'A') campusSummary[campus].A++;
      else if (data.type === 'B') campusSummary[campus].B++;
      else campusSummary[campus].BMIX++;
    });
  });

  const msgEl = document.getElementById('inp_summary_msg');
  if (msgEl) msgEl.textContent = `${b.name} · ${inpState.month} 사용현황 제출 완료`;

  const tbl = document.getElementById('inp_result_table');
  if (tbl) {
    tbl.innerHTML = `
      <div class="card-title" style="margin-bottom:12px">제출 내역 요약</div>
      <table>
        <thead><tr>
          <th>캠퍼스</th>
          <th class="num" style="color:#27500a">임차A</th>
          <th class="num" style="color:#27500a">임차B</th>
          <th class="num" style="color:#27500a">임차B·MIX</th>
        </tr></thead>
        <tbody>
          ${Object.entries(campusSummary).map(([c,v]) => `
          <tr>
            <td><span class="badge ${b.campusColors[c]||''}">${c}</span></td>
            <td class="num" style="font-weight:800;color:#27500a">${v.A || '-'}</td>
            <td class="num" style="font-weight:800;color:#27500a">${v.B || '-'}</td>
            <td class="num" style="font-weight:800;color:#27500a">${v.BMIX || '-'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  }

  goStep(3);
}

function goStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('spanel'+i).classList.remove('active');
    const s = document.getElementById('istep'+i);
    s.classList.remove('active','done');
  });
  for (let i = 1; i < n; i++) document.getElementById('istep'+i).classList.add('done');
  document.getElementById('istep'+n).classList.add('active');
  document.getElementById('spanel'+n).classList.add('active');
}

// ── 강의실 운영 효율 마스터 데이터
// 구조: { id, region, dept, campus, building, floor, spaceType, room, area, maxCapacity, curStudents, className, stdFee }
// EFF_DATA: { bldgKey: BUILDINGS 키값 } → 지역/건물/층수 자동 연동
// bldgKey 기준으로 BUILDINGS에서 region/name/floor 자동 로드
function getEffBldgInfo(bldgKey) {
  const b = BUILDINGS[bldgKey];
  if (!b) return { region:'', building:'', floor:'' };
  const m = (b.name||'').match(/(\d+층)/);
  return {
    region:   b.region || '',
    building: (b.name||'').replace(/\s*\d+층\s*/, '').trim(),
    floor:    m ? m[1] : '',
  };
}

// EFF_DATA 행에 BUILDINGS 동적 값을 합쳐서 반환 (region은 항상 최신 BUILDINGS 기준)
function effRow(r) {
  const info = getEffBldgInfo(r.bldgKey || '');
  return { ...r, region: info.region, building: r.building || info.building, floor: r.floor || info.floor };
}

          </div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px">
            <div>
              <div style="font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:700">적용할 사업부 기준</div>
              <select id="sim_dept" onchange="onSimDeptChange()"
                style="padding:7px 10px;border:1px solid #1a1a1a;border-radius:6px;font-size:12px;font-family:'Pretendard',-apple-system,sans-serif;min-width:130px">
                <option value="">— 사업부 선택 —</option>
              </select>
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:700">수강료 조정 (원)</div>
              <input type="number" id="sim_fee" placeholder="평균 자동"
                style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:120px;font-family:'Pretendard',-apple-system,sans-serif">
            </div>
            <div>
              <div style="font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:700">정원 조정 (명)</div>
              <input type="number" id="sim_cap" placeholder="현재 유지"
                style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:100px;font-family:'Pretendard',-apple-system,sans-serif">
            </div>
            <button onclick="runSimulation()" class="btn btn-primary"
              style="font-size:12px;padding:7px 18px;font-weight:800;background:#1a1a1a">시뮬레이션 실행</button>
          </div>
        </div>

        <!-- 목표매출 역산 모드 -->
        <div id="sim_reverse_box" style="display:none">
          <div style="font-size:11px;color:var(--text-sub);margin-bottom:12px;line-height:1.6">
            ※ 매출을 얼마나 더 올리려면 강의실이 몇 개 더 필요한지 역으로 계산합니다.<br>
            ※ <strong>새 강의실에도 현재와 같은 수준으로 채워진다는 가정</strong>이며, 실제 임차 가능 여부·학생 유입은 별도입니다.
          </div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px">
            <div>
              <div style="font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:700">목표 추가 매출 (원)</div>
              <input type="number" id="rev_amount" placeholder="예: 50000000"
                style="padding:7px 10px;border:1px solid #1a1a1a;border-radius:6px;font-size:12px;width:150px;font-family:'Pretendard',-apple-system,sans-serif">
            </div>
            <div style="font-size:13px;color:var(--text-sub);font-weight:700;padding-bottom:8px">또는</div>
            <div>
              <div style="font-size:11px;color:var(--text-sub);margin-bottom:4px;font-weight:700">현재 대비 증가율 (%)</div>
              <input type="number" id="rev_percent" placeholder="예: 20"
                style="padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:110px;font-family:'Pretendard',-apple-system,sans-serif">
            </div>
            <button onclick="runReverseSimulation()" class="btn btn-primary"
              style="font-size:12px;padding:7px 18px;font-weight:800;background:#1a1a1a">필요 강의실 계산</button>
          </div>
        </div>

        <div id="sim_result"></div>
      </div>

      <!-- 차트 영역 -->
      <div id="metric_chart_area">
        <!-- 요일별 추이 -->
        <div class="card" style="margin-bottom:14px">
          <div class="card-title" style="font-size:13px">요일별 추이</div>
          <div id="metric_chart_trend"></div>
        </div>

        <!-- 사업부별 비교 -->
        <div class="card">
          <div class="card-title" style="font-size:13px">사업부별 비교</div>
          <div id="metric_chart_compare"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 데이터 추가/수정 모달 -->
  <div class="modal-bg" id="effRowModal">
    <div class="modal" style="width:560px;max-height:90vh;overflow-y:auto">
      <h3 id="effModalTitle">강의실 데이터 추가</h3>

      <!-- STEP1: 건물 선택 → 자동 매핑 -->
      <div style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:14px">
        <div style="font-size:11px;font-weight:800;color:var(--text-sub);margin-bottom:8px">건물 선택 (선택 시 지역·건물명·층수·관코드·호실 자동 세팅)</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
          <div style="flex:1;min-width:160px">
            <div style="font-size:11px;color:var(--text-sub);margin-bottom:3px;font-weight:700">건물</div>
            <select id="eff_in_bldgkey" onchange="onEffBldgSelect(this.value)"
              style="width:100%;padding:7px 10px;background:#fff;border:1px solid var(--accent);border-radius:6px;color:var(--text);font-size:12px;outline:none;font-family:'Pretendard',-apple-system,sans-serif">
              <option value="">-- 건물 선택 --</option>
              ${Object.entries(BUILDINGS).map(([id,b]) =>
                '<option value="' + id + '">' + b.name + ' (' + b.region + ')</option>'
              ).join('')}
            </select>
          </div>
          <div style="flex:1;min-width:120px">
            <div style="font-size:11px;color:var(--text-sub);margin-bottom:3px;font-weight:700">관코드</div>
            <select id="eff_in_campussel" onchange="onEffCampusSelect(this.value)"
              style="width:100%;padding:7px 10px;background:#fff;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;font-family:'Pretendard',-apple-system,sans-serif">
              <option value="">-- 건물 먼저 선택 --</option>
            </select>
          </div>
          <div style="flex:1;min-width:120px">
            <div style="font-size:11px;color:var(--text-sub);margin-bottom:3px;font-weight:700">호실</div>
            <select id="eff_in_roomsel" onchange="onEffRoomSelect(this.value)"
              style="width:100%;padding:7px 10px;background:#fff;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;font-family:'Pretendard',-apple-system,sans-serif">
              <option value="">-- 관코드 먼저 선택 --</option>
            </select>
          </div>
        </div>
        <!-- 자동 세팅된 값 미리보기 -->
        <div id="eff_auto_preview" style="margin-top:8px;font-size:11px;color:var(--text-sub);display:none">
          자동 세팅: <span id="eff_auto_text" style="color:var(--accent);font-weight:700"></span>
        </div>
      </div>

      <!-- STEP2: 나머지 필드 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
        ${buildEffModalFields()}
      </div>

      <!-- STEP3: 교시별 수업 입력 (선택) -->
      <div style="background:#ebecf1;border:1px solid #d3d1c7;border-radius:8px;padding:12px;margin-bottom:12px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div>
            <span style="font-size:12px;font-weight:800;color:#1a1a1a">교시별 수업 입력</span>
            <span style="font-size:11px;color:var(--text-sub);margin-left:8px">(선택 - 미입력 시 위 기본정보 기준)</span>
          </div>
          <button onclick="addPeriodRow()"
            style="padding:4px 12px;background:#1a1a1a;color:#fff;border:none;border-radius:6px;
                   font-size:11px;font-weight:700;cursor:pointer;font-family:'Pretendard',-apple-system,sans-serif">
            + 교시 추가
          </button>
        </div>
        <div id="eff_periods_wrap">
          <div style="font-size:11px;color:var(--text-sub);text-align:center;padding:8px">
            교시 추가 버튼으로 수업을 입력하세요
          </div>
        </div>
        <!-- 교시 집계 미리보기 -->
        <div id="eff_periods_summary" style="display:none;margin-top:8px;padding:8px;background:#fff;border-radius:6px;font-size:11px">
        </div>
      </div>

      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="document.getElementById('effRowModal').classList.remove('open')">취소</button>
        <button class="btn btn-primary" onclick="saveEffRow()">저장</button>
      </div>
    </div>
  </div>
  `;
}

function buildEffModalFields() {
  const autoFields = ['region','building','floor','campus','room','area'];
  const fields = [
    ['region','지역','text','자동 세팅'],
    ['building','건물명','text','자동 세팅'],
    ['floor','층수','text','자동 세팅'],
    ['campus','관코드','text','자동 세팅'],
    ['room','호실','text','자동 세팅'],
    ['area','평수','number','자동 세팅'],
    ['dept','사업부','text','예: 중등사업부'],
    ['spaceType','공간타입','select','A|B|C|D|E'],
    ['maxCapacity','최대수용인원','number','명'],
    ['curStudents','현재수업인원','number','명'],
    ['className','수업명/반명','text','예: 중등수학심화A'],
    ['stdFee','표준수강료','number','원'],
  ];
  return fields.map(([k,label,type,ph]) => {
    const isAuto = autoFields.includes(k);
    const inputStyle = isAuto
      ? 'width:100%;padding:7px 10px;background:#ebecf1;border:1px solid #d4d4d4;border-radius:6px;color:#1a1a1a;font-size:12px;outline:none;font-weight:700;font-family:Pretendard,sans-serif'
      : 'width:100%;padding:7px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;outline:none;font-family:Pretendard,sans-serif';
    const labelColor = isAuto ? 'var(--accent)' : 'var(--text-sub)';
    let input;
    if (type === 'select') {
      input = '<select id="eff_in_' + k + '" style="' + inputStyle + '">' +
        ph.split('|').map(o => '<option>' + o + '</option>').join('') +
        '</select>';
    } else {
      input = '<input type="' + type + '" id="eff_in_' + k + '" placeholder="' + ph + '" ' +
        (isAuto ? 'readonly ' : '') +
        'style="' + inputStyle + '">';
    }
    return '<div>' +
      '<div style="font-size:11px;color:' + labelColor + ';margin-bottom:3px;font-weight:700">' +
        (isAuto ? '' : '') + label +
      '</div>' + input + '</div>';
  }).join('');
}

function b64utf8(b){return decodeURIComponent(Array.prototype.map.call(atob(b),function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2);}).join(''));}
function initOccFrame(view){
  const fr=document.getElementById('occFrame'); if(!fr) return;
  if(!fr.dataset.loaded){
    fr.dataset.loaded='1'; fr.dataset.view=view;
    fr.onload=function(){ try{
      if (typeof DEPT_ALLOC !== 'undefined' && DEPT_ALLOC && fr.contentWindow.applyDeptAlloc) { fr.contentWindow.applyDeptAlloc(DEPT_ALLOC); }
      fr.contentWindow.switchView(fr.dataset.view);
    }catch(e){} };
    fr.srcdoc = b64utf8(OCC_B64);
  } else {
    try{ fr.contentWindow.switchView(view); }catch(e){}
  }
}
function switchAdmTab(n) {
  if ((n === 3 || n === 4) && currentUser.rank !== 'admin') {
    showToast('접속 로그와 사용자 관리는 최종관리자만 접근 가능합니다.', true);
    return;
  }
  const occMode = (n === 0 || n === 1);
  [0,1,2,3,4].forEach(i => {
    const panel = document.getElementById('admtab_panel_' + i);
    const btn   = document.getElementById('admtab_' + i);
    if (!panel || !btn) return;
    panel.style.display = (occMode ? (i === 0) : (i === n)) ? 'block' : 'none';
    btn.style.background = i === n ? 'var(--accent)' : 'transparent';
    btn.style.color      = i === n ? '#fff' : 'var(--text-sub)';
  });
  if (occMode) initOccFrame(n === 0 ? 'dash' : 'detail');
  if (n === 3) renderAccessLogs();
  if (n === 4) initUserMgmt();
}

// 사용자 관리 (서브탭 4)
// ══════════════════════════════════════════════
function initUserMgmt() {
  // 드롭다운 옵션 채우기
  const deptSel = document.getElementById('newacc_dept');
  if (deptSel && deptSel.options.length === 0)
    deptSel.innerHTML = DEPT_OPTIONS.map(d=>`<option value="${d}">${d}</option>`).join('');
  const regSel = document.getElementById('newacc_region');
  if (regSel && regSel.options.length === 0)
    regSel.innerHTML = '<option value="전체">전체</option>' + REGION_OPTIONS_AUTH.map(r=>`<option value="${r}">${r}</option>`).join('');
  const titleSel = document.getElementById('newacc_title');
  if (titleSel && titleSel.options.length === 0)
    titleSel.innerHTML = TITLE_OPTIONS.map(t=>`<option value="${t}">${t}</option>`).join('');
  const campusBox = document.getElementById('newacc_campus_box');
  if (campusBox && !campusBox.children.length)
    campusBox.innerHTML = `<label style="display:inline-flex;align-items:center;gap:3px;padding:4px 9px;background:#e7e8ed;border:1px solid #1a1a1a;border-radius:6px;font-size:12px;cursor:pointer;font-weight:700">
        <input type="checkbox" id="newacc_campus_all" onchange="toggleNewAccAllCampus(this.checked)" style="cursor:pointer">전체
      </label>` + ALL_CAMPUS_CODES.map(c => `
      <label style="display:inline-flex;align-items:center;gap:3px;padding:4px 9px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:12px;cursor:pointer">
        <input type="checkbox" class="newacc_campus_chk" value="${c}" onchange="updateNewAccCampusLabel()" style="cursor:pointer">${c}
      </label>`).join('');

  onNewAccDeptChange();
  onNewAccTitleChange();
  renderPermRequests();
  renderAccountList();
}

// 소속 본사면 지역/관코드 숨김
function onNewAccDeptChange() {
  const dept = document.getElementById('newacc_dept')?.value || '';
  const regWrap = document.getElementById('newacc_region_wrap');
  const campWrap = document.getElementById('newacc_campus_wrap');
  const isHQ = dept === '본사';
  if (regWrap)  regWrap.style.display  = isHQ ? 'none' : 'block';
  if (campWrap) campWrap.style.display = isHQ ? 'none' : 'block';
}

function toggleNewAccCampusDropdown() {
  const dd = document.getElementById('newacc_campus_dropdown');
  const arrow = document.getElementById('newacc_campus_arrow');
  if (!dd) return;
  const open = dd.style.display === 'block';
  dd.style.display = open ? 'none' : 'block';
  if (arrow) arrow.textContent = open ? '▼' : '▲';
}

function updateNewAccCampusLabel() {
  const checked = [...document.querySelectorAll('.newacc_campus_chk:checked')].map(c=>c.value);
  const label = document.getElementById('newacc_campus_label');
  if (!label) return;
  const allChk = document.getElementById('newacc_campus_all');
  if (allChk && allChk.checked) {
    label.textContent = '전체 선택됨';
    label.style.color = '#1a1a1a';
  } else if (!checked.length) {
    label.textContent = '관코드 선택 (다중 가능)';
    label.style.color = 'var(--text-sub)';
  } else {
    label.textContent = `${checked.length}개: ${checked.join(', ')}`;
    label.style.color = '#1a1a1a';
  }
}

function toggleNewAccAllCampus(checked) {
  document.querySelectorAll('.newacc_campus_chk').forEach(c => c.checked = checked);
  updateNewAccCampusLabel();
}

// 직급 선택 시 권한 안내 + 관코드 박스 표시 여부
function onNewAccTitleChange() {
  const title = document.getElementById('newacc_title')?.value || '';
  const rank = titleToRank(title);
  const hint = document.getElementById('newacc_campus_hint');
  if (!hint) return;
  if (rank === 'exec' || rank === 'staff') {
    hint.textContent = '(이 직급은 전체 데이터 권한 → 관코드 선택 불필요)';
  } else {
    hint.textContent = '(원장/부원장/CS는 소속 관코드만 접근 → 선택 필수)';
  }
}

// 계정 생성
function createAccount() {
  const id     = document.getElementById('newacc_id').value.trim();
  const pw     = document.getElementById('newacc_pw').value.trim();
  const name   = document.getElementById('newacc_name').value.trim();
  const dept   = document.getElementById('newacc_dept').value;
  const region = document.getElementById('newacc_region').value;
  const title  = document.getElementById('newacc_title').value;
  const campus = [...document.querySelectorAll('.newacc_campus_chk:checked')].map(c=>c.value);
  const msg    = document.getElementById('newacc_msg');
  const rank   = titleToRank(title);

  if (!id || !pw || !name) { msg.style.color='#e03131'; msg.textContent='아이디/비밀번호/이름은 필수입니다.'; return; }
  if (!title) { msg.style.color='#e03131'; msg.textContent='직급/직책을 선택해주세요.'; return; }
  if (ACCOUNTS[id] || BASE_ACCOUNTS[id]) { msg.style.color='#e03131'; msg.textContent='이미 존재하는 아이디입니다.'; return; }

  const isHQ = dept === '본사';
  const allChkOn = document.getElementById('newacc_campus_all')?.checked;
  // 본사 / 이사·본부장 / 과장·대리·사원 / 전체체크 → 전체, 원장·부원장·CS는 선택 관코드
  const campusVal = (isHQ || rank === 'exec' || rank === 'staff' || allChkOn)
    ? 'all'
    : (campus.length ? campus : 'all');
  const regionVal = isHQ ? '전체' : region;

  const extra = JSON.parse(localStorage.getItem('extraAccounts') || '{}');
  extra[id] = { pw, name, rank, title, dept, region: regionVal, campus: campusVal };
  localStorage.setItem('extraAccounts', JSON.stringify(extra));
  ACCOUNTS = loadAccounts();

  msg.style.color = '#27500a';
  msg.textContent = `✓ ${name}(${id}) 계정 생성 완료 — 즉시 로그인 가능`;
  document.getElementById('newacc_id').value = '';
  document.getElementById('newacc_pw').value = '';
  document.getElementById('newacc_name').value = '';
  document.querySelectorAll('.newacc_campus_chk:checked').forEach(c=>c.checked=false);
  const allChk = document.getElementById('newacc_campus_all'); if (allChk) allChk.checked = false;
  updateNewAccCampusLabel();
  renderAccountList();
}

// 권한요청 승인 → 계정 생성 폼에 자동 채우기
function approveRequest(idx) {
  const requests = JSON.parse(localStorage.getItem('permRequests') || '[]');
  const r = requests[idx];
  if (!r) return;
  // 계정 생성 폼에 자동 입력
  document.getElementById('newacc_name').value = r.name;
  document.getElementById('newacc_dept').value = r.dept;
  document.getElementById('newacc_title').value = r.title;
  if (r.region && r.region !== '전체') document.getElementById('newacc_region').value = r.region;
  onNewAccDeptChange();  // 본사면 지역/관코드 숨김
  onNewAccTitleChange();
  // 관코드 체크 (본사/all이면 전체)
  if (r.campus === 'all' || r.dept === '본사') {
    const allChk = document.getElementById('newacc_campus_all');
    if (allChk) { allChk.checked = true; toggleNewAccAllCampus(true); }
  } else {
    document.querySelectorAll('.newacc_campus_chk').forEach(c => {
      c.checked = (r.campus||[]).includes(c.value);
    });
    updateNewAccCampusLabel();
  }
  // 상태 변경
  requests[idx].status = '승인';
  localStorage.setItem('permRequests', JSON.stringify(requests));
  renderPermRequests();
  showToast(`${r.name}님 정보가 계정 생성 폼에 입력되었습니다. 아이디/비번 입력 후 생성하세요.`);
  document.getElementById('newacc_id').focus();
}

function rejectRequest(idx) {
  const requests = JSON.parse(localStorage.getItem('permRequests') || '[]');
  if (!requests[idx]) return;
  if (!confirm('이 요청을 거절하시겠습니까?')) return;
  requests[idx].status = '거절';
  localStorage.setItem('permRequests', JSON.stringify(requests));
  renderPermRequests();
}

// ── classKey DISTINCT 집계 헬퍼 (요일 중복 완전 제거)
function getClassMapByDept(rows) {
  const classMap = new Map();
  rows.forEach(r => {
    const ck = r.classKey || `${r.bldgKey||''}_${r.room}_${r.campus}_${r.className}`;
    if (!classMap.has(ck)) classMap.set(ck, { ...r, _ck: ck });
    // 요일만 추가 (다른 필드는 첫 행 기준)
  });
  return [...classMap.values()];
}

// 강의실 배정 마스터(통합_문서1.xlsx) — 사업부별 배정 호실/최대수용 (효율·가동률 분모)
const DEPT_ALLOC = { '초등사업부':{rooms:23,maxCap:253}, '중등사업부':{rooms:18,maxCap:315}, '고등사업부':{rooms:20,maxCap:405} };

function calcDeptStats(rows, useMasterDept) {
  const uniqueRooms   = new Set(rows.map(r => (r.bldgKey||'')+'::'+(r.room||'')));
  const deduped       = getClassMapByDept(rows); // classKey 기준 1개씩
  let totalStudents=0, totalMaxSales=0, totalCurSales=0, totalMaxCap=0;
  deduped.forEach(r => {
    const st = calcEffStats(r);
    totalStudents += st.totalStudents;
    totalMaxSales += st.totalMaxSales;
    totalCurSales += st.totalCurSales;
    totalMaxCap   += (r.maxCapacity||0);
  });
  let _rc = uniqueRooms.size;
  if (useMasterDept && rows[0] && typeof DEPT_ALLOC!=='undefined' && DEPT_ALLOC[rows[0].dept]) { _rc = DEPT_ALLOC[rows[0].dept].rooms; }
  return {
    roomCount:     _rc,
    usedRooms:     uniqueRooms.size,
    classCount:    deduped.length,
    totalStudents,
    totalMaxCap,
    totalMaxSales,
    totalCurSales,
    capRate:   totalMaxCap   ? (totalStudents/totalMaxCap*100).toFixed(1)   : 0,
    salesRate: totalMaxSales ? (totalCurSales/totalMaxSales*100).toFixed(1) : 0,
  };
}

// ── 사업부별 KPI 카드
function renderDeptKPI() {
  const el = document.getElementById('eff_dept_kpi_row');
  if (!el) return;

  const data = getFilteredEff();
  const byDept = {};
  data.forEach(r => {
    const dept = r.dept || '미분류';
    if (!byDept[dept]) byDept[dept] = [];
    byDept[dept].push(r);
  });

  const deptColors = {
    '중등사업부':'#1a1a1a','초등사업부':'#27500a',
    '고등사업부':'#b5651d','테디사업부':'#639922','미분류':'#888'
  };

  const DEPT_ORDER = ['초등사업부','중등사업부','고등사업부','테디사업부'];
  const sortedDepts = Object.entries(byDept).sort((a,b)=>{
    const ai=DEPT_ORDER.indexOf(a[0]), bi=DEPT_ORDER.indexOf(b[0]);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  el.innerHTML = sortedDepts.map(([dept, rows]) => {
    const s = calcDeptStats(rows, true);
    const grade = s.capRate>=80?'#595750':s.capRate>=60?'#b45309':'#e03131';
    const color = deptColors[dept] || '#888';

    return `
    <div class="kpi-card" style="border-top:4px solid ${color}">
      <div style="font-size:13px;font-weight:800;color:${color};margin-bottom:8px">${dept}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div style="font-size:10px;color:var(--text-sub)">수용효율</div>
          <div style="font-size:20px;font-weight:800;color:${grade};font-family:'JetBrains Mono',monospace">${s.capRate}%</div>
        </div>
        <div>
          <div style="font-size:10px;color:var(--text-sub)">매출효율</div>
          <div style="font-size:20px;font-weight:800;color:${grade};font-family:'JetBrains Mono',monospace">${s.salesRate}%</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text-sub);border-top:1px solid var(--border);padding-top:8px">
        호실 <strong>${s.roomCount}개</strong> · 수업 <strong>${s.classCount}개</strong><br>
        표준매출 ${Math.round(s.totalMaxSales).toLocaleString()}원<br>
        발생매출(추정) <strong style="color:#1a1a1a">${Math.round(s.totalCurSales).toLocaleString()}원</strong>
      </div>
    </div>`;
  }).join('') || '<div style="color:var(--text-sub);padding:20px">데이터 없음</div>';
}

  });

function getOccData() {
  const dept   = document.getElementById('occ_f_dept')?.value   || '';
  const campus = document.getElementById('occ_f_campus')?.value || '';
  const room   = document.getElementById('occ_f_room')?.value   || '';
  return EFF_DATA.filter(r =>
    (!dept   || r.dept   === dept) &&
    (!campus || r.campus === campus) &&
    (!room   || r.room   === room)
  );
}

function renderOccupancy() {
  const data = getOccData();
  if (!data.length) {
    ['occ_kpi','occ_day_chart','occ_time_chart','occ_dept_chart','occ_heatmap'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = '<div style="padding:20px;color:var(--text-sub);text-align:center">데이터 없음</div>';
    });
    return;
  }

  // 운영시간 기준
  const OPS = { weekday: { start:14, end:22 }, weekend: { start:9, end:22 } };
  const DAYS_KR = ['월','화','수','목','금','토','일'];
  const DAYS_EN = ['월','화','수','목','금','토','일'];
  const isWeekend = d => d === '토' || d === '일';

  // 고유 호실 수
  const uniqueRooms = [...new Set(data.map(r => (r.bldgKey||'')+'::'+(r.room||'')))];
  const totalRooms  = uniqueRooms.length;

  // ── 공통 toMin 헬퍼
  const toMin = t => {
    const s = String(t||'').replace(/[시:]/g,':').replace(/오전|오후|분/g,'').trim();
    const p = s.split(':'); return (+p[0]||0)*60+(+p[1]||0);
  };

  // ── classType 분리: 초등/중등(교시있음) vs 고등(빈칸→시간기준)
  const withType    = data.filter(r => r.classType && String(r.classType).trim());
  const withoutType = data.filter(r => !r.classType || !String(r.classType).trim());

  // ── 교시별 집계 (초등/중등)
  const typeStats = {};
  withType.forEach(r => {
    const t = String(r.classType).trim();
    if (!typeStats[t]) typeStats[t] = { rooms: new Set(), count:0 };
    typeStats[t].rooms.add((r.bldgKey||'')+'::'+(r.room||''));
    typeStats[t].count++;
  });

  // ── 요일별 가동률 (전체)
  const dayStats = {};
  DAYS_KR.forEach(d => {
    const rows = data.filter(r => r.day === d);
    const oRooms = [...new Set(rows.map(r=>(r.bldgKey||'')+'::'+(r.room||'')))];
    dayStats[d] = { rate: totalRooms?(oRooms.length/totalRooms*100).toFixed(1):0, count:rows.length, rooms:oRooms.length };
  });

  // ── 시간대별 집계 (고등: classType 없는 것)
  const timeSlots = {};
  for (let h=9;h<22;h++) timeSlots[`${String(h).padStart(2,'0')}:00`] = { count:0 };
  withoutType.forEach(r => {
    const st=toMin(r.timeStart), en=toMin(r.timeEnd);
    if (!st||!en||en<=st) return;
    Object.keys(timeSlots).forEach(slot => {
      const sh=parseInt(slot)*60;
      if (sh>=st && sh<en) timeSlots[slot].count++;
    });
  });
  const maxTimeCount = Math.max(...Object.values(timeSlots).map(v=>v.count),1);

  // ── 사업부별 가동률
  const deptStats = {};
  data.forEach(r => {
    const dept = r.dept||'미분류';
    if (!deptStats[dept]) deptStats[dept] = { rooms:new Set(), classKeys:new Set(), days:new Set() };
    deptStats[dept].rooms.add((r.bldgKey||'')+'::'+(r.room||''));
    deptStats[dept].classKeys.add(r.classKey||`${r.room}_${r.className}`);
    if (r.day) deptStats[dept].days.add(r.room+'_'+r.day);
  });

  // ── KPI
  const avgDayRate = (Object.values(dayStats).reduce((s,d)=>s+parseFloat(d.rate),0)/7).toFixed(1);
  const peakDay  = Object.entries(dayStats).sort((a,b)=>parseFloat(b[1].rate)-parseFloat(a[1].rate))[0];
  const peakType = Object.entries(typeStats).sort((a,b)=>b[1].count-a[1].count)[0];
  const peakTime = Object.entries(timeSlots).filter(([,v])=>v.count>0).sort((a,b)=>b[1].count-a[1].count)[0];

  const kpiEl = document.getElementById('occ_kpi');
  if (kpiEl) kpiEl.innerHTML = [
    ['평균 주간 가동률', avgDayRate+'%', '전 요일 평균'],
    ['분석 호실', totalRooms+'개', '고유 강의실'],
    ['최고 가동 요일', peakDay?peakDay[0]+'요일 '+peakDay[1].rate+'%':'-', ''],
    ['피크', peakType?peakType[0]: (peakTime?peakTime[0]:'-'), peakType?'교시':'시간대'],
  ].map(([label,val,sub]) => `
    <div class="kpi-card c-total">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value" style="font-size:20px">${val}</div>
      <div class="kpi-sub">${sub}</div>
    </div>`).join('');

  const barRow = (label, pct, sub, color) => {
    const p = Math.min(100, parseFloat(pct)||0);
    const cl = color||(p>=80?'#1a1a1a':p>=60?'#1a1a1a':p>=30?'#b5651d':'#d0d0d0');
    return `
    <div class="occ-bar-row" data-label="${label}" data-pct="${p}" data-sub="${sub||''}" data-color="${cl}" style="display:flex;align-items:center;gap:10px;margin-bottom:9px">
      <div style="width:76px;font-size:12px;font-weight:700;text-align:right;flex-shrink:0">${label}</div>
      <div style="flex:1;height:22px;background:#f0f0f0;border-radius:4px;overflow:hidden">
        <div style="width:${p}%;height:100%;background:${cl};border-radius:4px;
          display:flex;align-items:center;padding-left:8px;transition:width .5s">
          ${p>15?`<span style="font-size:11px;font-weight:800;color:#fff">${p.toFixed(1)}%</span>`:''}
        </div>
      </div>
      ${p<=15?`<span style="font-size:11px;font-weight:700;color:${cl};width:36px">${p.toFixed(1)}%</span>`:''}
      <span style="font-size:10px;color:var(--text-sub);width:52px;text-align:right;flex-shrink:0">${sub||''}</span>
    </div>`;
  };

  // ── 요일별 차트 사업부 탭 생성
  let _occDayDept = '전체';
  const DEPT_ORDER3 = ['초등사업부','중등사업부','고등사업부','테디사업부'];
  const depts = ['전체', ...new Set(data.map(r=>r.dept).filter(Boolean))].sort((a,b)=>{
    if(a==='전체') return -1; if(b==='전체') return 1;
    return (DEPT_ORDER3.indexOf(a)<0?99:DEPT_ORDER3.indexOf(a))-(DEPT_ORDER3.indexOf(b)<0?99:DEPT_ORDER3.indexOf(b));
  });
  const tabsEl = document.getElementById('occ_day_dept_tabs');

      // 시간대별 집계: 호실 DISTINCT (건수 아님)
      const fTimeSlots = {};
      for (let h=9;h<22;h++) fTimeSlots[`${String(h).padStart(2,'0')}:00`] = { rooms: new Set() };
      const safeToMin = t => {
        if (!t && t !== 0) return 0;
        const raw = String(t).trim();
        if (/^0\.\d+$/.test(raw)) return Math.round(parseFloat(raw)*24*60);
        const s = raw.replace(/오전|오후|분/g,'').replace(/시(?=\d|:|$)/g,':').replace(/시$/g,':00').trim();
        const parts = s.replace(/[~\-]/g,':').split(':');
        return (parseInt(parts[0])||0)*60+(parseInt(parts[1])||0);
      };
      fWithoutType.forEach(r => {
        const st = safeToMin(r.timeStart), en = safeToMin(r.timeEnd);

        if (en <= st) return;
        const roomKey = (r.bldgKey||'')+'::'+(r.room||'');
        Object.keys(fTimeSlots).forEach(slot => {

              <div style="font-size:10px;color:var(--text-sub)">${sorted.length}개 교시 평균</div>
            </div>
            <div style="flex:1;margin-left:8px">
              <div style="font-size:10px;color:var(--text-sub);margin-bottom:4px">교시별 강의실 점유율</div>
              <div style="font-size:11px;color:var(--text-sub)">각 교시에 전체 강의실 중 몇 개가 사용되는지</div>
            </div>
          </div>
          <!-- 교시별 바차트 -->
          ${sorted.map(([type,v])=>{
            const pct = (v.rooms.size/fTotalRooms*100).toFixed(1);
            return barRow(type, pct, v.rooms.size+'/'+fTotalRooms+'호실', '#639922');
          }).join('')}
        </div>`;
      }

      const hasTimeData = Object.values(fTimeSlots).some(v=>v.rooms.size>0);
      if (fWithoutType.length > 0) {
        html2 += `<div style="font-size:11px;font-weight:800;color:#b5651d;margin:${Object.keys(fTypeStats).length>0?'14px':'0'}px 0 8px">시간대별 가동률
          <span style="font-size:10px;font-weight:400;color:var(--text-sub);margin-left:4px">각 시간대 강의실 점유율</span>
        </div>`;
        if (hasTimeData) {
          // 시간대별 평균 가동률
          const timeEntries = Object.entries(fTimeSlots).filter(([,v])=>v.rooms.size>0);
          const timeAvg = timeEntries.length
            ? (timeEntries.reduce((s,[,v])=>s+(v.rooms.size/fTotalRooms*100),0)/timeEntries.length).toFixed(1)
            : 0;

          html2 += `<div>
            <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;
                        background:#f6f7fc;border-radius:8px;margin-bottom:12px">
              <div>
                <div style="font-size:10px;color:var(--text-sub)">시간대 평균 가동률</div>
                <div style="font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;
                    color:${timeAvg>=80?'#1a1a1a':timeAvg>=60?'#b5651d':'#b5651d'}">${timeAvg}%</div>
                <div style="font-size:10px;color:var(--text-sub)">운영 시간대 평균</div>
              </div>
              <div style="flex:1;margin-left:8px">
                <div style="font-size:10px;color:var(--text-sub);margin-bottom:4px">시간대별 강의실 점유율</div>
                <div style="font-size:11px;color:var(--text-sub)">각 시간대에 전체 강의실 중 몇 개가 사용되는지</div>
              </div>
            </div>
            ${timeEntries.map(([slot,v])=>{
              const pct = (v.rooms.size/fTotalRooms*100).toFixed(1);
              return barRow(slot, pct, v.rooms.size+'/'+fTotalRooms+'호실', '#b5651d');
            }).join('')}
          </div>`;
        } else {
          html2 += '<div style="font-size:11px;color:var(--text-sub);padding:8px">시작/종료 시간 데이터를 확인해주세요</div>';
        }
      }
      if (!html2) html2 = '<div style="color:var(--text-sub);padding:20px;text-align:center">데이터 없음</div>';

      const content = document.getElementById('occ_time_content');
      if (content) content.innerHTML = html2;
    };

    window.selectOccTimeDept = function(dept) {
      timeDepts.forEach(d => {
        const btn = document.getElementById('occ_time_tab_'+d.replace(/\s/g,'_'));
        if (!btn) return;
        const sel = d===dept;
        btn.style.background  = sel?'#b5651d':'transparent';
        btn.style.color       = sel?'#fff':'var(--text-sub)';
        btn.style.borderColor = sel?'#b5651d':'var(--border)';
      });
      window.renderOccTimeChart(dept);
    };

    window.renderOccTimeChart('전체');
  }

  // 사업부별 차트
  const deptEl = document.getElementById('occ_dept_chart');
  if (deptEl) {
    const deptItems = Object.entries(deptStats).map(([dept,v]) => {
      const rate = v.rooms.size ? (v.days.size/v.rooms.size/7*100).toFixed(1) : 0;
      return [dept, rate, v.rooms.size+'호실/'+v.classKeys.size+'수업'];
    }).sort((a,b)=>parseFloat(b[1])-parseFloat(a[1]));
    deptEl.innerHTML = deptItems.map(([label,rate,sub]) => barRow(label,rate,sub)).join('');
  }

  // 호실×요일 히트맵

  if (hmEl) {

}

// ── 매출·호실·학생수 집계 헬퍼 (classKey 기준 1회)
function aggOccMetric(rows) {
  const seenClass = new Set();
  const uniqueRooms = new Set();
  let students = 0, maxSales = 0, curSales = 0;
  rows.forEach(r => {
    uniqueRooms.add((r.bldgKey||'')+'::'+(r.room||''));
    const ck = r.classKey || `${r.bldgKey||''}_${r.room}_${r.campus}_${r.className}`;
    if (seenClass.has(ck)) return;
    seenClass.add(ck);
    const st = calcEffStats(r);
    students += st.totalStudents;
    maxSales += st.totalMaxSales;
    curSales += st.totalCurSales;
  });
  return { rooms: uniqueRooms.size, classes: seenClass.size, students, maxSales, curSales };
}

// ── 필터 UI 초기화 (사업부 다중 + 요일 다중)
function initMetricFilter() {
  const data = window._occMetricData || [];
  const DEPT_ORDER = ['초등사업부','중등사업부','고등사업부','테디사업부'];
  const DAYS = ['월','화','수','목','금','토','일'];

  // 사업부 체크박스 (전체 + 데이터에 있는 사업부)
  const depts = [...new Set(data.map(r=>r.dept).filter(Boolean))]
    .sort((a,b)=>(DEPT_ORDER.indexOf(a)<0?99:DEPT_ORDER.indexOf(a))-(DEPT_ORDER.indexOf(b)<0?99:DEPT_ORDER.indexOf(b)));

  const deptBox = document.getElementById('metric_dept_box');
  if (deptBox) {
    deptBox.innerHTML =
      chip('metric_dept_all', '전체', true, 'toggleMetricDeptAll(this.checked)', '#1a1a1a') +
      depts.map(d => chip2('metric_dept_chk', d, d)).join('');
  }

  const dayBox = document.getElementById('metric_day_box');
  if (dayBox) {
    dayBox.innerHTML =
      chip('metric_day_all', '전체', true, 'toggleMetricDayAll(this.checked)', '#b5651d') +
      DAYS.map(d => chip2('metric_day_chk', d, d+'요일')).join('');
  }

  // 기본: 전체 조회
  applyMetricFilter();
}

// 칩 헬퍼
function chip(id, label, checked, onchange, color) {
  return `<label style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;
    background:#e7e8ed;border:1px solid ${color};border-radius:14px;font-size:12px;cursor:pointer;font-weight:700">
    <input type="checkbox" id="${id}" ${checked?'checked':''} onchange="${onchange}" style="cursor:pointer">${label}</label>`;
}
function chip2(cls, val, label) {
  const allId = cls === 'metric_dept_chk' ? 'metric_dept_all' : 'metric_day_all';
  return `<label style="display:inline-flex;align-items:center;gap:4px;padding:5px 12px;
    background:var(--surface);border:1px solid var(--border);border-radius:14px;font-size:12px;cursor:pointer">
    <input type="checkbox" class="${cls}" value="${val}" onchange="document.getElementById('${allId}').checked=false" style="cursor:pointer">${label}</label>`;
}

function toggleMetricDeptAll(checked) {
  document.querySelectorAll('.metric_dept_chk').forEach(c => c.checked = false);
}
function toggleMetricDayAll(checked) {
  document.querySelectorAll('.metric_day_chk').forEach(c => c.checked = false);
}

// ── 조회 버튼: 선택한 사업부 + 요일 합산 1개 결과
function applyMetricFilter() {
  const data = window._occMetricData || [];
  const el = document.getElementById('occ_metric_content');
  const summary = document.getElementById('metric_filter_summary');
  if (!el) return;

  const deptAll = document.getElementById('metric_dept_all')?.checked;
  const dayAll  = document.getElementById('metric_day_all')?.checked;
  const selDepts = [...document.querySelectorAll('.metric_dept_chk:checked')].map(c=>c.value);
  const selDays  = [...document.querySelectorAll('.metric_day_chk:checked')].map(c=>c.value);

  // 전체 체크 or 아무것도 선택 안 함 → 전체로 간주
  const useDepts = (deptAll || selDepts.length === 0) ? null : selDepts;
  const useDays  = (dayAll  || selDays.length === 0)  ? null : selDays;

  const filtered = data.filter(r =>
    (!useDepts || useDepts.includes(r.dept)) &&
    (!useDays  || useDays.includes(r.day))
  );

  // 선택 요약 텍스트
  const deptLabel = useDepts ? useDepts.map(d=>d.replace('사업부','')).join('+') : '전체 사업부';
  const dayLabel  = useDays  ? useDays.join('·')+'요일' : '전체 요일';
  if (summary) summary.textContent = `▸ ${deptLabel} / ${dayLabel}`;

  const a = aggOccMetric(filtered);
  const fmt = n => Math.round(n||0).toLocaleString('ko-KR');

  el.innerHTML = `
  <div style="border:2px solid #1a1a1a;border-radius:12px;padding:20px;background:linear-gradient(135deg,#ebecf1,#fff)">
    <div style="font-size:14px;font-weight:800;color:#1a1a1a;margin-bottom:14px">
      ${deptLabel} · ${dayLabel} 합산
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px">
      <div style="padding:14px;background:#fff;border-radius:8px;border:1px solid #dbe4ff">
        <div style="font-size:11px;color:var(--text-sub)">가동 호실</div>
        <div style="font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#1a1a1a">${a.rooms}<span style="font-size:14px">개</span></div>
      </div>
      <div style="padding:14px;background:#fff;border-radius:8px;border:1px solid #d4d4d4">
        <div style="font-size:11px;color:var(--text-sub)">수강생</div>
        <div style="font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#1a1a1a">${a.students}<span style="font-size:14px">명</span></div>
      </div>
      <div style="padding:14px;background:#fff;border-radius:8px;border:1px solid #ffe8cc">
        <div style="font-size:11px;color:var(--text-sub)">수업</div>
        <div style="font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;color:#b5651d">${a.classes}<span style="font-size:14px">개</span></div>
      </div>
    </div>
    <div style="margin-top:12px;padding:14px;background:#fff;border-radius:8px;border:1px solid #ffe8cc">
      <div style="font-size:11px;color:var(--text-sub)">발생매출(추정)</div>
      <div style="font-size:26px;font-weight:800;color:#b5651d;font-family:'JetBrains Mono',monospace">${fmt(a.curSales)}원</div>
      <div style="font-size:11px;color:var(--text-sub);margin-top:4px">표준매출 ${fmt(a.maxSales)}원</div>
    </div>
  </div>`;

  // 차트 모달이 열려 있으면 같이 갱신 (연동)
  const chartModal = document.getElementById('metricChartModal');
  if (chartModal && chartModal.classList.contains('open')) renderMetricCharts();
}

  const box = document.getElementById('metricChartBox');
  if (!box) return;
  // 현재 위치 계산 (transform 기준)
  const rect = box.getBoundingClientRect();
  _dragModal.el = box;
  _dragModal.offsetX = e.clientX - rect.left;
  _dragModal.offsetY = e.clientY - rect.top;
  box.style.position = 'fixed';
  box.style.margin = '0';
  box.style.left = rect.left + 'px';
  box.style.top  = rect.top + 'px';
  document.addEventListener('mousemove', onDragModal);
  document.addEventListener('mouseup', stopDragModal);
  e.preventDefault();
}
function onDragModal(e) {
  if (!_dragModal.el) return;
  let x = e.clientX - _dragModal.offsetX;
  let y = e.clientY - _dragModal.offsetY;
  // 화면 밖으로 너무 나가지 않게 제한
  const maxX = window.innerWidth - 100;
  const maxY = window.innerHeight - 60;
  x = Math.max(-_dragModal.el.offsetWidth + 200, Math.min(x, maxX));
  y = Math.max(0, Math.min(y, maxY));
  _dragModal.el.style.left = x + 'px';
  _dragModal.el.style.top  = y + 'px';
}
function stopDragModal() {
  _dragModal.el = null;
  document.removeEventListener('mousemove', onDragModal);
  document.removeEventListener('mouseup', stopDragModal);
}

// 차트 모달 닫기 (위치 초기화)
function closeMetricChart() {
  const modal = document.getElementById('metricChartModal');
  const box = document.getElementById('metricChartBox');

    box.style.position = 'relative';
    box.style.left = '';
    box.style.top = '';
    box.style.margin = '';

}

function openMetricChart() {
  const box = document.getElementById('metricChartBox');
  if (box) { box.style.position='relative'; box.style.left=''; box.style.top=''; box.style.margin=''; }
  document.getElementById('metricChartModal').classList.add('open');
  _metricChartType = 'all';
  setMetricChartType('all');
}

function setMetricChartType(type) {
  _metricChartType = type;
  ['all','sales','rooms','students'].forEach(t => {
    const btn = document.getElementById('mc_metric_'+t);
    if (!btn) return;
    const sel = t === type;
    const color = t==='all'?'#639922':t==='sales'?'#b5651d':t==='rooms'?'#1a1a1a':'#1a1a1a';
    btn.style.background  = sel ? color : 'transparent';
    btn.style.color       = sel ? '#fff' : 'var(--text-sub)';
    btn.style.borderColor = sel ? color : 'var(--border)';
  });
  renderMetricCharts();
}

// 선택된 필터 가져오기 (applyMetricFilter와 동일 로직)
function getMetricSelection() {
  const data = window._occMetricData || [];
  const deptAll = document.getElementById('metric_dept_all')?.checked;
  const dayAll  = document.getElementById('metric_day_all')?.checked;
  const selDepts = [...document.querySelectorAll('.metric_dept_chk:checked')].map(c=>c.value);
  const selDays  = [...document.querySelectorAll('.metric_day_chk:checked')].map(c=>c.value);
  const useDepts = (deptAll || selDepts.length === 0) ? null : selDepts;
  const useDays  = (dayAll  || selDays.length === 0)  ? null : selDays;
  return { data, useDepts, useDays };
}

function metricValue(agg, type) {
  if (type === 'sales')    return agg.curSales;
  if (type === 'rooms')    return agg.rooms;
  if (type === 'students') return agg.students;
  return 0;
}
function metricColor(type) {
  return type==='sales'?'#b5651d':type==='rooms'?'#1a1a1a':'#1a1a1a';
}
function metricUnit(type) {
  return type==='sales'?'원':type==='rooms'?'개':'명';
}
function metricLabel(type) {
  return type==='sales'?'발생매출(추정)':type==='rooms'?'가동 호실':'수강생';
}

function renderMetricCharts() {
  const { data, useDepts, useDays } = getMetricSelection();
  const DEPT_ORDER = ['초등사업부','중등사업부','고등사업부','테디사업부'];
  const DAYS = ['월','화','수','목','금','토','일'];
  const type = _metricChartType;
  const fmt = n => Math.round(n||0).toLocaleString('ko-KR');

  // 필터 적용된 데이터
  const filtered = data.filter(r =>
    (!useDepts || useDepts.includes(r.dept)) &&
    (!useDays  || useDays.includes(r.day))
  );

  // 요약
  const deptLabel = useDepts ? useDepts.map(d=>d.replace('사업부','')).join('+') : '전체 사업부';
  const dayLabel  = useDays  ? useDays.join('·')+'요일' : '전체 요일';
  document.getElementById('metric_chart_summary').textContent =
    `▸ ${deptLabel} / ${dayLabel} · 지표: ${type==='all'?'전체(매출·호실·수강생)':metricLabel(type)}`;

  const trendDays = useDays || DAYS;
  const cmpDepts = useDepts || [...new Set(data.map(r=>r.dept).filter(Boolean))]
    .sort((a,b)=>(DEPT_ORDER.indexOf(a)<0?99:DEPT_ORDER.indexOf(a))-(DEPT_ORDER.indexOf(b)<0?99:DEPT_ORDER.indexOf(b)));

  const trendEl = document.getElementById('metric_chart_trend');
  const cmpEl   = document.getElementById('metric_chart_compare');

  // 지표별 차트 빌더
  const buildTrend = (t) => {
    const rows2val = trendDays.map(d => ({ label:d, value: metricValue(aggOccMetric(filtered.filter(r=>r.day===d)), t) }));
    return svgLineChart(rows2val, metricColor(t), metricUnit(t), fmt);
  };
  const buildCompare = (t) => {
    const arr = cmpDepts.map(dp => ({ label: dp.replace('사업부',''), value: metricValue(aggOccMetric(filtered.filter(r=>r.dept===dp)), t) }));
    return svgBarChart(arr, metricColor(t), metricUnit(t), fmt);
  };

  if (type === 'all') {
    // 3개 지표 전체 표시
    const types = ['sales','rooms','students'];
    trendEl.innerHTML = types.map(t =>
      `<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:800;color:${metricColor(t)};margin-bottom:4px">${metricLabel(t)}</div>${buildTrend(t)}</div>`
    ).join('');
    cmpEl.innerHTML = types.map(t =>
      `<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:800;color:${metricColor(t)};margin-bottom:4px">${metricLabel(t)}</div>${buildCompare(t)}</div>`
    ).join('');
  } else {
    trendEl.innerHTML = buildTrend(type);
    cmpEl.innerHTML   = buildCompare(type);
  }
}

function toggleSimPanel() {

// 사업부 선택 시 평균 수강료/정원 자동 표시
function onSimDeptChange() {
  const dept = document.getElementById('sim_dept').value;
  if (!dept) return;
  const data = window._occMetricData || [];
  const deduped = getClassMapByDept(data.filter(r=>r.dept===dept));
  if (!deduped.length) return;
  const avgFee = Math.round(deduped.reduce((s,r)=>s+(r.stdFee||0),0)/deduped.length);
  const avgCap = Math.round(deduped.reduce((s,r)=>s+(r.maxCapacity||0),0)/deduped.length);
  document.getElementById('sim_fee').placeholder = `${dept.replace('사업부','')} 평균 ${avgFee.toLocaleString()}`;
  document.getElementById('sim_cap').placeholder = `${dept.replace('사업부','')} 평균 ${avgCap}`;
}

// 시뮬레이션 실행
function runSimulation() {
  const { data, useDepts, useDays } = getMetricSelection();
  const resultEl = document.getElementById('sim_result');
  const fmt = n => Math.round(n||0).toLocaleString('ko-KR');

  // 현재 조회된 강의실 (필터 적용)
  const filtered = data.filter(r =>
    (!useDepts || useDepts.includes(r.dept)) &&
    (!useDays  || useDays.includes(r.day))
  );
  if (!filtered.length) {
    resultEl.innerHTML = '<div style="color:#e03131;font-size:12px">조회된 강의실이 없습니다. 먼저 사업부/요일을 선택하고 조회하세요.</div>';
    return;
  }

  // 적용할 기준
  const simDept = document.getElementById('sim_dept').value;
  let simFee = parseInt(document.getElementById('sim_fee').value) || 0;
  let simCap = parseInt(document.getElementById('sim_cap').value) || 0;

  // 사업부 선택 시 평균값 자동 적용 (직접입력이 우선)
  if (simDept) {
    const deduped = getClassMapByDept(data.filter(r=>r.dept===simDept));
    if (deduped.length) {
      if (!simFee) simFee = Math.round(deduped.reduce((s,r)=>s+(r.stdFee||0),0)/deduped.length);
      if (!simCap) simCap = Math.round(deduped.reduce((s,r)=>s+(r.maxCapacity||0),0)/deduped.length);
    }
  }
  if (!simDept && !simFee && !simCap) {
    resultEl.innerHTML = '<div style="color:#e03131;font-size:12px">사업부를 선택하거나 수강료/정원을 입력하세요.</div>';
    return;
  }

  // ── 현재값 (classKey 기준 1회)
  const cur = aggOccMetric(filtered);

  // 시뮬용 수강료/정원 결정
  const fmtFee = simFee || null;  // null이면 기존 수강료 유지
  // classKey 기준 1행화
  const curClasses = getClassMapByDept(filtered);

  // ── 교체 시: 현재 학생수 유지, 수강료만 교체
  let swapSales = 0, swapStd = 0;
  curClasses.forEach(r => {
    const fee = fmtFee || r.stdFee || 0;
    swapSales += (r.curStudents||0) * fee;       // 발생매출(추정)
    swapStd   += (r.maxCapacity||0) * fee;       // 표준매출
  });

  // ── 정원 최대: 정원까지 꽉, 수강료 교체
  let maxSales = 0, maxStudents = 0;
  curClasses.forEach(r => {
    const fee = fmtFee || r.stdFee || 0;
    const cap = simCap || r.maxCapacity || 0;
    maxSales    += cap * fee;
    maxStudents += cap;
  });

  const rooms = cur.rooms; // 물리적 호실은 변동 없음
  const diff = (a, b) => {
    const d = a - b;
    const sign = d > 0 ? '+' : '';
    const color = d > 0 ? '#1a1a1a' : d < 0 ? '#e03131' : '#888780';
    return `<span style="color:${color};font-weight:700">${sign}${fmt(d)}</span>`;
  };

  const baseLabel = simDept ? `${simDept.replace('사업부','')} 기준` : '입력 조건';
  resultEl.innerHTML = `
  <div style="background:#fff;border-radius:8px;padding:14px;margin-top:8px">
    <div style="font-size:12px;font-weight:800;margin-bottom:10px;color:#27500a">
      시뮬레이션 결과 (${baseLabel}${simFee?` · 수강료 ${fmt(simFee)}원`:''}${simCap?` · 정원 ${simCap}명`:''})
    </div>
    <div style="overflow-x:auto">
    <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:520px">
      <thead><tr style="background:var(--surface2)">
        <th style="padding:8px;text-align:left;border:1px solid var(--border)">구분</th>
        <th style="padding:8px;text-align:right;border:1px solid var(--border)">발생매출(추정)</th>
        <th style="padding:8px;text-align:right;border:1px solid var(--border)">수강생</th>
        <th style="padding:8px;text-align:right;border:1px solid var(--border)">가동호실</th>
      </tr></thead>
      <tbody>
        <tr>
          <td style="padding:8px;border:1px solid var(--border);font-weight:700">현재</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${fmt(cur.curSales)}원</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${cur.students}명</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${rooms}개</td>
        </tr>
        <tr style="background:#f7f8fd">
          <td style="padding:8px;border:1px solid var(--border);font-weight:700">교체 시<br><span style="font-size:10px;color:var(--text-sub)">학생수 유지, 수강료 적용</span></td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${fmt(swapSales)}원<br>${diff(swapSales, cur.curSales)}</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${cur.students}명<br><span style="color:#888780">±0</span></td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${rooms}개</td>
        </tr>
        <tr style="background:#e7e8ed">
          <td style="padding:8px;border:1px solid var(--border);font-weight:700">정원 최대<br><span style="font-size:10px;color:var(--text-sub)">정원 꽉, 수강료 적용</span></td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${fmt(maxSales)}원<br>${diff(maxSales, cur.curSales)}</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${maxStudents}명<br>${diff(maxStudents, cur.students)}</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${rooms}개</td>
        </tr>
      </tbody>
    </table>
    </div>
    <div style="font-size:10px;color:var(--text-sub);margin-top:8px;line-height:1.5">
      ※ <strong>가동호실은 물리적 강의실 수</strong>라 시나리오와 무관하게 동일합니다.<br>
      ※ '교체 시'는 현재 학생이 그대로 유지된다는 가정, '정원 최대'는 모든 좌석이 찬다는 가정입니다.<br>
      ※ 실제 학생 유입(수요)은 데이터로 예측할 수 없어 포함하지 않았습니다.
    </div>
  </div>`;
}

// 시뮬레이션 모드 전환
function switchSimMode(mode) {
  const condBox = document.getElementById('sim_cond_box');
  const revBox  = document.getElementById('sim_reverse_box');
  const condBtn = document.getElementById('sim_mode_cond');
  const revBtn  = document.getElementById('sim_mode_reverse');
  const isCond = mode === 'cond';
  condBox.style.display = isCond ? 'block' : 'none';
  revBox.style.display  = isCond ? 'none' : 'block';
  condBtn.style.background  = isCond ? '#1a1a1a' : 'transparent';
  condBtn.style.color       = isCond ? '#fff' : 'var(--text-sub)';
  condBtn.style.borderColor = isCond ? '#1a1a1a' : 'var(--border)';
  revBtn.style.background  = isCond ? 'transparent' : '#1a1a1a';
  revBtn.style.color       = isCond ? 'var(--text-sub)' : '#fff';
  revBtn.style.borderColor = isCond ? 'var(--border)' : '#1a1a1a';
  document.getElementById('sim_result').innerHTML = '';
}

// ── 목표매출 역산: 필요 강의실 수
function runReverseSimulation() {
  const { data, useDepts, useDays } = getMetricSelection();
  const resultEl = document.getElementById('sim_result');
  const fmt = n => Math.round(n||0).toLocaleString('ko-KR');

  const filtered = data.filter(r =>
    (!useDepts || useDepts.includes(r.dept)) &&
    (!useDays  || useDays.includes(r.day))
  );
  if (!filtered.length) {
    resultEl.innerHTML = '<div style="color:#e03131;font-size:12px">조회된 강의실이 없습니다. 먼저 사업부/요일을 선택하고 조회하세요.</div>';
    return;
  }

  const cur = aggOccMetric(filtered);
  const curRooms = cur.rooms;
  if (!curRooms) { resultEl.innerHTML = '<div style="color:#e03131;font-size:12px">가동 호실이 0개입니다.</div>'; return; }

  // 강의실당 평균/만석 매출
  const avgPerRoom = cur.curSales / curRooms;   // 현실적 (현재 평균)
  const maxPerRoom = cur.maxSales / curRooms;   // 이상적 (만석 기준)

  // 목표 추가 매출 결정 (금액 우선, 없으면 %)
  const amount = parseInt(document.getElementById('rev_amount').value) || 0;
  const percent = parseFloat(document.getElementById('rev_percent').value) || 0;
  let targetAdd = 0, inputLabel = '';
  if (amount > 0) {
    targetAdd = amount;
    inputLabel = `추가 매출 ${fmt(amount)}원`;
  } else if (percent > 0) {
    targetAdd = cur.curSales * percent / 100;
    inputLabel = `현재 대비 +${percent}% (${fmt(targetAdd)}원)`;
  } else {
    resultEl.innerHTML = '<div style="color:#e03131;font-size:12px">목표 금액 또는 증가율을 입력하세요.</div>';
    return;
  }

  const needAvg = avgPerRoom > 0 ? Math.ceil(targetAdd / avgPerRoom) : 0;
  const needMax = maxPerRoom > 0 ? Math.ceil(targetAdd / maxPerRoom) : 0;

  const deptLabel = useDepts ? useDepts.map(d=>d.replace('사업부','')).join('+') : '전체 사업부';
  const dayLabel  = useDays  ? useDays.join('·')+'요일' : '전체 요일';

  resultEl.innerHTML = `
  <div style="background:#fff;border-radius:8px;padding:16px;margin-top:8px">
    <div style="font-size:12px;font-weight:800;margin-bottom:4px;color:#27500a">목표매출 역산 결과</div>
    <div style="font-size:11px;color:var(--text-sub);margin-bottom:14px">${deptLabel} / ${dayLabel} · 목표: ${inputLabel}</div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div style="padding:16px;background:#f7f8fd;border-radius:10px;border:2px solid #f0a020">
        <div style="font-size:12px;font-weight:700;color:#b5651d;margin-bottom:6px">현실적 (현재 운영 수준 유지)</div>
        <div style="font-size:32px;font-weight:800;color:#b5651d;font-family:'JetBrains Mono',monospace">+${needAvg}<span style="font-size:16px">개</span></div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:4px">강의실당 평균 ${fmt(avgPerRoom)}원 기준</div>
      </div>
      <div style="padding:16px;background:#e7e8ed;border-radius:10px;border:2px solid #1a1a1a">
        <div style="font-size:12px;font-weight:700;color:#27500a;margin-bottom:6px">이상적 (정원 만석 운영)</div>
        <div style="font-size:32px;font-weight:800;color:#1a1a1a;font-family:'JetBrains Mono',monospace">+${needMax}<span style="font-size:16px">개</span></div>
        <div style="font-size:11px;color:var(--text-sub);margin-top:4px">강의실당 만석 ${fmt(maxPerRoom)}원 기준</div>
      </div>
    </div>

    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <tbody>
        <tr style="background:var(--surface2)">
          <td style="padding:8px;border:1px solid var(--border);font-weight:700">현재 가동 호실</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${curRooms}개</td>
          <td style="padding:8px;border:1px solid var(--border);font-weight:700">현재 발생매출</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${fmt(cur.curSales)}원</td>
        </tr>
        <tr style="background:#f7f8fd">
          <td style="padding:8px;border:1px solid var(--border);font-weight:700">현실적 목표 후 총 호실</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${curRooms + needAvg}개</td>
          <td style="padding:8px;border:1px solid var(--border);font-weight:700">예상 총 매출</td>
          <td style="padding:8px;border:1px solid var(--border);text-align:right;font-family:monospace">${fmt(cur.curSales + needAvg*avgPerRoom)}원</td>
