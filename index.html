  const anoms=new Set(ROOMS.map(r=>({r,d:AE.detect(r,stats)})).filter(x=>x.d.grade!=='ok').map(x=>({id:x.r.room,g:x.d.grade})));
  const anomMap={};
  ROOMS.forEach(r=>{const d=AE.detect(r,stats);if(d.grade!=='ok')anomMap[r.key]=d.grade;});

  document.getElementById('roomGrid').innerHTML=ROOMS.filter(r=>r.building===curBldg&&r.fl===curFloor).sort((a,b)=>(parseInt(String(a.room).match(/\d+/)||0)-parseInt(String(b.room).match(/\d+/)||0))||String(a.room).localeCompare(String(b.room))).map(r=>{
    const g=anomMap[r.key];
    const anomCls=anomOn&&g?`anom-${g}`:'';
    const badge=anomOn&&g?`<div class="c-badge ${g}">${g==='danger'?'DANGER':'WARN'}</div>`:'';
    return `<div class="rcell ${selRoom===r.key?'sel':''} ${anomCls}" onclick="selectRoom('${r.key}')">
      <div class="scan-bar"></div>
      <div class="c-id">${r.room}</div>
      <div class="c-dept">${r.dept} · 정원${r.cap}</div>
      <div class="c-bar"><div class="c-bar-fill ${barClass(r.occ)}" style="width:${r.occ}%"></div></div>
      <div class="c-bottom">
        <span class="c-occ" style="color:${occColor(r.occ)}">${r.occ}<span class="c-occ-u">%</span></span>
        <span class="c-free">${r.free.length?`<b>${r.free.length}</b>일 공실`:''}</span>
      </div>
      ${badge}
    </div>`;
  }).join('');

  document.getElementById('sysAnomCnt').textContent=Object.keys(anomMap).length;
}

function toggleAnom(){
  anomOn=!anomOn;
  document.getElementById('anomBtn').classList.toggle('on',anomOn);
  renderGrid();
}

/* ── 방 선택 ── */
function selectRoom(key){
  selRoom=key; selDept=null; selAction=null;
  const r=ROOMS.find(x=>x.key===key);
  renderGrid();

  // 패널 슬라이드 인 + 그리드를 패널 왼쪽으로 좁힘
  document.getElementById('analysisCol').classList.add('open');
  document.getElementById('roomGrid').classList.add('panel-open');

  // 스캔 애니메이션
  document.querySelectorAll('.rcell').forEach(c=>{
    if(c.querySelector('.c-id')?.textContent===r.room){
      c.classList.add('scanning');
      setTimeout(()=>c.classList.remove('scanning'),380);
    }
  });

  const rr=r.std>0?Math.round(r.cur/r.std*100):0;
  document.getElementById('phType').textContent=`자산 · ${r.dept} · ${r.building}`;
  document.getElementById('phRoom').textContent=`${r.room}호`;
  document.getElementById('phSub').textContent=`가동률 ${r.occ}% · 달성률 ${rr}% · 빈요일 ${r.free.length}일`;

  maxStep=1; unlockStep(2);
  opsGoStep(1);
}

/* ── 패널 닫기 ── */
function closePanel(){
  document.getElementById('analysisCol').classList.remove('open');
  document.getElementById('roomGrid').classList.remove('panel-open');
  selRoom=null; selDept=null; selAction=null;
  curStep=1; maxStep=1;
  renderGrid();
}

/* ── 스텝 탭 ── */
function updateTabs(){
  for(let i=1;i<=3;i++){
    const el=document.getElementById('tab'+i);
    if(!el) continue;
    el.className='stab';
    if(i===curStep) el.classList.add('active');
    else if(i<curStep) el.classList.add('done');
    else if(i>maxStep) el.classList.add('locked');
  }
}
function opsGoStep(n){
  if(n>maxStep||!selRoom) return;
  curStep=n; updateTabs();
  const r=ROOMS.find(x=>x.key===selRoom);
  document.getElementById('approveBar').style.display=n===3?'block':'none';
  if(n===1) renderS1(r);
  if(n===2) renderS2(r);
  if(n===3) renderS3(r);
}
function tryStep(n){if(selRoom&&n<=maxStep) opsGoStep(n);}
function unlockStep(n){if(n>maxStep){maxStep=n;updateTabs();}}

/* ── Step1: Select ── */
function renderS1(r){
  const stats=AE.stats();
  const det=AE.detect(r,stats);
  const rr=r.std>0?Math.round(r.cur/r.std*100):0;
  const idle=Math.round(r.std*(r.free.length/7)/10000);
  const anomHtml=det.grade==='ok'
    ?`<div class="anom-ok">✓ 이상 패턴 없음</div>`
    :det.flags.map(f=>`<div class="aflag ${f.t}"><div class="af-code">${f.code}</div>${f.msg}</div>`).join('');
  const tsRes=AE.ts(r.key,curTsMode);
  let tsHtml;
  if(tsRes.status==='pending'){
    tsHtml=`<div class="ts-na"><div class="tna-lbl">${curTsMode.toUpperCase()} · 대기중</div><div><span class="tna-v">${tsRes.min-tsRes.cur}</span><span class="tna-u">개월 부족</span></div><div class="tna-d">현재 ${tsRes.cur}개월 · 자동 활성화 대기</div></div>`;
  } else {
    const tsColor=tsRes.grade==='danger'?'var(--danger)':tsRes.grade==='warn'?'var(--warn)':'var(--ok)';
    const tsHex=tsRes.grade==='danger'?'#FF3B3B':tsRes.grade==='warn'?'#FFB800':'#00FF87';
    const ser=tsRes.series;
    const W=300, H=46, padX=6, padT=6, padB=12;
    const occs=ser.map(s=>s.occ);
    const maxV=Math.max(...occs), minV=Math.min(...occs);
    const range=Math.max(maxV-minV,1);
    const plotW=W-padX*2, plotH=H-padT-padB;
    const pts=ser.map((s,i)=>{
      const x=padX+(ser.length>1?i/(ser.length-1)*plotW:plotW/2);
      const y=padT+(1-(s.occ-minV)/range)*plotH;
      return {x:+x.toFixed(1),y:+y.toFixed(1),occ:s.occ,ym:s.ym};
    });
    const linePath=pts.map((p,i)=>`${i===0?'M':'L'}${p.x} ${p.y}`).join(' ');
    const areaPath=`${linePath} L${pts[pts.length-1].x} ${padT+plotH} L${pts[0].x} ${padT+plotH} Z`;
    const dots=pts.map((p,i)=>{
      const last=i===pts.length-1;
      return `<circle cx="${p.x}" cy="${p.y}" r="${last?2.6:1.4}" fill="${last?tsHex:'rgba(255,255,255,0.35)'}"${last?` stroke="${tsHex}" stroke-width="0.5"`:''}/>`;
    }).join('');
    const lastP=pts[pts.length-1];
    const firstLbl=ser[0].ym.slice(2).replace('-','.');
    const lastLbl=ser[ser.length-1].ym.slice(2).replace('-','.');
    const svg=`<svg class="ts-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="tsg-${tsRes.grade}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${tsHex}" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="${tsHex}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${areaPath}" fill="url(#tsg-${tsRes.grade})"/>
      <path d="${linePath}" fill="none" stroke="${tsHex}" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
      ${dots}
      <text x="${pts[0].x}" y="${H-3}" class="ts-axl" text-anchor="start">${firstLbl}</text>
      <text x="${lastP.x}" y="${H-3}" class="ts-axl" text-anchor="end">${lastLbl}</text>
      <text x="${lastP.x-4}" y="${lastP.y-4}" class="ts-axv" text-anchor="end" fill="${tsHex}">${lastP.occ}%</text>
    </svg>`;
    tsHtml=`
      <div class="ts-active"><span class="ts-delta" style="color:${tsColor}">${tsRes.delta>0?'+':''}${tsRes.delta}<span style="font-size:8px">%p</span></span><span class="ts-msg">${tsRes.msg}</span></div>
      <div class="ts-chart">${svg}</div>`;
  }

  document.getElementById('panelBody').innerHTML=`
    <div class="sec">
      <div class="sec-label">현재 상태</div>
      <div class="stat-grid">
        <div class="stat-item"><div class="si-lbl">가동률</div><div class="si-val" style="color:${occColor(r.occ)}">${r.occ}<span class="si-u">%</span></div><div class="si-sub">${r.cls}개 수업</div></div>
        <div class="stat-item"><div class="si-lbl">매출달성률</div><div class="si-val" style="color:${rr<55?'var(--danger)':'var(--ink)'}">${rr}<span class="si-u">%</span></div><div class="si-sub">${Math.round(r.cur/10000)}만원</div></div>
        <div class="stat-item"><div class="si-lbl">빈 요일</div><div class="si-val" style="color:${r.free.length>=3?'var(--warn)':'var(--ink)'}">${r.free.length}<span class="si-u">일</span></div><div class="si-sub">${r.free.join('·')||'없음'}</div></div>
        <div class="stat-item"><div class="si-lbl">유휴원가</div><div class="si-val" style="color:var(--warn)">${idle}<span class="si-u">만</span></div><div class="si-sub">월 기회손실</div></div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-label">주간 점유 
  <span style="display:flex;gap:8px;align-items:center">
    <span style="font-size:6px;color:var(--accent)">■ 점유중</span>
    <span style="font-size:6px;color:var(--warn)">■ 활용가능</span>
  </span>
</div>
      <div class="day-strip">${OPS_DAYS_ARR.map(d=>{
  const isBusy=r.busy.includes(d);
  return `<div class="dpip ${isBusy?'busy':'free'}" title="${isBusy?'점유중':'활용가능'}">
    ${d}
    <span class="dpip-sub" style="font-size:5px;display:block;margin-top:1px;opacity:.7">${isBusy?'점유':'공실'}</span>
  </div>`;
}).join('')}</div>
    </div>
    <div class="sec">
      <div class="sec-label">이상탐지 Detection <span style="color:${det.grade==='danger'?'var(--danger)':det.grade==='warn'?'var(--warn)':'var(--ok)'}">${det.grade.toUpperCase()}</span></div>
      ${anomHtml}
    </div>
    <div class="sec">
      <div class="sec-label">시계열 탐지</div>
      <div class="ts-tabs">
        <button class="ts-tab ${curTsMode==='mom'?'on':''}" onclick="setTsMode('mom')">MoM</button>
        <button class="ts-tab ${curTsMode==='ma3'?'on':''}" onclick="setTsMode('ma3')">3MA</button>
        <button class="ts-tab ${curTsMode==='yoy'?'on':''}" onclick="setTsMode('yoy')">YoY</button>
      </div>
      ${tsHtml}
    </div>
    <div class="sec" style="border-bottom:none">
      <button class="ai-btn" onclick="opsGoStep(2)">적합도 분석 →</button>
    </div>`;
}
function setTsMode(m){curTsMode=m;const r=ROOMS.find(x=>x.key===selRoom);if(r)renderS1(r);}

/* ── Step2: Score ── */
function calcCross(r,dep){
  const p=DEPTP[dep];
  const fd=new Set(r.free),pd=new Set(p.days.split(''));
  let match=0;fd.forEach(d=>{if(pd.has(d))match++;});
  const a수강료=Math.round(p.fee*(twin수강료/100));
  const aCap=Math.round(p.cap*(twinCap/100));
  const addRev=match*a수강료*aCap*(twin등록률/100);
  const newOcc=Math.min(100,Math.round(r.occ+(match/7)*100));
  const fit=Math.min(Math.round((Math.min(a수강료*aCap/(520000*20),1)*0.45+(fd.size?match/fd.size:0)*0.30+(r.free.length/7)*0.25)*100),99);
  return {dep,fit,match,addRev,newOcc,p,a수강료,aCap};
}

function renderS2(r){
  const crosses=['초등','중등','고등'].map(d=>calcCross(r,d)).sort((a,b)=>b.fit-a.fit);
  const maxFit=crosses[0].fit;

  document.getElementById('panelBody').innerHTML=`
    <div class="sec">
      <div class="sec-label">교차 사용 시뮬 <span>클릭하여 선택</span></div>
      ${crosses.map(c=>`
        <div class="cross-item ${selDept===c.dep?'active':''}" onclick="pickDept('${c.dep}')">
          <span class="ci-name">${c.dep}</span>
          <div class="ci-bar"><div class="ci-bar-fill" style="width:${maxFit>0?c.fit/maxFit*100:0}%"></div></div>
          <span class="ci-fit">${c.fit}%</span>
          <span class="ci-rev">+${(c.addRev/10000).toFixed(0)}만</span>
          <span class="ci-tag">${c.dep===crosses[0].dep?'최적':c.dep===r.dept?'현재':''}</span>
        </div>`).join('')}
    </div>
    <div class="sec" id="timePat">
      <div class="sec-label">시간 패턴</div>
      <div class="time-pat">${selDept?renderTimePat(r,selDept):'사업부를 선택하세요'}</div>
    </div>
    <div class="sec" style="border-bottom:none">
      <button class="ai-btn" id="toS3Btn" onclick="opsGoStep(3)" ${selDept?'':'disabled'} style="${selDept?'':'opacity:.25'}">미리보기·승인 →</button>
    </div>`;
}

function renderTimePat(r,dep){
  const c=calcCross(r,dep),p=DEPTP[dep];
  return `<b>${dep}</b> · ${p.time}<br>선호요일 ${p.days}<br>매칭 <span class="accent">${c.match}일</span> · 충돌 <span style="color:var(--ok)">없음</span><br>가동률 ${r.occ} → <span class="accent">${c.newOcc}%</span>`;
}

function pickDept(dep){
  selDept=dep;
  document.querySelectorAll('.cross-item').forEach(el=>{
    el.classList.toggle('active',el.querySelector('.ci-name')?.textContent===dep);
  });
  const tp=document.getElementById('timePat');
  if(tp){
    const r=ROOMS.find(x=>x.key===selRoom);
    tp.innerHTML=`<div class="sec-label">시간 패턴</div><div class="time-pat">${renderTimePat(r,dep)}</div>`;
  }
  const btn=document.getElementById('toS3Btn');
  if(btn){btn.disabled=false;btn.style.opacity='1';}
  unlockStep(3);
}

/* ── Step3: 미리보기·승인 (슬라이더 + 액션안 + AI 자동분석 통합) ── */
function renderS3(r){
  const idle=Math.round(r.std*(r.free.length/7)/10000);
  const rr=r.std>0?Math.round(r.cur/r.std*100):0;

  document.getElementById('approveBar').style.display='block';
  document.getElementById('aprBtn').disabled=true;
  document.getElementById('aprSel').textContent='액션안을 선택하면 AI 분석 후 승인할 수 있습니다';

  document.getElementById('panelBody').innerHTML=`
    <div class="sec">
      <div class="sec-label">Digital Twin · 조건 설정 <span>슬라이더 → 액션안 실시간 반영</span></div>
      <div style="padding:2px 0">
        <div class="twin-row"><span class="tw-lbl">등록률</span><input class="tw-sl" type="range" min="40" max="100" step="1" value="${twin등록률}" oninput="setTwin('enroll',this.value)"><span class="tw-v" id="tv-enroll">${twin등록률}%</span></div>
        <div class="twin-row"><span class="tw-lbl">Cap</span><input class="tw-sl" type="range" min="50" max="150" step="1" value="${twinCap}" oninput="setTwin('cap',this.value)"><span class="tw-v" id="tv-cap">${twinCap}%</span></div>
        <div class="twin-row"><span class="tw-lbl">수강료</span><input class="tw-sl" type="range" min="80" max="130" step="1" value="${twin수강료}" oninput="setTwin('fee',this.value)"><span class="tw-v" id="tv-fee">${twin수강료}%</span></div>
      </div>
    </div>
    <div class="sec" id="s3kpi"></div>
    <div class="sec" id="s3acts"></div>
    <div class="sec" style="padding:0;border-bottom:none">
      <div class="ai-res" id="aiRes"></div>
    </div>`;
  renderS3Body(r);
  unlockStep(3);
}

/* 슬라이더 변동 시 KPI + 액션안만 다시 그림 (슬라이더 DOM은 유지) */
function renderS3Body(r){
  const crosses=['초등','중등','고등'].map(d=>calcCross(r,d)).sort((a,b)=>b.fit-a.fit);
  const best=crosses[0],second=crosses[1];
  const dep=selDept||best.dep;
  const c=calcCross(r,dep);
  const idle=Math.round(r.std*(r.free.length/7)/10000);
  const rr=r.std>0?Math.round(r.cur/r.std*100):0;

  const kpi=document.getElementById('s3kpi');
  if(kpi) kpi.innerHTML=`
    <div class="sec-label">예상 결과 · ${dep}</div>
    <div class="kpi-line"><span class="kl-lbl">추가 매출</span><span class="kl-val" style="color:var(--ok)">+${(c.addRev/10000).toFixed(0)}<span class="kl-u">만</span></span></div>
    <div class="kpi-line"><span class="kl-lbl">가동률</span><span class="kl-val">${r.occ}<span class="kl-u">%</span><span class="kl-delta d-up">→ ${c.newOcc}%</span></span></div>
    <div class="kpi-line"><span class="kl-lbl">유휴원가</span><span class="kl-val" style="color:var(--warn)">${idle}<span class="kl-u">만/월</span></span></div>
    <div class="kpi-line" style="border-bottom:none"><span class="kl-lbl">매출달성률</span><span class="kl-val" style="color:${rr<55?'var(--danger)':'var(--ink)'}">${rr}<span class="kl-u">%</span></span></div>`;

  const acts=[
    {n:'01',t:`${best.dep} 반 즉시 개설`,
     d:`빈 ${r.free.length}일에 ${best.dep} 반 개설. 충돌 없음. 적합도 ${best.fit}%.`,
     kvs:[{k:'Rev',v:`+${(best.addRev/10000).toFixed(0)}만`},{k:'Occ',v:`→${best.newOcc}%`},{k:'Fit',v:`${best.fit}%`}]},
    {n:'02',t:`${second.dep} 파일럿 개설`,
     d:`1개 파일럿 선개설 후 성과 확인. 리스크 최소화.`,
     kvs:[{k:'Rev',v:`+${Math.round(second.addRev*.5/10000)}만`},{k:'리스크',v:'낮음'},{k:'Fit',v:`${second.fit}%`}]},
    {n:'03',t:'Hold · 현상 유지',
     d:`현 운영 유지. 유휴원가 ${idle}만원/월 발생 인지.`,
     kvs:[{k:'Rev',v:'±0'},{k:'Idle',v:`${idle}만/월`},{k:'리스크',v:'낮음'}]}
  ];
  const actsEl=document.getElementById('s3acts');
  if(actsEl) actsEl.innerHTML=`
    <div class="sec-label">액션 가이드 <span>선택 시 AI 자동 분석</span></div>
    ${acts.map(a=>`
      <div class="act-item ${selAction===a.n?'sel':''}" onclick="pickAction('${a.n}','${a.t}')">
        <div class="act-row1"><span class="act-num">${a.n}</span><span class="act-title">${a.t}</span></div>
        <div class="act-desc">${a.d}</div>
        <div class="act-kvs">${a.kvs.map(k=>`<span class="act-kv"><span class="ak">${k.k} </span><span class="av">${k.v}</span></span>`).join('')}</div>
      </div>`).join('')}`;
}

function setTwin(t,v){
  if(t==='enroll') twin등록률=+v;
  if(t==='cap') twinCap=+v;
  if(t==='fee') twin수강료=+v;
  const el=document.getElementById('tv-'+t);
  if(el) el.textContent=v+'%';
  const r=ROOMS.find(x=>x.key===selRoom);
  if(r&&curStep===3) renderS3Body(r);
}

/* ── 액션안 선택 → AI 자동 분석 ── */
function pickAction(num,title){
  selAction=num;
  document.querySelectorAll('.act-item').forEach(el=>{
    el.classList.toggle('sel',el.querySelector('.act-num')?.textContent===num);
  });
  document.getElementById('aprBtn').disabled=true;
  document.getElementById('aprSel').innerHTML=`<b>${num} · ${title}</b> · AI 분석 중…`;
  runAI(num,title);
}

/* ── AI 자동 분석 ── */
/* ── AI 자동 분석 (가상 모드) ── */
var AI_DEMO = true;  // true = 가상분석 / false = 실제 Claude API

function buildDemoAnalysis(num, title, r, det, best, second, rr, idle){
  var deptName = (num==='01') ? best.dep : (num==='02') ? second.dep : r.dept;
  var addRev = (num==='01') ? Math.round(best.addRev/10000)
             : (num==='02') ? Math.round(second.addRev*0.5/10000) : 0;
  var newOcc = (num==='01') ? best.newOcc : (num==='02') ? Math.round((r.occ+second.newOcc)/2) : r.occ;
  var devMsg = det.flags.map(function(f){return f.msg;}).join(', ') || '이상 없음';

  var blocks;
  if(num==='01'){
    blocks = [
      ['문제 진단', r.room+'호는 빈 요일 '+r.free.length+'일로 가동률 '+r.occ+'%, '+devMsg+' 상태입니다. 유휴원가가 월 '+idle+'만원 발생 중입니다.'],
      ['권장 근거', deptName+' 수요가 빈 요일과 매칭되며 충돌 없이 즉시 개설 가능합니다. 적합도 '+best.fit+'%로 3개 안 중 최상위입니다.'],
      ['리스크', '초기 등록률이 60% 미만이면 추가매출이 '+Math.round(addRev*0.6)+'만원으로 축소되나, 유휴원가 대비 여전히 순증입니다.']
    ];
  } else if(num==='02'){
    blocks = [
      ['문제 진단', r.room+'호 공실 '+r.free.length+'일 중 '+deptName+' 선호요일은 '+second.match+'일로 부분 매칭됩니다. 적합도는 '+second.fit+'%로 1안보다 낮습니다.'],
      ['권장 근거', '1개 반만 선개설해 수요를 검증하면 미달 리스크를 절반으로 낮출 수 있습니다. 추가매출은 '+addRev+'만원으로 추정됩니다.'],
      ['리스크', '파일럿 2개월간 추가매출이 제한되어 유휴원가 회수 속도가 느립니다.']
    ];
  } else {
    var annual = Math.round(idle*12);
    blocks = [
      ['문제 진단', '현 운영 유지 시 '+r.room+'호 유휴원가 월 '+idle+'만원이 지속 발생합니다. 가동률 '+r.occ+'% 위험 등급이 해소되지 않습니다.'],
      ['권장 근거', '추가 인력·홍보 부담이 없어 단기 운영 리스크는 가장 낮습니다.'],
      ['리스크', '연간 약 '+annual+'만원의 기회손실이 누적되며 가동률 '+r.occ+'%가 고착됩니다.']
    ];
  }
  return blocks;
}

async function runAI(num,title){
  const r=ROOMS.find(x=>x.key===selRoom);if(!r)return;
  const res=document.getElementById('aiRes');
  if(res){res.classList.add('show');res.innerHTML=`<div class="ai-loading"><span class="ai-spin" style="display:block"></span><span style="font-size:8px;color:var(--ink2);letter-spacing:1px">AI 분석 중…</span></div>`;}
  const stats=AE.stats(),det=AE.detect(r,stats);
  const crosses=['초등','중등','고등'].map(d=>calcCross(r,d)).sort((a,b)=>b.fit-a.fit);
  const best=crosses[0],second=crosses[1];
  const rr=r.std>0?Math.round(r.cur/r.std*100):0;
  const idle=Math.round(r.std*(r.free.length/7)/10000);

  function renderResult(blocks){
    const blkHtml=blocks.map(function(b){return `<div class="air-blk"><div class="air-h">${b[0]}</div><div class="air-txt">${b[1]}</div></div>`;}).join('');
    if(res){res.innerHTML=`<div class="air-grade ${det.grade}">${det.grade.toUpperCase()} · AI ANALYSIS · ${num}안</div><div class="air-facts"><span class="air-f">Occ <b>${r.occ}%</b></span><span class="air-f">Rev <b>${rr}%</b></span><span class="air-f">Idle <b>${idle}만</b></span><span class="air-f">Best <b>${best.dep}</b></span></div>${blkHtml}`;}
    document.getElementById('aprBtn').disabled=false;
    document.getElementById('aprSel').innerHTML=`선택됨 <b>${num} · ${title}</b> · 분석 완료`;
  }

  if(AI_DEMO){
    // 가상 분석: 1.1초 지연 후 데이터 기반 결과
    const blocks=buildDemoAnalysis(num,title,r,det,best,second,rr,idle);
    setTimeout(function(){renderResult(blocks);},1100);
    return;
  }

  const prompt=`학원 운영 분석 시스템. 선택안: ${num} ${title}. 규칙: 수치 없는 문장 금지. 추측 금지. 【문제진단】【권장근거】【리스크】 3단 각 2문장 이내.
이상탐지: ${det.grade} · ${det.flags.map(f=>f.msg).join(' / ')}
강의실: ${r.room}호 ${r.dept} · 가동률${r.occ}% · 달성률${rr}% · 유휴원가${idle}만
최적교차: ${best.dep} 적합도${best.fit}% +${(best.addRev/10000).toFixed(0)}만 →${best.newOcc}%`;
  try{
    const d=await(await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})})).json();
    const text=d.content?.find(c=>c.type==='text')?.text||'오류';
    if(res){res.innerHTML=`<div class="air-grade ${det.grade}">${det.grade.toUpperCase()} · AI ANALYSIS · ${num}안</div><div class="air-facts"><span class="air-f">Occ <b>${r.occ}%</b></span><span class="air-f">Rev <b>${rr}%</b></span><span class="air-f">Idle <b>${idle}만</b></span><span class="air-f">Best <b>${best.dep}</b></span></div><div class="air-txt">${text.replace(/\n/g,'<br>')}</div>`;}
    document.getElementById('aprBtn').disabled=false;
    document.getElementById('aprSel').innerHTML=`선택됨 <b>${num} · ${title}</b> · 분석 완료`;
  }catch(e){
    if(res){res.innerHTML=`<div class="air-txt" style="color:var(--danger)">Error: ${e.message}</div>`;}
    document.getElementById('aprBtn').disabled=false;
    document.getElementById('aprSel').innerHTML=`선택됨 <b>${num} · ${title}</b> · 분석 실패(수동 승인)`;
  }
}

function doApprove(){
  const r=ROOMS.find(x=>x.key===selRoom);
  alert(`✓ 승인 완료\n${r.room}호 · ${selAction}안 확정`);
}
