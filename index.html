<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Flow Education 총무기획팀 Graph RAG 임차료 배부 대시보드">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graph RAG 임차료 배부 대시보드</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #eef0f3;
  --surface: #ffffff;
  --surface2: #e7e9ed;
  --border: #d6d8dd;
  --text: #1f2024;
  --text-sub: #5e6066;
  --accent: #1a1a1a;
  --accent2: #5a5a5a;
  --nav-active: #2c2c2c;
  --success: #3b6d11;
  --warning: #b5651d;
  --danger: #c0392b;
  --c-tedi: #b5651d;
  --c-youngjae: #3b6d11;
  --c-jungsa: #5f5e5a;
  --c-mix: #97c459;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── 로그인 (팔란티어 다크) ── */
#loginScreen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #0a0c0f; z-index: 9999;
}
.login-box {
  background: transparent; border: none; border-radius: 0;
  padding: 0; width: 280px;
}
.login-line { width: 20px; height: 1px; background: #fff; margin-bottom: 26px; }
.login-box h2 { font-size: 20px; font-weight: 500; color: #fff; letter-spacing: -.3px; margin-bottom: 6px; }
.login-box p { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 28px; }
.login-box input {
  width: 100%; padding: 12px 13px; background: #fff; border: 1px solid transparent;
  border-radius: 6px; color: #111; font-size: 13px; margin-bottom: 13px; outline: none;
  font-family: 'Pretendard', -apple-system, sans-serif;
}
.login-box input::placeholder { color: #9a9a9a; }
.login-box input:focus { border-color: #0a0c0f; }
.login-box button {
  width: 100%; padding: 13px; background: #fff; color: #0a0c0f; border: none;
  border-radius: 6px; font-size: 12px; font-weight: 700; cursor: pointer; letter-spacing: 2px;
  font-family: 'Pretendard', -apple-system, sans-serif;
}
.login-box button:hover { background: #e5e5e5; }
.login-err { color: #FF6B6B; font-size: 12px; margin-top: 10px; display: none; }
.login-hint { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 18px; text-align: center; letter-spacing: .3px; }

/* ── 앱 레이아웃 ── */
#app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }


/* ── 8:2 메인 레이아웃 ── */
.main-layout {
  display: flex; flex: 1; overflow: hidden; min-height: 0;
}
#tabContents {
  flex: 1; overflow-y: auto; min-width: 0;
  transition: all .3s ease;
}

/* ── AI 사이드 패널 ── */
.ai-sidebar {
  width: 300px; min-width: 300px; max-width: 300px;
  background: var(--surface); border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: all .3s ease; overflow: hidden;
}
.ai-sidebar.collapsed { width: 0; min-width: 0; max-width: 0; border: none; }

.ai-sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid var(--border);
  background: var(--surface2); flex-shrink: 0;
}
.ai-sidebar-header .title {
  font-size: 13px; font-weight: 800; color: var(--accent);
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.ai-sidebar-header .collapse-btn {
  background: none; border: none; color: var(--text-sub); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 4px; line-height: 1;
  transition: color .15s;
}
.ai-sidebar-header .collapse-btn:hover { color: var(--text); }

.ai-sidebar-body {
  display: flex; flex-direction: column; flex: 1; overflow: hidden; padding: 12px;
}
.ai-key-section {
  display: flex; gap: 6px; margin-bottom: 10px; align-items: center; flex-shrink: 0;
}
.ai-key-section input {
  flex: 1; padding: 6px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 11px; outline: none;
  font-family: 'JetBrains Mono', monospace; min-width: 0;
}
.ai-key-section input:focus { border-color: var(--accent); }
.ai-key-section input::placeholder { color: var(--text-sub); font-size: 10px; }

.ai-sidebar-messages {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
  padding: 4px 0; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.ai-sidebar-messages::-webkit-scrollbar { width: 4px; }
.ai-sidebar-messages::-webkit-scrollbar-track { background: transparent; }
.ai-sidebar-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.si-msg {
  padding: 8px 10px; border-radius: 8px; font-size: 12px; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
}
.si-msg.user {
  background: var(--accent); color: #fff; align-self: flex-end;
  max-width: 90%; border-bottom-right-radius: 3px;
}
.si-msg.ai {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); align-self: flex-start;
  max-width: 95%; border-bottom-left-radius: 3px;
}
.si-msg.loading { color: var(--text-sub); font-style: italic; background: var(--surface2); }

.ai-sidebar-input {
  display: flex; gap: 6px; margin-top: 10px; flex-shrink: 0;
}
.ai-sidebar-input textarea {
  flex: 1; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12px; outline: none; resize: none;
  font-family: 'Pretendard', -apple-system, sans-serif; height: 60px; min-width: 0;
}
.ai-sidebar-input textarea:focus { border-color: var(--accent); }
.ai-sidebar-input button {
  padding: 0 12px; background: var(--accent); color: #fff; border: none;
  border-radius: 8px; font-size: 12px; font-weight: 700; cursor: pointer;
  font-family: 'Pretendard', -apple-system, sans-serif; align-self: stretch; flex-shrink: 0;
}
.ai-sidebar-input button:hover { background: #000000; }

.ai-toggle-fab {
  position: fixed; right: 0; top: 50%; transform: translateY(-50%);
  width: 28px; height: 72px; background: var(--accent); border: none;
  border-radius: 8px 0 0 8px; color: #fff; font-size: 11px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  box-shadow: -2px 0 12px rgba(0,0,0,.15); z-index: 200;
  writing-mode: vertical-rl; font-family: 'Pretendard', -apple-system, sans-serif; font-weight: 800;
  letter-spacing: 1px; padding: 8px 0;
}
.ai-toggle-fab.visible { display: flex; }

.ai-sidebar-footer {
  display: flex; justify-content: flex-end; margin-top: 6px; flex-shrink: 0;
}
.ai-clear-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-sub); font-size: 11px; padding: 3px 10px; cursor: pointer;
  font-family: 'Pretendard', -apple-system, sans-serif;
}
.ai-clear-btn:hover { border-color: var(--danger); color: var(--danger); }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
header .logo { font-size: 15px; font-weight: 800; color: var(--accent); display: flex; align-items: center; gap: 8px; }
header .user-info { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 12px; }
header .user-info span { color: var(--text); font-weight: 700; }
header button.logout {
  padding: 4px 12px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; color: var(--text-sub); font-size: 12px; cursor: pointer;
  font-family: 'Pretendard', -apple-system, sans-serif;
}

/* ── 탭 네비 ── */
/* ── 좌측 사이드바 (구 가로 탭) ── */
.side-nav {
  width: 190px; min-width: 190px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; padding: 8px 0;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.side-nav::-webkit-scrollbar { width: 4px; }
.side-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.side-grp {
  font-size: 9px; color: var(--text-sub); opacity: .6;
  padding: 10px 16px 4px; letter-spacing: 1px; font-weight: 800; text-transform: uppercase;
}
.side-divider { height: 1px; background: var(--border); margin: 6px 14px; }
.tab-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 8px 16px; border: none; border-left: 2px solid transparent;
  font-size: 12px; font-weight: 700; cursor: pointer; text-align: left;
  background: transparent; color: var(--text-sub);
  font-family: 'Pretendard', -apple-system, sans-serif; transition: all .12s;
}
.tab-btn:hover { background: var(--surface2); color: var(--text); }
.tab-btn.active { background: var(--nav-active); color: #fff; border-left-color: #000; }
.tab-btn.ops { position: relative; }
.tab-btn.ops .nw {
  position: absolute; right: 12px; font-size: 7px; background: var(--nav-active); color: #fff;
  padding: 1px 5px; border-radius: 3px; letter-spacing: .5px;
}
/* 헤더 네비 버튼 (새로고침) */
.nav-btns { display: flex; gap: 6px; margin-left: 14px; }
.nav-btn {
  width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text-sub); cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 13px; transition: .12s;
}
.nav-btn:hover:not(:disabled) { background: var(--surface2); color: var(--nav-active); border-color: #999; }
.nav-btn:disabled { opacity: .35; cursor: not-allowed; }

/* 탭 공통 뒤로가기 바 */
.tab-backbar {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.tab-backbar .back-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 11px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--surface); color: var(--text-sub); font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: 'Pretendard', -apple-system, sans-serif; transition: .12s; flex-shrink: 0;
}
.tab-backbar .back-btn:hover:not(:disabled) { background: var(--surface2); color: var(--nav-active); border-color: #999; }
.tab-backbar .back-btn:disabled { opacity: .35; cursor: not-allowed; }
.tab-backbar .crumb {
  font-size: 11px; color: var(--text-sub); display: flex; align-items: center; gap: 6px;
}
.tab-backbar .crumb .cur { color: var(--nav-active); font-weight: 700; }
.tab-backbar .crumb .sep { opacity: .4; }
/* 운영콘솔(다크) 안의 백바는 다크 톤 */
#tab-ops_console .tab-backbar { background: #0a0e12; border-bottom-color: rgba(255,255,255,0.08); }
#tab-ops_console .tab-backbar .back-btn { background: transparent; border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.6); }
#tab-ops_console .tab-backbar .back-btn:hover:not(:disabled) { background: rgba(0,212,255,0.08); color: #00D4FF; border-color: rgba(0,212,255,0.3); }
#tab-ops_console .tab-backbar .crumb { color: rgba(255,255,255,0.4); }
#tab-ops_console .tab-backbar .crumb .cur { color: #00D4FF; }


/* ── 컨텐츠 영역 ── */
.tab-content { display: none; padding: 24px; flex: 1; }
.tab-content.active { display: block; }

/* ── 공통 카드 ── */
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 20px; margin-bottom: 16px;
}
.card-title {
  font-size: 13px; font-weight: 800; color: var(--text-sub); text-transform: uppercase;
  letter-spacing: .5px; margin-bottom: 16px;
}

/* ── KPI 카드 그리드 ── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--accent);
}
.kpi-card.c-tedi::before { background: var(--c-tedi); }
.kpi-card.c-youngjae::before { background: var(--c-youngjae); }
.kpi-card.c-jungsa::before { background: var(--c-jungsa); }
.kpi-card.c-total::before { background: var(--accent); }
.kpi-label { font-size: 11px; color: var(--text-sub); font-weight: 700; margin-bottom: 6px; }
.kpi-value { font-size: 22px; font-weight: 800; color: var(--text); font-family: 'JetBrains Mono', monospace; }
.kpi-sub { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

/* ── 테이블 ── */
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 8px 12px; text-align: left; color: var(--text-sub); font-weight: 700; font-size: 11px;
     border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: .3px; }
td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.num { text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

/* ── 배지 ── */
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700;
}
.badge.A { background: rgba(92,124,250,.18); color: var(--accent); }
.badge.B { background: rgba(72,219,251,.18); color: var(--accent2); }
.badge.E { background: rgba(255,107,107,.18); color: var(--danger); }
.badge.tedi { background: rgba(247,103,7,.18); color: var(--c-tedi); }
.badge.youngjae { background: rgba(47,158,68,.18); color: var(--c-youngjae); }
.badge.jungsa { background: rgba(25,113,194,.18); color: var(--c-jungsa); }
.badge.mix { background: rgba(156,54,181,.18); color: var(--c-mix); }

/* ── 히트맵 ── */
.heatmap-wrap { overflow-x: auto; }
.heatmap { border-collapse: collapse; min-width: 500px; }
.heatmap th { padding: 6px 10px; font-size: 11px; color: var(--text-sub); text-align: center; font-weight: 700; }
.heatmap td { width: 80px; height: 38px; text-align: center; font-size: 11px; font-weight: 700;
              border: 1px solid var(--bg); border-radius: 4px; cursor: default; }
.hm-empty { background: var(--surface2); color: var(--text-sub); }
.hm-tedi { background: rgba(217,72,15,.15); color: #6b3410; }
.hm-youngjae { background: rgba(47,158,68,.15); color: #27500a; }
.hm-jungsa { background: rgba(24,100,171,.15); color: #27500a; }
.hm-mix { background: rgba(112,72,232,.15); color: #27500a; }

/* ── 시간표 ── */
.tt-wrap { overflow-x: auto; }
.tt-table { border-collapse: collapse; min-width: 560px; }
.tt-table th { padding: 6px 10px; font-size: 11px; color: var(--text-sub); text-align: center; font-weight: 700; }
.tt-table td { height: 36px; border: 1px solid var(--border); font-size: 11px; text-align: center; padding: 4px; }
.tt-empty { background: var(--surface2); }
.tt-tedi { background: rgba(217,72,15,.12); color: #6b3410; }
.tt-youngjae { background: rgba(47,158,68,.12); color: #27500a; }
.tt-jungsa { background: rgba(24,100,171,.12); color: #27500a; }
.tt-mix { background: rgba(112,72,232,.12); color: #27500a; }

/* ── 바 차트 ── */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 12px; }
.bar-label { width: 80px; font-size: 12px; color: var(--text-sub); text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; height: 22px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px;
            font-size: 11px; font-weight: 700; color: #fff; transition: width .6s ease; white-space: nowrap; }
.bar-val { width: 100px; font-size: 12px; font-family: 'JetBrains Mono', monospace;
           text-align: right; flex-shrink: 0; }

/* ── 입력 탭 ── */
.inp-steps { display: flex; gap: 0; margin-bottom: 24px; }
.inp-step {
  flex: 1; padding: 10px 16px; background: var(--surface2); border: 1px solid var(--border);
  font-size: 13px; font-weight: 700; color: var(--text-sub); text-align: center;
}
.inp-step:first-child { border-radius: 8px 0 0 8px; }
.inp-step:last-child { border-radius: 0 8px 8px 0; }
.inp-step.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.inp-step.done { background: rgba(81,207,102,.15); color: var(--success); border-color: var(--success); }

.step-panel { display: none; }
.step-panel.active { display: block; }

select, .inp-select {
  padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer;
  font-family: 'Pretendard', -apple-system, sans-serif; outline: none;
}
select:focus, .inp-select:focus { border-color: var(--accent); }

.btn {
  padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
  border: none; font-family: 'Pretendard', -apple-system, sans-serif; transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #000000; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-success { background: var(--success); color: #fff; }

/* ── 시간표 입력 그리드 ── */
.tt-inp-wrap { overflow-x: auto; margin-top: 16px; }
.tt-inp { border-collapse: collapse; }
.tt-inp th { padding: 6px 10px; font-size: 11px; color: var(--text-sub); font-weight: 700; text-align: center; }
.tt-inp td { border: 1px solid var(--border); }
.tt-inp .room-label { padding: 6px 10px; font-size: 12px; color: var(--text); white-space: nowrap;
                      background: var(--surface2); font-weight: 700; }
.tt-cell {
  width: 110px; min-width: 110px; height: 40px; background: var(--surface2); cursor: pointer;
  font-size: 10px; text-align: center; vertical-align: middle; padding: 2px;
  transition: background .1s; position: relative; color: var(--text-sub);
}
.tt-cell:hover { background: #e4e8f5; }
.tt-cell.filled { font-weight: 700; }
.tt-cell.tedi-fill { background: rgba(217,72,15,.15); color: #6b3410; }
.tt-cell.youngjae-fill { background: rgba(47,158,68,.15); color: #27500a; }
.tt-cell.jungsa-fill { background: rgba(24,100,171,.15); color: #27500a; }

/* ── 관리자 탭 ── */
.admin-section { margin-bottom: 24px; }
.admin-section h3 { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 12px;
                     border-left: 3px solid var(--accent); padding-left: 10px; }
.log-table td { font-size: 12px; font-family: 'JetBrains Mono', monospace; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px;
  background: var(--accent); border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.18); z-index: 500; transition: all .2s;
}
.fab:hover { transform: scale(1.1); background: #000000; }

/* ── 모달 ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 1000;
  display: none; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px; width: 460px; max-width: 95vw;
}
.modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
.modal-row { margin-bottom: 12px; }
.modal-row label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 4px; font-weight: 700; }
.modal-row select, .modal-row textarea, .modal-row input {
  width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; font-family: 'Pretendard', -apple-system, sans-serif; outline: none;
}
.modal-row textarea { height: 80px; resize: vertical; }
.modal-row select:focus, .modal-row input:focus { border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

/* ── 전월/당월 비교 ── */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.compare-col { background: var(--surface2); border-radius: 10px; padding: 16px; }
.compare-col h4 { font-size: 12px; font-weight: 800; color: var(--text-sub); margin-bottom: 12px;
                  text-transform: uppercase; letter-spacing: .4px; }
.diff-up { color: var(--danger); }
.diff-dn { color: var(--success); }
.diff-eq { color: var(--text-sub); }

/* ── Claude AI 패널 ── */
.ai-panel { display: flex; flex-direction: column; gap: 12px; }
.ai-input-row { display: flex; gap: 8px; }
.ai-input-row input {
  flex: 1; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none;
  font-family: 'Pretendard', -apple-system, sans-serif;
}
.ai-input-row input:focus { border-color: var(--accent); }
.ai-messages { min-height: 200px; max-height: 420px; overflow-y: auto;
               background: var(--surface2); border-radius: 8px; padding: 16px;
               display: flex; flex-direction: column; gap: 10px; }
.ai-msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; max-width: 90%; }
.ai-msg.user { background: var(--accent); color: #fff; align-self: flex-end; }
.ai-msg.ai { background: var(--surface); border: 1px solid var(--border); align-self: flex-start; color: var(--text); }
.ai-msg.loading { color: var(--text-sub); font-style: italic; }
.ai-key-row { display: flex; gap: 8px; align-items: center; }
.ai-key-row input {
  flex: 1; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12px; outline: none;
  font-family: 'JetBrains Mono', monospace;
}
.ai-key-row input:focus { border-color: var(--accent); }
.ai-key-label { font-size: 11px; color: var(--text-sub); white-space: nowrap; font-weight: 700; }

/* ── 입력탭 건물/관 선택 ── */
.bldg-pick {
  padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px;
  cursor: pointer; transition: all .15s; background: var(--surface);
}
.bldg-pick:hover:not(.disabled) { border-color: var(--accent); background: #ebecf1; }
.bldg-pick.selected { border-color: var(--accent); background: #e7e8ed; }
.bldg-pick.disabled { opacity: .45; cursor: not-allowed; }

.campus-pick-btn {
  padding: 8px 18px; border: 2px solid var(--border); border-radius: 20px;
  background: var(--surface); color: var(--text); font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  font-family: 'Pretendard', -apple-system, sans-serif; transition: all .15s;
}
.campus-pick-btn:hover { border-color: var(--accent); }
.campus-pick-btn.selected { border-color: var(--accent); background: #e7e8ed; color: var(--accent); }

/* ── 변경된 셀 표시 ── */
.tt-cell-modified { outline: 2px solid var(--warning) !important; outline-offset: -2px; }

/* ── 반응형 ── */
@media(max-width:768px) {
  .compare-grid { grid-template-columns: 1fr; }
  .tab-nav { padding: 8px 12px; }
  .tab-content { padding: 16px 12px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
}

.occ-line{stroke-dasharray:1600;stroke-dashoffset:1600;animation:occDraw 1.15s ease forwards}
.occ-area{opacity:0;animation:occFade .9s ease .15s forwards}
.occ-pt{transform-box:fill-box;transform-origin:center;opacity:0;animation:occPop .45s cubic-bezier(.2,.8,.2,1) forwards}
.occ-bar{transform-box:fill-box;transform-origin:bottom;transform:scaleY(0);animation:occBarGrow .6s cubic-bezier(.2,.8,.2,1) forwards}
.occ-dash{stroke-dasharray:5 4;opacity:0;animation:occDashIn .9s ease .35s forwards}
.occ-node{opacity:0;animation:occFadeN .5s ease forwards;transition:transform .15s ease;transform-box:fill-box;transform-origin:center;cursor:pointer}
.occ-node:hover{transform:scale(1.4)}
.occ-node:hover .occ-dot{filter:drop-shadow(0 0 5px currentColor)}
@keyframes occDraw{to{stroke-dashoffset:0}}
@keyframes occFade{to{opacity:1}}
@keyframes occPop{from{opacity:0;transform:scale(.2)}to{opacity:1;transform:scale(1)}}
@keyframes occBarGrow{to{transform:scaleY(1)}}
@keyframes occDashIn{to{opacity:1}}
@keyframes occFadeN{to{opacity:1}}
.occ-tbl-wrap{margin-top:14px;overflow-x:auto}
.occ-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.occ-tbl th{padding:7px 8px;color:var(--text-sub);font-weight:700;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap}
.occ-tbl td{padding:7px 8px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.occ-tbl td.dp{text-align:left;font-weight:800}
.occ-tbl .r{display:block;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text);font-size:12px}
.occ-tbl .c{display:block;font-size:10.5px;color:var(--text-sub);font-family:'JetBrains Mono',monospace;margin-top:1px}
.occ-tbl .m{display:block;font-size:10px;color:#e03131;font-family:'JetBrains Mono',monospace;margin-top:1px;font-weight:700}
.occ-tbl .m0{display:block;font-size:10px;color:#888780;font-family:'JetBrains Mono',monospace;margin-top:1px}
.occ-tbl td.alloc{font-weight:800;font-family:'JetBrains Mono',monospace;color:#2c2c2a}
.occ-tbl tbody tr{animation:occRow .45s ease backwards}
.occ-tbl tbody tr:hover{background:var(--surface2)}
.occ-tbl-cap{font-size:10px;color:#888780;margin-top:6px;text-align:right}
@keyframes occRow{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.occ-idle-clk{cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}
.occ-idle-clk:hover{filter:brightness(.8)}
.occ-idle-ov{position:fixed;inset:0;background:rgba(20,20,18,.45);display:none;align-items:center;justify-content:center;z-index:99999;padding:20px}
.occ-idle-box{background:var(--surface);border-radius:14px;padding:20px 22px;max-width:440px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.22);max-height:82vh;overflow-y:auto;animation:occIdleIn .2s ease}
@keyframes occIdleIn{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.occ-hcell{cursor:pointer;transition:outline .12s ease}
.occ-hcell:hover{outline:3px solid var(--accent);outline-offset:-3px}


/* ===== 운영 콘솔 탭 (고담 다크, #tab-ops_console 범위로 한정) ===== */
#tab-ops_console{ position:relative; height:100%; padding:0 !important; overflow:hidden; }
#tab-ops_console.tab-content{ background:#050709; }

#tab-ops_console *{box-sizing:border-box}
#tab-ops_console{
  --void:#050709;--map:#060b0f;
  --accent:#00D4FF;--danger:#FF3B3B;--warn:#FFB800;--ok:#00FF87;
  --ink:rgba(255,255,255,0.93);--ink2:rgba(255,255,255,0.66);
  --ink3:rgba(255,255,255,0.22);--ink4:rgba(255,255,255,0.06);
  --line:rgba(255,255,255,0.16);--line-a:rgba(0,212,255,0.26);
}
#tab-ops_console{background:var(--void);color:var(--ink);font-family:'Pretendard',-apple-system,sans-serif;overflow:hidden}

/* ── 맵 배경 ── */
.map-bg{
  position:absolute;inset:0;z-index:0;
  background:var(--map);
  background-image:
    radial-gradient(circle at 28% 42%,rgba(0,212,255,0.03) 0%,transparent 55%),
    linear-gradient(rgba(0,212,255,0.022) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.022) 1px,transparent 1px);
  background-size:auto,28px 28px,28px 28px;
}
.map-bg::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
}

/* ── 시스템바 ── */
.sysbar{
  position:absolute;top:44px;left:0;right:0;height:26px;z-index:200;
  background:rgba(5,7,9,0.95);border-bottom:0.5px solid var(--line);
  display:flex;align-items:center;padding:0 14px;gap:16px;
  backdrop-filter:blur(8px);
}
.s-brand{font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-transform:uppercase}
.s-sep{width:0.5px;height:10px;background:var(--line-a)}
.s-lbl{font-size:12px;color:var(--ink2);letter-spacing:1px}
.s-val{font-size:12px;color:var(--ink);margin-left:3px}
.s-dot{width:4px;height:4px;border-radius:50%;background:var(--ok);box-shadow:0 0 5px var(--ok);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.s-anom{font-size:12px;color:var(--danger);margin-left:3px;font-weight:700}
.spacer{flex:1}
.s-time{font-size:12px;color:var(--ink2);letter-spacing:.5px}

/* ── 전체 레이아웃: 맵(좌) + 분석패널(우) 항상 펼침 ── */
.layout{
  position:absolute;top:70px;left:0;right:0;bottom:0;z-index:1;
  display:block;
}

/* ── 좌: 맵 ── */
.map-col{position:absolute;inset:0;overflow:hidden}
.map-controls{
  position:absolute;top:10px;left:10px;right:10px;
  display:flex;flex-direction:column;align-items:stretch;gap:6px;z-index:10;
}
.bldg-row{display:flex;align-items:center;gap:8px}
.bldg-sel{display:flex;gap:4px;flex-wrap:nowrap;overflow-x:auto}
.ops-src{margin-left:auto;font-size:11px;color:var(--ink2);white-space:nowrap;letter-spacing:.3px;opacity:.85}
.mc-row{display:flex;align-items:center;gap:6px}
.b-btn{font-size:12px;letter-spacing:.5px;padding:3px 10px;white-space:nowrap;
  background:transparent;border:0.5px solid var(--line);
  color:var(--ink2);cursor:pointer;transition:.12s}
.b-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(255,255,255,.03)}
.f-btn{
  font-size:12px;letter-spacing:1px;padding:3px 8px;
  background:transparent;border:0.5px solid var(--line);
  color:var(--ink2);cursor:pointer;transition:.12s;text-transform:uppercase;
}
.f-btn.on{border-color:var(--accent);color:var(--accent)}
.anom-btn{
  font-size:12px;letter-spacing:1.5px;padding:3px 10px;
  background:transparent;border:0.5px solid rgba(255,59,59,0.35);
  color:rgba(255,59,59,0.5);cursor:pointer;transition:.12s;text-transform:uppercase;
}
.anom-btn.on{color:var(--danger);border-color:var(--danger);background:rgba(255,59,59,0.05)}
.mc-sep{flex:1}
.floor-label{font-size:12px;color:var(--ink2);letter-spacing:1px}

/* 강의실 그리드 */
.room-grid{
  position:absolute;top:70px;left:10px;right:10px;bottom:10px;
  display:grid;grid-template-columns:repeat(4,1fr);gap:7px;
  overflow:hidden auto;align-content:start;
}
.room-grid.panel-open{right:370px;grid-template-columns:repeat(3,1fr)}
.room-grid::-webkit-scrollbar{width:2px}
.room-grid::-webkit-scrollbar-thumb{background:var(--line-a)}

.rcell{
  background:rgba(5,7,9,0.42);border:0.5px solid var(--line);
  padding:9px 9px 6px;cursor:pointer;transition:all .15s;
  position:relative;overflow:hidden;
}
.rcell::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,212,255,0.025),transparent 60%);opacity:0;transition:.15s}
.rcell:hover::before{opacity:1}
.rcell:hover{border-color:rgba(0,212,255,0.18);background:rgba(5,7,9,0.6)}
.rcell.sel{border-color:var(--accent);background:rgba(0,212,255,0.05)}
.rcell.sel::after{content:"";position:absolute;top:0;left:0;right:0;height:0.5px;background:var(--accent);box-shadow:0 0 6px var(--accent)}
@keyframes dangerPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,59,59,0);border-color:rgba(255,59,59,0.45)}
  50%{transform:scale(1.012);box-shadow:0 0 16px 2px rgba(255,59,59,0.4);border-color:rgba(255,59,59,0.95)}
}
.rcell.anom-danger{border-color:rgba(255,59,59,0.45);animation:dangerPulse 1.1s ease-in-out infinite;will-change:transform;z-index:2}
.rcell.anom-warn{border-color:rgba(255,184,0,0.3)}

/* 스캔 */
.scan-bar{display:none;position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan .35s ease-out forwards}
.rcell.scanning .scan-bar{display:block}
@keyframes scan{0%{top:0;opacity:1}100%{top:100%;opacity:0}}

.c-id{font-size:16px;font-weight:700;letter-spacing:.3px;line-height:1}
.c-dept{font-size:11px;color:var(--ink2);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.c-bar{height:1px;background:var(--line);margin:7px 0 3px;overflow:hidden}
.c-bar-fill{height:100%;transition:.3s}
.bar-ok{background:var(--ok)}.bar-warn{background:var(--warn)}.bar-danger{background:var(--danger)}
.c-bottom{display:flex;justify-content:space-between;align-items:flex-end}
.c-occ{font-size:19px;font-weight:700;line-height:1}
.c-occ-u{font-size:11px;color:var(--ink2);margin-left:1px}
.c-free{font-size:11px;color:var(--ink2);text-align:right}
.c-free b{color:var(--accent)}
.c-badge{position:absolute;top:8px;right:8px;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px;display:none;font-weight:700}
.c-badge.danger{display:block;background:rgba(255,59,59,0.18);color:var(--danger);border:0.5px solid rgba(255,59,59,0.4)}
.c-badge.warn{display:block;background:rgba(255,184,0,0.13);color:var(--warn);border:0.5px solid rgba(255,184,0,0.35)}

/* ── 우: 분석 패널 (슬라이드 인/아웃) ── */
.analysis-col{
  position:absolute;top:70px;right:0;bottom:0;width:360px;z-index:50;
  border-left:0.5px solid var(--line-a);
  background:rgba(5,7,9,0.97);
  backdrop-filter:blur(14px);
  display:flex;flex-direction:column;
  overflow:hidden;
  transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  box-shadow:-8px 0 28px rgba(0,0,0,0.5);
}
.analysis-col.open{transform:translateX(0)}
/* 패널 닫기 버튼 */
.panel-close{
  position:absolute;top:9px;right:10px;z-index:60;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  background:transparent;border:0.5px solid var(--line);color:var(--ink2);
  cursor:pointer;font-size:15px;transition:.12s;
}
.panel-close:hover{border-color:var(--accent);color:var(--accent)}

/* 패널 헤더 */
.panel-header{
  padding:10px 14px 0;flex-shrink:0;
  border-bottom:0.5px solid var(--line);
}
.ph-type{font-size:11px;color:var(--ink2);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.ph-room{font-size:23px;font-weight:700;letter-spacing:-.5px;line-height:1}
.ph-sub{font-size:12px;color:var(--ink2);margin-top:3px;letter-spacing:.3px;padding-bottom:10px}

/* 스텝 탭 — 항상 보임 */
.step-tabs{
  display:flex;border-bottom:0.5px solid var(--line);flex-shrink:0;
}
.stab{
  flex:1;padding:8px 4px;text-align:center;cursor:pointer;
  border-bottom:1px solid transparent;transition:.15s;
  position:relative;
}
.stab:not(:last-child){border-right:0.5px solid var(--line)}
.stab .st-num{font-size:11px;color:var(--ink2);letter-spacing:1.5px;display:block;margin-bottom:2px}
.stab .st-lbl{font-size:12px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--ink2)}
.stab.active .st-num{color:var(--accent)}
.stab.active .st-lbl{color:var(--ink)}
.stab.active{border-bottom-color:var(--accent)}
.stab.done .st-num{color:var(--ok)}
.stab.done .st-lbl{color:rgba(0,255,135,0.6)}
.stab.locked{opacity:.22;cursor:not-allowed}
/* 탭 번호 뱃지 */
.stab.active::before{content:"";position:absolute;top:0;left:0;right:0;height:0.5px;background:var(--accent)}

/* 패널 바디 */
.panel-body{flex:1;overflow-y:auto;padding:0}
.panel-body::-webkit-scrollbar{width:2px}
.panel-body::-webkit-scrollbar-thumb{background:var(--line-a)}

/* 빈 상태 */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;gap:6px;
}
.es-label{font-size:12px;color:var(--ink2);letter-spacing:3px;text-transform:uppercase}
.es-sub{font-size:11px;color:rgba(255,255,255,0.15);letter-spacing:1px}

/* 섹션 */
.sec{padding:10px 14px;border-bottom:0.5px solid var(--line)}
.sec:last-child{border-bottom:none}
.sec-label{font-size:11px;color:var(--ink2);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.sec-label span{color:var(--ink2);font-size:10px;letter-spacing:1px}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5px;background:var(--line);margin:0 -14px;padding:0 14px}
.stat-item{background:var(--void);padding:8px 0}
.si-lbl{font-size:10px;color:var(--ink2);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.si-val{font-size:21px;font-weight:700;line-height:1;letter-spacing:-1px}
.si-u{font-size:11px;color:var(--ink2);margin-left:1px}
.si-sub{font-size:11px;color:var(--ink2);margin-top:1px}

/* day strip */
.day-strip{display:flex;gap:2px}
.dpip{flex:1;height:18px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.dpip.busy{background:rgba(0,212,255,0.08);color:var(--accent);border:0.5px solid rgba(0,212,255,0.2)}
.dpip.free{background:rgba(255,184,0,0.12);color:var(--warn);border:0.5px solid rgba(255,184,0,0.35)}
.dpip.free-label{font-size:10px;display:block;letter-spacing:.5px;margin-top:1px;opacity:.8}

/* 이상 플래그 */
.aflag{padding:5px 8px;margin-bottom:3px;border-left:1.5px solid;font-size:12px;line-height:1.5;background:rgba(255,255,255,0.02)}
.aflag.danger{border-color:var(--danger)}.aflag.warn{border-color:var(--warn)}
.aflag .af-code{font-size:10px;letter-spacing:1.5px;opacity:.6;margin-bottom:1px}
.aflag.danger .af-code{color:var(--danger)}.aflag.warn .af-code{color:var(--warn)}
.anom-ok{font-size:11px;color:var(--ok);letter-spacing:1.5px;padding:4px 0}

/* 시계열 */
.ts-tabs{display:flex;gap:2px;margin-bottom:8px}
.ts-tab{flex:1;padding:3px 0;text-align:center;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border:0.5px solid var(--line);color:var(--ink2);cursor:pointer;transition:.12s;background:transparent}
.ts-tab.on{border-color:var(--accent);color:var(--accent)}
.ts-na{text-align:center;padding:8px 0}
.ts-na .tna-lbl{font-size:11px;color:var(--ink2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.ts-na .tna-v{font-size:21px;font-weight:700;color:rgba(0,212,255,.25)}
.ts-na .tna-u{font-size:11px;color:var(--ink2)}
.ts-na .tna-d{font-size:11px;color:rgba(255,255,255,.18);margin-top:3px;line-height:1.5}
.ts-active{display:flex;align-items:baseline;gap:6px;padding:4px 0}
.ts-delta{font-size:23px;font-weight:700}
.ts-msg{font-size:12px;color:var(--ink2)}
.ts-chart{margin-top:8px;padding-top:8px;border-top:0.5px solid var(--line)}
.ts-svg{width:100%;height:46px;display:block;overflow:visible}
.ts-axl{font-size:9px;fill:var(--ink2);font-family:'Pretendard',-apple-system,sans-serif}
.ts-axv{font-size:6.5px;font-weight:700;font-family:'Pretendard',-apple-system,sans-serif}

/* ── Step2: 교차 시뮬 ── */
.cross-item{
  display:flex;align-items:center;gap:0;
  padding:8px 0;border-bottom:0.5px solid var(--line);
  cursor:pointer;transition:.12s;
}
.cross-item:last-child{border-bottom:none}
.cross-item:hover .ci-name{color:var(--ink)}
.cross-item.active .ci-name{color:var(--accent)}
.cross-item.active .ci-bar-fill{box-shadow:0 0 4px var(--accent)}
.ci-name{font-size:13px;font-weight:500;width:32px;color:var(--ink2);transition:.12s;flex-shrink:0}
.ci-bar{flex:1;height:1px;background:var(--line);margin:0 8px;overflow:visible}
.ci-bar-fill{height:100%;background:var(--accent);transition:.3s}
.ci-fit{font-size:14px;font-weight:700;width:26px;text-align:right;flex-shrink:0}
.ci-rev{font-size:11px;color:var(--ink2);width:40px;text-align:right;flex-shrink:0}
.ci-tag{font-size:10px;color:var(--accent);letter-spacing:1px;width:26px;text-align:right;flex-shrink:0}

.time-pat{font-size:12px;color:var(--ink2);line-height:1.8;margin-top:4px}
.time-pat b{color:var(--ink)}
.time-pat .accent{color:var(--accent)}

/* ── Step3: Digital Twin ── */
.twin-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.twin-row:last-child{margin-bottom:0}
.tw-lbl{font-size:11px;color:var(--ink2);letter-spacing:1px;width:48px;flex-shrink:0;text-transform:uppercase}
.tw-sl{flex:1;-webkit-appearance:none;height:1px;background:var(--line);outline:none;cursor:pointer}
.tw-sl::-webkit-slider-thumb{-webkit-appearance:none;width:9px;height:9px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 5px rgba(0,212,255,.5)}
.tw-v{font-size:12px;font-weight:700;color:var(--accent);width:26px;text-align:right;flex-shrink:0}

.kpi-line{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:0.5px solid var(--line)}
.kpi-line:last-child{border-bottom:none}
.kl-lbl{font-size:11px;color:var(--ink2);letter-spacing:1.5px;text-transform:uppercase}
.kl-val{font-size:16px;font-weight:700;letter-spacing:-.5px}
.kl-u{font-size:11px;color:var(--ink2);margin-left:1px}
.kl-delta{font-size:11px;margin-left:4px}
.d-up{color:var(--ok)}.d-dn{color:var(--danger)}.d-flat{color:var(--ink2)}

/* ── Step4: 1/2/3안 ── */
.act-item{
  padding:9px 0;border-bottom:0.5px solid var(--line);cursor:pointer;transition:.12s;
}
.act-item:last-child{border-bottom:none;margin-bottom:0}
.act-item:hover .act-title{color:var(--ink)}
.act-item.sel .act-num{color:var(--accent)}
.act-item.sel .act-title{color:var(--accent)}
.act-item.sel{background:rgba(0,212,255,0.02);margin:0 -14px;padding:9px 14px}
.act-row1{display:flex;align-items:baseline;gap:7px;margin-bottom:3px}
.act-num{font-size:11px;color:var(--ink2);letter-spacing:2px;font-weight:700;transition:.12s;flex-shrink:0}
.act-title{font-size:13px;font-weight:500;color:var(--ink2);transition:.12s;flex:1;line-height:1.3}
.act-desc{font-size:12px;color:var(--ink2);line-height:1.5;margin-bottom:5px;padding-left:22px;opacity:.7}
.act-kvs{display:flex;gap:10px;padding-left:22px}
.act-kv{font-size:12px}
.act-kv .ak{color:var(--ink2)} .act-kv .av{color:var(--ink);font-weight:700}

/* AI 버튼 */
.ai-btn{
  width:100%;padding:9px 14px;background:transparent;
  border:0.5px solid rgba(0,212,255,0.25);color:var(--accent);
  font-family:'Pretendard',-apple-system,sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.ai-btn:hover{background:rgba(0,212,255,0.04);border-color:var(--accent)}
.ai-btn:disabled{opacity:.25;cursor:not-allowed}
.ai-spin{width:9px;height:9px;border:1px solid rgba(0,212,255,.25);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:none}
.ai-btn.loading .ai-spin{display:block}
.ai-btn.loading .ai-btn-t{opacity:.4}
@keyframes spin{to{transform:rotate(360deg)}}

.ai-res{padding:10px 14px;border-top:0.5px solid var(--line);display:none}
.ai-res.show{display:block}
.ai-loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 0}
.air-grade{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.air-grade.danger{color:var(--danger)}.air-grade.warn{color:var(--warn)}.air-grade.ok{color:var(--ok)}
.air-facts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.air-f{font-size:11px;color:var(--ink2)} .air-f b{color:var(--ink)}
.air-txt{font-size:13px;line-height:1.7;color:rgba(255,255,255,.6)}
.air-blk{margin-bottom:7px}
.air-blk:last-child{margin-bottom:0}
.air-h{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.air-facts{padding-bottom:6px;border-bottom:0.5px solid var(--line);margin-bottom:7px}

/* 승인 바 */
.approve-bar{
  padding:10px 14px;border-top:0.5px solid var(--line);
  background:rgba(5,7,9,.98);flex-shrink:0;
}
.apr-sel{font-size:12px;color:var(--ink2);margin-bottom:7px;letter-spacing:.3px}
.apr-sel b{color:var(--accent)}
.apr-btns{display:flex;gap:6px}
.apr-btn{
  flex:1;padding:7px;background:transparent;
  border:0.5px solid var(--line);color:var(--ink2);
  font-family:'Pretendard',-apple-system,sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:.15s;
}
.apr-btn:hover{border-color:var(--ink3);color:var(--ink)}
.apr-btn.confirm{border-color:rgba(0,212,255,.35);color:var(--accent)}
.apr-btn.confirm:hover{background:rgba(0,212,255,.05)}
.apr-btn.confirm:disabled{opacity:.2;cursor:not-allowed}


</style>
</head>
<body>

<!-- 로그인 -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-line"></div>
    <h2>Graph RAG Dashboard</h2>
    <p>Flow Education · 임차료 배부</p>

    <!-- 로그인/권한요청 탭 -->
    <div style="display:flex;gap:18px;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.1)">
      <button id="loginTab_login" onclick="switchLoginTab('login')"
        style="padding:0 0 8px;border:none;background:none;font-size:12px;font-weight:500;
               cursor:pointer;color:#fff;border-bottom:1px solid #fff;margin-bottom:-1px;
               font-family:'Pretendard',-apple-system,sans-serif">로그인</button>
      <button id="loginTab_request" onclick="switchLoginTab('request')"
        style="padding:0 0 8px;border:none;background:none;font-size:12px;font-weight:500;
               cursor:pointer;color:rgba(255,255,255,0.3);border-bottom:1px solid transparent;margin-bottom:-1px;
               font-family:'Pretendard',-apple-system,sans-serif">권한요청</button>
    </div>

    <!-- 로그인 패널 -->
    <div id="loginPanel_login">
      <input type="text" id="loginId" placeholder="아이디" autocomplete="off">
      <input type="password" id="loginPw" placeholder="비밀번호">
      <button onclick="doLogin()">LOGIN</button>
      <div class="login-err" id="loginErr">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    </div>

    <!-- 권한요청 패널 -->
    <div id="loginPanel_request" style="display:none">
      <div style="font-size:11px;color:#888780;margin-bottom:12px;line-height:1.5">
        아래 정보를 선택해 권한을 요청하면 관리자(이슬기) 승인 후 계정이 발급됩니다.
      </div>
      <input type="text" id="req_name" placeholder="이름 (예: 홍길동)" autocomplete="off"
        style="margin-bottom:10px">

      <select id="req_dept" onchange="onReqDeptChange()" style="width:100%;padding:11px 14px;margin-bottom:10px;border:1px solid #d3d1c7;
        border-radius:8px;font-size:14px;background:#ebecf1;color:#444441;font-family:'Pretendard',-apple-system,sans-serif">
        <option value="">소속 선택</option>
      </select>

      <!-- 본사 외 선택 시에만 표시되는 지역/관코드 영역 -->
      <div id="req_scope_box">
        <select id="req_region" style="width:100%;padding:11px 14px;margin-bottom:10px;border:1px solid #d3d1c7;
          border-radius:8px;font-size:14px;background:#ebecf1;color:#444441;font-family:'Pretendard',-apple-system,sans-serif">
          <option value="">지역 선택</option>
        </select>

        <!-- 관코드 드롭다운 (펼침/접힘 + 다중선택) -->
        <div style="margin-bottom:10px;position:relative">
          <div onclick="toggleReqCampusDropdown()" id="req_campus_toggle"
            style="width:100%;padding:11px 14px;border:1px solid #d3d1c7;border-radius:8px;
                   font-size:14px;background:#ebecf1;color:#888780;cursor:pointer;
                   display:flex;justify-content:space-between;align-items:center;font-family:'Pretendard',-apple-system,sans-serif">
            <span id="req_campus_label">관코드 선택 (다중 가능)</span>
            <span id="req_campus_arrow">▼</span>
          </div>
          <div id="req_campus_dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:10;
            margin-top:4px;max-height:200px;overflow-y:auto;border:1px solid #1a1a1a;border-radius:8px;
            padding:8px;background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.12);display:none">
            <div id="req_campus_box" style="display:flex;flex-wrap:wrap;gap:4px"></div>
          </div>
        </div>
      </div>

      <select id="req_title" style="width:100%;padding:11px 14px;margin-bottom:14px;border:1px solid #d3d1c7;
        border-radius:8px;font-size:14px;background:#ebecf1;color:#444441;font-family:'Pretendard',-apple-system,sans-serif">
        <option value="">직급 및 직책 선택</option>
      </select>

      <button onclick="submitPermissionRequest()">권한요청하기</button>
      <div id="req_msg" style="margin-top:10px;font-size:12px;text-align:center"></div>
    </div>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <header>
    <div class="logo">Graph RAG Dashboard</div>
    <div class="nav-btns">
      <button class="nav-btn" id="navRefresh" onclick="navRefresh()" title="새로고침">⟳</button>

  <!-- 메인 레이아웃: 사이드바 | 콘텐츠 | AI패널 -->

    <!-- 좌측 사이드바 (탭 네비) -->

    <!-- 탭 컨텐츠 -->

          예시)<br>
          · 영재 이번달 임차료 내역 설명해줘<br>

<!-- AI 패널 토글 탭 (접혔을 때 표시) -->

    <div class="modal-row">
      <label>건물</label>
      <select id="fabBuilding">

<script>
// ══════════════════════════════════════════════
// 1. 계정 정보
// ══════════════════════════════════════════════
// ══════════════════════════════════════════════
// 1. 계정 + 권한 체계
// ══════════════════════════════════════════════
// 권한 레벨(rank): 이사/본부장 = 'exec' | 원장 = 'director'
//                  부원장/CS = 'input' | 과장/대리/사원 = 'staff'
//                  lee = 'admin' (최종관리자)
// 관코드 전체 목록 (이미지 기준)
const ALL_CAMPUS_CODES = [
  '103','104','105','106','107','108','109','110','111','112','113','114','115','116','117',
  '203','204','205','206','207','208','209','210','211','212','213','214','220',
  '301','307','308','309','312','313','322','325','326','327','333','363'
];

const DEPT_OPTIONS   = ['본사','초등사업부','중등사업부','고등사업부','사스사업부'];
const REGION_OPTIONS_AUTH = ['수내','이매','정자','수지','광교','영통'];
const TITLE_OPTIONS  = ['이사','본부장','원장','과장','대리','사원','부원장','CS'];

// 직급/직책 → 권한 레벨 매핑
function titleToRank(title) {
  if (['이사','본부장'].includes(title)) return 'exec';      // 전체 조회 + 관리자
  if (title === '원장')                  return 'director';  // 소속만 조회
  if (['부원장','CS'].includes(title))   return 'input';     // 소속 사용현황 입력만
  if (['과장','대리','사원'].includes(title)) return 'staff'; // 전체 조회
  return 'staff';
}

// 기본 계정 (코드 내장)
const BASE_ACCOUNTS = {
  lee:  { pw: 'flow2025!', name: '이슬기', rank: 'admin', title:'관리자', dept:'본사', region:'전체', campus: 'all' },
  ahn:  { pw: 'flow2025!', name: '안희운', rank: 'exec',  title:'본부장', dept:'본사', region:'전체', campus: 'all' },
  kim:  { pw: 'flow2025!', name: '김영진', rank: 'staff', title:'과장',   dept:'본사', region:'전체', campus: 'all' },
  park: { pw: 'flow2025!', name: '박윤규', rank: 'staff', title:'대리',   dept:'본사', region:'전체', campus: 'all' },
};

// localStorage에서 추가 계정 병합
function loadAccounts() {
  let accounts = { ...BASE_ACCOUNTS };
  try {
    const saved = JSON.parse(localStorage.getItem('extraAccounts') || '{}');
    accounts = { ...accounts, ...saved };
  } catch(e) {}
  return accounts;
}

let ACCOUNTS = loadAccounts();

// ── 로그인 화면 탭 전환
function switchLoginTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('loginPanel_login').style.display   = isLogin ? 'block' : 'none';
  document.getElementById('loginPanel_request').style.display = isLogin ? 'none' : 'block';
  const lt = document.getElementById('loginTab_login');
  const rt = document.getElementById('loginTab_request');
  lt.style.color = isLogin ? '#fff' : 'rgba(255,255,255,0.3)';
  lt.style.borderBottomColor = isLogin ? '#fff' : 'transparent';
  rt.style.color = isLogin ? 'rgba(255,255,255,0.3)' : '#fff';
  rt.style.borderBottomColor = isLogin ? 'transparent' : '#fff';
  if (!isLogin) initRequestForm();
}

// ── 권한요청 폼 초기화 (드롭다운 옵션 채우기)
function initRequestForm() {
  const deptSel = document.getElementById('req_dept');
  if (deptSel && deptSel.options.length <= 1)
    deptSel.innerHTML = '<option value="">소속 선택</option>' + DEPT_OPTIONS.map(d=>`<option value="${d}">${d}</option>`).join('');

  const regSel = document.getElementById('req_region');
  if (regSel && regSel.options.length <= 1)
    regSel.innerHTML = '<option value="">지역 선택</option>' + REGION_OPTIONS_AUTH.map(r=>`<option value="${r}">${r}</option>`).join('');

  const titleSel = document.getElementById('req_title');
  if (titleSel && titleSel.options.length <= 1)
    titleSel.innerHTML = '<option value="">직급 및 직책 선택</option>' + TITLE_OPTIONS.map(t=>`<option value="${t}">${t}</option>`).join('');

  const campusBox = document.getElementById('req_campus_box');
  if (campusBox && !campusBox.children.length)
    campusBox.innerHTML = ALL_CAMPUS_CODES.map(c => `
      <label style="display:inline-flex;align-items:center;gap:3px;padding:4px 9px;background:#ebecf1;
        border:1px solid #d3d1c7;border-radius:6px;font-size:12px;cursor:pointer">
        <input type="checkbox" class="req_campus_chk" value="${c}" onchange="updateReqCampusLabel()" style="cursor:pointer">${c}
      </label>`).join('');
}

// ── 소속 변경: 본사면 지역/관코드 숨김
function onReqDeptChange() {
  const dept = document.getElementById('req_dept').value;
  const scopeBox = document.getElementById('req_scope_box');
  if (!scopeBox) return;
  if (dept === '본사') {
    scopeBox.style.display = 'none';
    // 본사는 전체 권한이므로 선택값 초기화
    document.getElementById('req_region').value = '';
    document.querySelectorAll('.req_campus_chk:checked').forEach(c=>c.checked=false);
    updateReqCampusLabel();
  } else {
    scopeBox.style.display = 'block';
  }
}

// ── 관코드 드롭다운 펼침/접힘
function toggleReqCampusDropdown() {
  const dd = document.getElementById('req_campus_dropdown');
  const arrow = document.getElementById('req_campus_arrow');
  if (!dd) return;
  const open = dd.style.display === 'block';
  dd.style.display = open ? 'none' : 'block';
  if (arrow) arrow.textContent = open ? '▼' : '▲';
}

// ── 관코드 선택 라벨 업데이트
function updateReqCampusLabel() {
  const checked = [...document.querySelectorAll('.req_campus_chk:checked')].map(c=>c.value);
  const label = document.getElementById('req_campus_label');
  if (!label) return;
  if (!checked.length) {
    label.textContent = '관코드 선택 (다중 가능)';
    label.style.color = '#888780';
  } else {
    label.textContent = `${checked.length}개 선택: ${checked.join(', ')}`;
    label.style.color = '#1a1a1a';
  }
}

// ── 권한요청 제출 → localStorage 저장
function submitPermissionRequest() {
  const name   = document.getElementById('req_name').value.trim();
  const dept   = document.getElementById('req_dept').value;
  const region = document.getElementById('req_region').value;
  const title  = document.getElementById('req_title').value;
  const campus = [...document.querySelectorAll('.req_campus_chk:checked')].map(c=>c.value);
  const msg    = document.getElementById('req_msg');
  const isHQ   = dept === '본사';

  if (!name)   { msg.style.color='#e03131'; msg.textContent='이름을 입력해주세요.'; return; }
  if (!dept)   { msg.style.color='#e03131'; msg.textContent='소속을 선택해주세요.'; return; }
  if (!title)  { msg.style.color='#e03131'; msg.textContent='직급/직책을 선택해주세요.'; return; }
  // 본사가 아닐 때만 지역/관코드 필수
  if (!isHQ && !region) { msg.style.color='#e03131'; msg.textContent='지역을 선택해주세요.'; return; }
  if (!isHQ && !campus.length) { msg.style.color='#e03131'; msg.textContent='관코드를 1개 이상 선택해주세요.'; return; }

  const requests = JSON.parse(localStorage.getItem('permRequests') || '[]');
  requests.push({
    id: 'req_' + Date.now(),
    name, dept,
    region: isHQ ? '전체' : region,
    title,
    campus: isHQ ? 'all' : campus,
    rank: titleToRank(title),
    status: '대기',
    requestedAt: new Date().toISOString(),
  });
  localStorage.setItem('permRequests', JSON.stringify(requests));

  // TODO: lee에게 실시간 알람 (추후 구현)
  msg.style.color = '#27500a';
  msg.innerHTML = '✓ 권한요청이 접수되었습니다.<br>관리자 승인 후 계정이 발급됩니다.';
  document.getElementById('req_name').value = '';
  document.getElementById('req_dept').value = '';
  document.getElementById('req_region').value = '';
  document.getElementById('req_title').value = '';
  document.querySelectorAll('.req_campus_chk:checked').forEach(c=>c.checked=false);
  updateReqCampusLabel();
  onReqDeptChange();
}

// ── 접속/액션 로그 기록
function addAccessLog(action) {
  if (!currentUser) return;
  const logs = JSON.parse(localStorage.getItem('accessLogs') || '[]');
  logs.unshift({
    time: new Date().toISOString(),
    user: currentUser.name + ' (' + currentUser.id + ')',
    rank: rankLabel(currentUser.rank),
    action: action,
    ip: window._clientIP || '확인중',
  });
  // 최근 500건만 유지
  localStorage.setItem('accessLogs', JSON.stringify(logs.slice(0, 500)));
}

// 클라이언트 IP 조회 (외부 API)
(function fetchClientIP(){
  fetch('https://api.ipify.org?format=json')
    .then(r=>r.json()).then(d=>{ window._clientIP = d.ip; })
    .catch(()=>{ window._clientIP = '확인불가'; });
})();

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPw').value;
  ACCOUNTS = loadAccounts(); // 최신 계정 반영
  const acc = ACCOUNTS[id];
  if (!acc || acc.pw !== pw) {
    document.getElementById('loginErr').style.display = 'block'; return;
  }
  currentUser = { id, ...acc };
  loadBldgRegions();
  loadEffData();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('headerUser').textContent = acc.name;
  document.getElementById('headerRole').textContent = '(' + rankLabel(acc.rank) + ')';
  addAccessLog('로그인');
  buildTabs();
}

function rankLabel(rank) {
  return { admin:'최종관리자', exec:'이사·본부장', director:'원장', input:'부원장·CS', staff:'과장·대리·사원' }[rank] || rank;
}
document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

function doLogout() {
  addAccessLog('로그아웃');
  currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginId').value = '';
  document.getElementById('loginPw').value = '';
}

function canSeeTab(tab) {
  const rank = currentUser.rank;

  // 전체 공개 탭
  if (tab.role === 'all') return true;

  // 관리자 탭: admin(lee) + exec(이사/본부장)만
  if (tab.role === 'admin') return rank === 'admin' || rank === 'exec';

  // 사용현황 입력 탭: 모든 로그인 사용자 (input 권한 포함)
  if (tab.role === 'input') return true;

  // 건물 탭
  if (tab.role === 'bldg') {
    // 전체 권한 (admin/exec/staff): 모든 건물
    if (rank === 'admin' || rank === 'exec' || rank === 'staff') return true;
    // 원장/부원장/CS: 소속 캠퍼스(관코드) 건물만
    if (currentUser.campus === 'all') return true;
    if (Array.isArray(currentUser.campus)) {
      // 해당 건물에 소속 관코드가 있는지 확인
      const b = BUILDINGS[tab.id];
      if (!b) return false;
      return (b.campuses || []).some(c => currentUser.campus.includes(c));
    }
    return false;
  }
  return false;
}

function buildTabs() {
  const nav = document.getElementById('tabNav');
  const contents = document.getElementById('tabContents');
  nav.innerHTML = '';
  contents.innerHTML = '';

  const visible = ALL_TABS.filter(canSeeTab);

  // 그룹별로 묶어서 사이드바 렌더
  let lastGroup = null;
  visible.forEach(tab => {
    const grp = tab.group || '기타';
    if (grp !== lastGroup) {
      if (lastGroup !== null) {
        const dv = document.createElement('div');
        dv.className = 'side-divider';
        nav.appendChild(dv);
      }
      const gh = document.createElement('div');
      gh.className = 'side-grp';
      gh.textContent = grp;
      nav.appendChild(gh);
      lastGroup = grp;
    }

    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (tab.isOps ? ' ops' : '');
    btn.innerHTML = tab.label + (tab.isOps ? '<span class="nw">NEW</span>' : '');
    btn.onclick = () => switchTab(tab.id);
    btn.id = 'tbtn-' + tab.id;
    nav.appendChild(btn);

    const div = document.createElement('div');
    div.className = 'tab-content';
    div.id = 'tab-' + tab.id;
    try {
      const grpLabel = tab.group || '';
      const tabLabel = tab.label.replace(/^[^\s]+\s/, '');
      const backbar = `<div class="tab-backbar">
        <button class="back-btn" onclick="navBack()"><span>←</span> 뒤로</button>
        <div class="crumb"><span>${grpLabel}</span><span class="sep">›</span><span class="cur">${tabLabel}</span></div>
      </div>`;
      div.innerHTML = backbar + renderTab(tab.id);
    } catch(e) {
      div.innerHTML = `<div style="padding:40px;color:var(--danger)">△ 렌더링 오류 (${tab.id}): ${e.message}</div>`;
      console.error('Tab render error [' + tab.id + ']:', e);
    }
    contents.appendChild(div);
  });

  switchTab(visible[0].id);
}

// 탭 히스토리 (뒤로가기용)
let tabHistory = [];
let navIgnoreHistory = false;

function switchTab(id) {
  // 히스토리 기록 (뒤로가기로 이동한 경우는 제외)
  if (!navIgnoreHistory && currentTab && currentTab !== id) {
    tabHistory.push(currentTab);
    if (tabHistory.length > 50) tabHistory.shift();
  }
  navIgnoreHistory = false;

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const btn = document.getElementById('tbtn-' + id);
  const content = document.getElementById('tab-' + id);
  if (btn) btn.classList.add('active');
  if (content) content.classList.add('active');
  currentTab = id;
  if (id === 'summary') initSummary();
  if (id === 'admin')   setTimeout(() => switchAdmTab(0), 50);
  if (id === 'ops_console') setTimeout(() => { if (typeof opsInitConsole === 'function') opsInitConsole(); }, 60);

  updateNavButtons();
}

// 뒤로가기: 직전 탭으로
function navBack() {
  if (tabHistory.length === 0) return;
  const prev = tabHistory.pop();
  navIgnoreHistory = true;
  switchTab(prev);
}

// 새로고침: 현재 탭 내용 다시 그리기
function navRefresh() {
  const id = currentTab;
  const content = document.getElementById('tab-' + id);
  const tab = ALL_TABS.find(t => t.id === id);
  if (content && tab) {
    const grpLabel = tab.group || '';
    const tabLabel = tab.label.replace(/^[^\s]+\s/, '');
    const backbar = `<div class="tab-backbar">
      <button class="back-btn" onclick="navBack()"><span>←</span> 뒤로</button>
      <div class="crumb"><span>${grpLabel}</span><span class="sep">›</span><span class="cur">${tabLabel}</span></div>
    </div>`;
    try {
      content.innerHTML = backbar + renderTab(id);
    } catch(e) {
      content.innerHTML = backbar + `<div style="padding:40px;color:var(--danger)">△ 렌더링 오류 (${id}): ${e.message}</div>`;
    }
  }
  // 탭별 후처리 재실행
  if (id === 'summary') initSummary();
  if (id === 'admin')   setTimeout(() => switchAdmTab(0), 50);
  if (id === 'ops_console') setTimeout(() => { if (typeof opsInitConsole === 'function') opsInitConsole(); }, 60);
  // 새로고침 피드백
  const rb = document.getElementById('navRefresh');
  if (rb) { rb.style.transform = 'rotate(360deg)'; rb.style.transition = 'transform .4s'; setTimeout(() => { rb.style.transform = ''; rb.style.transition = ''; }, 420); }
}

function updateNavButtons() {
  // 모든 탭의 백바 뒤로 버튼: 히스토리 없으면 비활성
  const noHist = tabHistory.length === 0;
  document.querySelectorAll('.tab-backbar .back-btn').forEach(b => { b.disabled = noHist; });
}

function renderTab(id) {
  if (id === 'summary')     return renderSummary();
  if (id === 'ops_console') return renderOpsConsole();
  if (id === 'input')       return renderInput();
  if (id === 'admin')       return renderAdmin();
  if (BUILDINGS[id])        return renderBuilding(id);
  return `<div style="color:var(--text-sub);padding:40px;text-align:center">준비 중입니다</div>`;
}

function renderSummary() {
  // 지역/건물/층수 옵션 수집
  const allBldgs = Object.entries(BUILDINGS);
  const regions  = [...new Set(allBldgs.map(([,b]) => b.region).filter(Boolean))].sort();
  const names    = [...new Set(allBldgs.map(([,b]) => b.name).filter(Boolean))].sort();
  const floors   = [...new Set(allBldgs.map(([,b]) => {
    const m = (b.name||'').match(/(\d+층)/);
    return m ? m[1] : '';
  }).filter(Boolean))].sort((a,b) => parseInt(a)-parseInt(b));

  return `
  <!-- 필터 바 -->
  <div class="card" style="padding:14px 20px;margin-bottom:12px">
    <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">
      <div style="font-size:13px;font-weight:800;color:var(--text);white-space:nowrap">조회 필터</div>
      ${[
        ['sum_f_region',  '지역',   regions],
        ['sum_f_building','건물명',  names],
        ['sum_f_floor',   '층수',    floors],
      ].map(([fid, label, opts]) => `
      <div>
        <div style="font-size:11px;color:var(--text-sub);margin-bottom:3px;font-weight:700">${label}</div>
        <select id="${fid}" onchange="applySumFilter()"
          style="padding:6px 10px;background:var(--surface2);border:1px solid var(--border);
                 border-radius:6px;color:var(--text);font-size:12px;outline:none;
                 font-family:'Pretendard',-apple-system,sans-serif;min-width:100px">
          <option value="">전체</option>
          ${opts.map(o=>`<option value="${o}">${o}</option>`).join('')}
        </select>
      </div>`).join('')}
      <button onclick="resetSumFilter()"
        style="padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:none;
               color:var(--text-sub);font-size:12px;cursor:pointer;font-family:'Pretendard',-apple-system,sans-serif">
        초기화
      </button>
      <div id="sum_filter_count" style="font-size:12px;color:var(--text-sub);margin-left:4px"></div>
    </div>
  </div>

  <!-- KPI + 차트 (필터 적용 영역) -->
  <div id="sum_content"></div>
  `;
}

function applySumFilter() {
  sumFilter.region   = document.getElementById('sum_f_region')?.value  || '';
  sumFilter.building = document.getElementById('sum_f_building')?.value || '';
  sumFilter.floor    = document.getElementById('sum_f_floor')?.value   || '';
  renderSummaryContent();
}

function resetSumFilter() {
  sumFilter = { region:'', building:'', floor:'' };
  ['sum_f_region','sum_f_building','sum_f_floor'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  renderSummaryContent();
}

function renderSummaryContent() {
  const el = document.getElementById('sum_content');
  if (!el) return;

  const allBldgs = Object.entries(BUILDINGS);
  const filtered = allBldgs.filter(([id, b]) => {
    if (sumFilter.region   && b.region !== sumFilter.region) return false;
    if (sumFilter.building && b.name   !== sumFilter.building) return false;
    if (sumFilter.floor) {
      const m = (b.name||'').match(/(\d+층)/);
      if (!m || m[1] !== sumFilter.floor) return false;
    }
    return true;
  });

  const cntEl = document.getElementById('sum_filter_count');
  if (cntEl) cntEl.textContent = filtered.length < allBldgs.length
    ? `${filtered.length}개 건물 표시 중`
    : '';

  if (filtered.length === 0) {
    el.innerHTML = `<div class="card" style="text-align:center;padding:48px;color:var(--text-sub)">
      조건에 맞는 건물이 없습니다.</div>`;
    return;
  }

  const totalRent = filtered.reduce((s,[,b]) => s + (b.rent||0), 0);
  const totalArea = filtered.reduce((s,[,b]) => s + (b.area||0), 0);
  const maxRent   = Math.max(...filtered.map(([,b]) => b.rent||0));

  const campusTotals = {};
  filtered.forEach(([,b]) => {
    if (!b.allocation) return;
    Object.entries(b.allocation).forEach(([camp, v]) => {
      campusTotals[camp] = (campusTotals[camp]||0) + (v.total||0);
    });
  });

  const regionColor = r => r==='광교'?'#639922':r==='수내'?'#0c8599':'var(--accent)';

  el.innerHTML = `
  <!-- KPI -->
  <div class="kpi-grid" style="grid-template-columns:repeat(auto-fit,minmax(170px,1fr));margin-bottom:12px">
    <div class="kpi-card c-total">
      <div class="kpi-label">건물 수</div>
      <div class="kpi-value">${filtered.length}</div>
      <div class="kpi-sub">임차 건물</div>
    </div>
    <div class="kpi-card c-total">
      <div class="kpi-label">총 면적</div>
      <div class="kpi-value">${totalArea.toFixed(0)}평</div>
    </div>
    <div class="kpi-card c-total">
      <div class="kpi-label">월 총 임차료</div>
      <div class="kpi-value" style="font-size:18px">${Math.round(totalRent/10000).toLocaleString()}만원</div>
      <div class="kpi-sub">VAT 포함</div>
    </div>
    <div class="kpi-card c-total">
      <div class="kpi-label">평균 평단가</div>
      <div class="kpi-value" style="font-size:18px">${totalArea?Math.round(totalRent/totalArea).toLocaleString():'-'}원</div>
    </div>
  </div>

  <!-- 바차트 -->
  <div class="card">
    <div class="card-title">건물별 임차료</div>
    <div class="bar-chart">
      ${filtered.sort((a,b)=>(b[1].rent||0)-(a[1].rent||0)).map(([id,b]) => {
        const pct = Math.round((b.rent||0)/maxRent*100);
        return `<div class="bar-row">
          <div class="bar-label" style="width:110px;font-size:11px">${b.name}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.max(pct,1)}%;background:${regionColor(b.region)}">
              <span style="font-size:10px">${b.region||''}</span>
            </div>
          </div>
          <div class="bar-val" style="width:110px">${fmt(b.rent)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- 상세 테이블 -->
  <div class="card">
    <div class="card-title">건물별 상세</div>
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>건물명</th><th>지역</th><th class="num">면적</th>
        <th class="num">임차료</th><th class="num">평단가</th>
        <th>기준월</th><th>관코드</th>
      </tr></thead>
      <tbody>
        ${filtered.sort((a,b)=>(b[1].rent||0)-(a[1].rent||0)).map(([id,b]) => `
        <tr onclick="showBuildingInline('${id}')" style="cursor:pointer" title="클릭하면 상세 표시">
          <td style="font-weight:700;color:var(--accent)">${b.name} </td>
          <td><span style="padding:2px 7px;border-radius:4px;font-size:11px;background:#ebecf1;color:#1a1a1a">${b.region||'-'}</span></td>
          <td class="num">${b.area}평</td>
          <td class="num" style="font-weight:700">${fmt(b.rent)}</td>
          <td class="num">${(b.unitPrice||0).toLocaleString()}원</td>
          <td style="font-size:11px;color:var(--text-sub)">${b.month||'-'}</td>
          <td style="font-size:11px">${(b.campuses||[]).join(', ')||'-'}</td>
        </tr>`).join('')}
        <tr style="border-top:2px solid var(--accent);font-weight:800">
          <td>합계</td><td></td>
          <td class="num">${totalArea.toFixed(1)}평</td>
          <td class="num" style="color:var(--accent)">${fmt(totalRent)}</td>
          <td class="num">${totalArea?Math.round(totalRent/totalArea).toLocaleString():'-'}원</td>
          <td></td><td></td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

  ${Object.keys(campusTotals).length ? `
  <div class="card">
    <div class="card-title">관코드별 임차료 합계</div>
    <div class="bar-chart">
      ${Object.entries(campusTotals).sort((a,b)=>b[1]-a[1]).map(([camp, total]) => {
        const sum = Object.values(campusTotals).reduce((s,v)=>s+v,0);
        const pct = Math.round(total/sum*100);
        return `<div class="bar-row">
          <div class="bar-label" style="width:80px;font-size:11px">${camp}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.max(pct,1)}%;background:var(--accent)"></div>
          </div>
          <div class="bar-val" style="width:100px;font-size:11px">${fmt(total)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>` : ''}
  `;
  if(typeof grInsertFlow==='function')grInsertFlow(el);
}

// 서머리 탭 진입 시 콘텐츠 초기화
function initSummary() {
  setTimeout(() => renderSummaryContent(), 30);
}

// 서머리에서 건물 클릭 → 하단에 인라인으로 해당 건물 상세 표시
function showBuildingInline(id) {
  const b = BUILDINGS[id];
  if (!b) return;

  // 기존 인라인 패널 제거
  const existing = document.getElementById('_bldg_inline');
  if (existing) {
    if (existing.dataset.id === id) { existing.remove(); return; } // 같은 건물 클릭 시 토글
    existing.remove();
  }

  // sum_content 아래에 패널 추가
  const sumContent = document.getElementById('sum_content');
  if (!sumContent) return;

  const panel = document.createElement('div');
  panel.id = '_bldg_inline';
  panel.dataset.id = id;
  panel.style.cssText = 'margin-top:8px;border:2px solid var(--accent);border-radius:12px;overflow:hidden';
  panel.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:12px 20px;background:var(--accent);color:#fff">
      <div style="font-size:15px;font-weight:800">${b.name}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="switchTab('${id}')"
          style="padding:4px 12px;border:1px solid rgba(255,255,255,.5);border-radius:6px;
                 background:rgba(255,255,255,.15);color:#fff;font-size:11px;cursor:pointer;
                 font-family:'Pretendard',-apple-system,sans-serif">탭으로 이동 ↗</button>
        <button onclick="document.getElementById('_bldg_inline').remove()"
          style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:0 4px">✕</button>
      </div>
    </div>
    <div style="padding:16px;background:var(--surface)">
      ${renderBuilding(id)}
    </div>`;

  sumContent.appendChild(panel);
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}


// 지역 설정 저장소 (BUILDINGS 객체에 반영 + localStorage 영속)
const REGION_OPTIONS = ['수지','수내','광교','영통','이매','정자'];

function loadBldgRegions() {
  try {
    const saved = JSON.parse(localStorage.getItem('bldgRegions') || '{}');
    Object.entries(saved).forEach(([id, region]) => {
      if (BUILDINGS[id]) BUILDINGS[id].region = region;
    });
  } catch(e) {}
}

function saveBldgRegion(bldgId, region) {
  try {
    const saved = JSON.parse(localStorage.getItem('bldgRegions') || '{}');
    saved[bldgId] = region;
    localStorage.setItem('bldgRegions', JSON.stringify(saved));
    if (BUILDINGS[bldgId]) BUILDINGS[bldgId].region = region;
    showToast(`지역이 "${region}"으로 저장되었습니다.`);
    // 서머리 필터 옵션도 갱신
    if (currentTab === 'summary') initSummary();
  } catch(e) {
    showToast('저장 실패: ' + e.message, true);
  }
}

function renderRegionBar(bldgId) {
  const b = BUILDINGS[bldgId];
  if (!b) return '';
  const cur = b.region || '';
  return `
  <div style="display:flex;align-items:center;gap:10px;padding:10px 16px;
              background:#ebecf1;border:1px solid #d4d4d4;border-radius:10px;
              margin-bottom:12px;flex-wrap:wrap">
    <div style="font-size:12px;font-weight:800;color:#1a1a1a;white-space:nowrap">지역 설정</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${REGION_OPTIONS.map(r => `
        <button id="rbtn_${bldgId}_${r}" onclick="selectRegionBtn('${bldgId}','${r}')"
          style="padding:4px 12px;border-radius:16px;border:1px solid ${cur===r?'#1a1a1a':'#d4d4d4'};
                 background:${cur===r?'#1a1a1a':'#fff'};color:${cur===r?'#fff':'#1a1a1a'};
                 font-size:12px;font-weight:700;cursor:pointer;font-family:'Pretendard',-apple-system,sans-serif;
                 transition:all .15s">
          ${r}
        </button>`).join('')}
      <input type="text" id="rinput_${bldgId}" value="${cur}"
        placeholder="직접 입력..."
        style="padding:4px 10px;border:1px solid #d4d4d4;border-radius:16px;
               font-size:12px;outline:none;width:90px;color:#1a1a1a;font-family:'Pretendard',-apple-system,sans-serif">
    </div>
    <button onclick="saveRegionBtn('${bldgId}')"
      style="padding:5px 14px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;
             font-size:12px;font-weight:800;cursor:pointer;font-family:'Pretendard',-apple-system,sans-serif;
             white-space:nowrap">
      저장
    </button>
    <span style="font-size:11px;color:#1a1a1a;opacity:.7">현재: <strong>${cur||'미설정'}</strong></span>
  </div>`;
}

function selectRegionBtn(bldgId, region) {
  // 버튼 선택 표시
  REGION_OPTIONS.forEach(r => {
    const btn = document.getElementById(`rbtn_${bldgId}_${r}`);
    if (!btn) return;
    const sel = r === region;
    btn.style.background = sel ? '#1a1a1a' : '#fff';
    btn.style.color      = sel ? '#fff' : '#1a1a1a';
    btn.style.borderColor= sel ? '#1a1a1a' : '#d4d4d4';
  });
  // input에도 반영
  const inp = document.getElementById(`rinput_${bldgId}`);
  if (inp) inp.value = region;
}

function saveRegionBtn(bldgId) {
  const inp = document.getElementById(`rinput_${bldgId}`);
  const region = inp ? inp.value.trim() : '';
  if (!region) { showToast('지역을 선택하거나 입력해주세요.', true); return; }
  saveBldgRegion(bldgId, region);
  // 버튼 상태 갱신
  REGION_OPTIONS.forEach(r => {
    const btn = document.getElementById(`rbtn_${bldgId}_${r}`);
    if (!btn) return;
    const sel = r === region;
    btn.style.background = sel ? '#1a1a1a' : '#fff';
    btn.style.color      = sel ? '#fff' : '#1a1a1a';
    btn.style.borderColor= sel ? '#1a1a1a' : '#d4d4d4';
  });
  // 현재 표시 갱신
  const curSpan = inp?.parentElement?.parentElement?.querySelector('strong');
  if (curSpan) curSpan.textContent = region;
}

function renderBuilding(id) {
  const b = BUILDINGS[id];
  if (!b) return `<div style="padding:40px;text-align:center;color:var(--text-sub)">건물 정보 없음</div>`;

  const regionBar = renderRegionBar(id);
  // 상세 데이터(calcRows, heatmap) 있으면 풀 레이아웃, 없으면 기본 KPI
  if (b.calcRows && b.calcRows.length > 0) return regionBar + renderBuildingFull(b);
  return regionBar + renderBuildingBasic(b);
}

          <td class="num" style="font-weight:800;color:var(--warning)">${fmt(cm.commonTotal)}</td>
        </tr>
        <tr><td style="color:var(--text-sub)">사용 관 수</td><td class="num">${cm.usedCampusCount}개</td></tr>
        <tr><td style="color:var(--text-sub)">관당 배부금액 (임차E)</td>
          <td class="num" style="color:var(--success)">${fmt(Math.round(cm.commonTotal / cm.usedCampusCount))}</td></tr>
      </tbody>
    </table>
  </div>`;

  // 호실별 배부 상세
  const calcDetail = `
  <div class="card">
    <div class="card-title">호실별 배부 상세 (CALC)</div>
    <table>
      <thead><tr>
        <th>호실</th><th>면적</th><th>유형</th><th>캠퍼스</th>
        <th class="num">임차A</th><th class="num">임차B</th><th class="num">임차E</th>
      </tr></thead>
      <tbody>
        ${b.calcRows.map(r => `
        <tr>
          <td style="font-weight:700">${r.room}</td>
          <td style="color:var(--text-sub)">${r.area||"-"}평</td>
          <td><span class="badge ${r.type}">${r.type}</span></td>
          <td><span class="badge ${b.campusColors[r.campus]}">${r.campus}</span></td>
          <td class="num">${r.A ? fmt(r.A) : '-'}</td>
          <td class="num">${r.B ? fmt(r.B) : '-'}</td>
          <td class="num">${r.E ? fmt(r.E) : '-'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  // 히트맵
  const heatmapHtml = `
  <div class="card">
    <div class="card-title">요일별 사용 히트맵</div>
    <div class="heatmap-wrap">
      <table class="heatmap">
        <thead><tr>
          <th>호실</th>
          ${DAYS.map(d=>`<th>${DAY_KR[d]}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${Object.entries(b.heatmap).map(([room, pat]) => `
          <tr>
            <th style="text-align:left;padding:4px 10px;font-size:12px;color:var(--text)">${room}</th>
            ${DAYS.map(d => {
              const val = pat[d] || '-';
              if (!val || val === '-') return `<td class="hm-empty">-</td>`;
              if (val.includes('/') || val === 'MIX') return `<td class="hm-mix">${val}</td>`;
              // 캠퍼스별 색상 동적 적용
              const cls = b.campusColors && b.campusColors[val];
              if (cls === 'tedi'     || val === '테디')    return `<td class="hm-tedi">${val}</td>`;
              if (cls === 'youngjae' || val === '영재')    return `<td class="hm-youngjae">${val}</td>`;
              if (cls === 'jungsa'   || val === '중사')    return `<td class="hm-jungsa">${val}</td>`;
              // 색상 클래스 없으면 인덱스 기반 색상 할당
              const campIdx = (b.campuses||[]).indexOf(val);
              const colors = ['hm-tedi','hm-youngjae','hm-jungsa','hm-mix'];
              const hmCls = campIdx >= 0 ? (colors[campIdx % colors.length]) : 'hm-empty';
              return `<td class="${hmCls}">${val}</td>`;
            }).join('')}
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;

  const compareHtml = renderCompare(b);

  return kpiHtml + campAlloc + commonsDetail + heatmapHtml + calcDetail + compareHtml;
}
