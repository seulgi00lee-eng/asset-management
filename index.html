// ── SVG 선 그래프 (요일별 추이)
function svgLineChart(items, color, unit, fmt) {
  if (!items.length || items.every(d=>d.value===0))
    return '<div style="padding:30px;text-align:center;color:var(--text-sub)">데이터 없음</div>';
  const W = 760, H = 260, padL = 70, padR = 30, padT = 20, padB = 36;
  const max = Math.max(...items.map(d=>d.value), 1);
  const niceMax = Math.ceil(max / 4) * 4 || 4;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const x = i => padL + (items.length === 1 ? plotW/2 : (plotW * i / (items.length-1)));
  const y = v => padT + plotH - (plotH * v / niceMax);

  // 격자 + Y축 라벨
  let grid = '';
  for (let i=0;i<=4;i++) {
    const gv = niceMax * i / 4;
    const gy = y(gv);
    grid += `<line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="#d3d1c7" stroke-width="1"/>`;
    grid += `<text x="${padL-8}" y="${gy+4}" text-anchor="end" font-size="10" fill="#888780" font-family="monospace">${fmt(gv)}</text>`;
  }
  // 선 path
  const linePath = items.map((d,i)=>`${i===0?'M':'L'}${x(i)},${y(d.value)}`).join(' ');
  // 점 + X 라벨 + 값
  let dots = '';
  items.forEach((d,i) => {
    dots += `<circle cx="${x(i)}" cy="${y(d.value)}" r="4" fill="${color}"/>`;
    dots += `<text x="${x(i)}" y="${H-padB+20}" text-anchor="middle" font-size="11" fill="#444441" font-weight="700">${d.label}</text>`;
    if (d.value > 0)
      dots += `<text x="${x(i)}" y="${y(d.value)-10}" text-anchor="middle" font-size="10" fill="${color}" font-weight="800" font-family="monospace">${fmt(d.value)}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    ${grid}
    <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5"/>
    ${dots}
  </svg>
  <div style="text-align:right;font-size:10px;color:var(--text-sub);margin-top:4px">단위: ${unit}</div>`;
}

// ── SVG 막대 그래프 (사업부별 비교)
function svgBarChart(items, color, unit, fmt) {
  if (!items.length || items.every(d=>d.value===0))
    return '<div style="padding:30px;text-align:center;color:var(--text-sub)">데이터 없음</div>';
  const W = 760, barH = 38, gap = 14, padL = 70, padR = 90, padT = 10;
  const H = padT + items.length * (barH + gap);
  const max = Math.max(...items.map(d=>d.value), 1);
  const plotW = W - padL - padR;

  let bars = '';
  items.forEach((d,i) => {
    const yPos = padT + i * (barH + gap);
    const w = plotW * d.value / max;
    bars += `<text x="${padL-8}" y="${yPos+barH/2+4}" text-anchor="end" font-size="12" fill="#444441" font-weight="700">${d.label}</text>`;
    bars += `<rect x="${padL}" y="${yPos}" width="${w}" height="${barH}" rx="6" fill="${color}" opacity="0.85"/>`;
    bars += `<text x="${padL+w+8}" y="${yPos+barH/2+4}" font-size="12" fill="${color}" font-weight="800" font-family="monospace">${fmt(d.value)}</text>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">${bars}</svg>
  <div style="text-align:right;font-size:10px;color:var(--text-sub);margin-top:4px">단위: ${unit}</div>`;
}

function onEffFilterChange(k, val) {
  effFilterPending[k] = val;
  // 지역 바뀌면 건물/관코드 옵션 연동 갱신
  if (k === 'region') updateEffFilterCascade();
  if (k === 'building') updateEffCampusOptions();
}

function updateEffFilterCascade() {
  const region = effFilterPending.region;
  // 건물 옵션: 해당 지역 건물만
  const bldgSel = document.getElementById('eff_f_building');
  if (bldgSel) {
    const bldgs = Object.values(BUILDINGS)
      .filter(b => !region || b.region === region)
      .map(b => (b.name||'').replace(/\s*\d+층\s*/,'').trim())
      .filter(Boolean);
    const uniq = [...new Set(bldgs)].sort();
    bldgSel.innerHTML = '<option value="">전체</option>' + uniq.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
    effFilterPending.building = '';
  }
  // 관코드 옵션: 해당 지역 건물의 관코드
  updateEffCampusOptions();
}

function updateEffCampusOptions() {
  const region   = effFilterPending.region;
  const building = effFilterPending.building;
  const campSel  = document.getElementById('eff_f_campus');
  if (!campSel) return;
  const camps = [];
  Object.values(BUILDINGS).forEach(b => {
    const bName = (b.name||'').replace(/\s*\d+층\s*/,'').trim();
    if (region   && b.region !== region)   return;
    if (building && bName    !== building) return;
    (b.campuses||[]).forEach(c => camps.push(String(c)));
  });
  const uniq = [...new Set(camps)].sort();
  campSel.innerHTML = '<option value="">전체</option>' + uniq.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
  effFilterPending.campus = '';
}

function initEffFilters() {
  effFilterPending = { region:'', building:'', dept:'', campus:'', spaceType:'' };
  const keys = ['region','building','dept','campus','spaceType'];
  keys.forEach(k => {
    const sel = document.getElementById('eff_f_' + k);
    if (!sel) return;
    let vals = [];
    if (k === 'region') {
      vals = [...new Set(Object.values(BUILDINGS).map(b => b.region).filter(Boolean))].sort();
    } else if (k === 'building') {
      vals = [...new Set(Object.values(BUILDINGS).map(b => (b.name||'').replace(/\s*\d+층\s*/,'').trim()).filter(Boolean))].sort();
    } else if (k === 'campus') {
      // 전체 BUILDINGS의 모든 관코드
      const all = [];
      Object.values(BUILDINGS).forEach(b => (b.campuses||[]).forEach(c => all.push(String(c))));
      vals = [...new Set(all)].sort();
    } else if (k === 'dept') {
      // EFF_DATA + 등록 가능 사업부 목록
      const depts = [...new Set(EFF_DATA.map(r => r.dept).filter(Boolean))];
      if (!depts.length) depts.push('중등사업부','초등사업부','고등사업부','테디사업부');
      vals = depts.sort();
    } else if (k === 'spaceType') {
      vals = ['A','B','C','D','E'];
    }
    sel.innerHTML = '<option value="">전체</option>' + vals.map(v=>'<option value="'+v+'">'+v+'</option>').join('');
    sel.value = effFilter[k] || '';
  });
}

function getFilteredEff() {
  return EFF_DATA.map(effRow).filter(r =>
    r.dept !== '테디사업부' && r.dept !== '본사' &&
    (!effFilter.region    || r.region    === effFilter.region) &&
    (!effFilter.building  || r.building  === effFilter.building) &&
    (!effFilter.dept      || r.dept      === effFilter.dept) &&
    (!effFilter.campus    || r.campus    === effFilter.campus) &&
    (!effFilter.spaceType || r.spaceType === effFilter.spaceType)
  );
}

function resetEffFilter() {
  effFilter = { region:'', building:'', dept:'', campus:'', spaceType:'' };
  effFilterPending = { region:'', building:'', dept:'', campus:'', spaceType:'' };
  initEffFilters();
  renderDeptKPI();

}

function buildEffContext(camp) {
  const data = EFF_DATA.filter(r => r.campus === camp);
  if (!data.length) return '';

  const totalStudents = data.reduce((s,r) => s+r.curStudents, 0);
  const totalMax      = data.reduce((s,r) => s+r.maxCapacity, 0);
  const totalStdSales = data.reduce((s,r) => s+(r.maxCapacity*r.stdFee), 0);
  const totalCurSales = data.reduce((s,r) => s+(r.curStudents*r.stdFee), 0);
  const capRate  = totalMax ? (totalStudents/totalMax*100).toFixed(1) : 0;
  const salesRate= totalStdSales ? (totalCurSales/totalStdSales*100).toFixed(1) : 0;
  const vacantSlots = data.map(r => r.maxCapacity - r.curStudents).filter(v=>v>0);
  const totalVacant = vacantSlots.reduce((s,v)=>s+v,0);

  const roomDetails = data.map(r => {
    const eff = r.maxCapacity ? (r.curStudents/r.maxCapacity*100).toFixed(0) : 0;
    return `  - ${r.room}호 (${r.area||"-"}평, 최대${r.maxCapacity}명): ${r.className} / 현재 ${r.curStudents}명 / 효율 ${eff}% / 수강료 ${r.stdFee.toLocaleString()}원`;
  }).join('\n');

  return `당신은 교육 사업 공간 운영 전략 컨설턴트입니다.

[${camp} 캠퍼스 운영 현황]
- 총 호실: ${data.length}개 | 현재 수강인원: ${totalStudents}명 / 최대수용: ${totalMax}명
- 수용효율: ${capRate}% | 여유좌석: ${totalVacant}석 | 매출효율: ${salesRate}%
- 현재 월매출: ${Math.round(totalCurSales).toLocaleString()}원 | 최대가능 매출: ${Math.round(totalStdSales).toLocaleString()}원 | 갭: ${Math.round(totalStdSales-totalCurSales).toLocaleString()}원

[호실별 상세]
${roomDetails}

[효율 기준] 80%↑ 우수 / 60~80% 보통 / 60%↓ 주의

응답 규칙 (반드시 준수):

  ],

    {
      "label": "시나리오명 (예: 현재, 단기개선, 적극개선)",

async function sendEffAnalysis(camp, q) {
  if (!q || !q.trim()) return;

  // 모달 내 key input 우선 확인
  const modalKey = document.getElementById('_eff_apikey');
  if (modalKey && modalKey.value) aiKey = modalKey.value;

  if (!aiKey) {
    const modalKey2 = document.getElementById('_eff_apikey');
    if (modalKey2) { modalKey2.style.borderColor = '#e03131'; modalKey2.focus(); }
    alert('API Key를 입력해주세요.');
    return;
  }

  const input = document.getElementById('_eff_input');
  if (input) input.value = '';

  const msgs = document.getElementById('_eff_msgs');
  if (!msgs) return;

  // 사용자 메시지
  const userEl = document.createElement('div');
  userEl.style.cssText = 'align-self:flex-end;max-width:80%;padding:10px 14px;background:#1a1a1a;color:#fff;border-radius:12px 12px 3px 12px;font-size:13px;line-height:1.5';
  userEl.textContent = q;
  msgs.appendChild(userEl);

  // 로딩
  const loadEl = document.createElement('div');
  loadEl.style.cssText = 'align-self:flex-start;padding:10px 14px;background:var(--surface2);border-radius:3px 12px 12px 12px;font-size:13px;color:var(--text-sub);font-style:italic';
  loadEl.textContent = '◷ 분석 중...';
  msgs.appendChild(loadEl);
  msgs.scrollTop = msgs.scrollHeight;

  if (!effAnalysisHistory[camp]) effAnalysisHistory[camp] = [];
  effAnalysisHistory[camp].push({ role:'user', content: q });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'x-api-key':aiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: buildEffContext(camp),
        messages: effAnalysisHistory[camp],
      })
    });
    const data = await res.json();
    loadEl.remove();

    if (data.error) {
      appendEffMsg(msgs, '✗ ' + data.error.message, true);
      effAnalysisHistory[camp].pop();
      return;
    }

    const reply = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    effAnalysisHistory[camp].push({ role:'assistant', content:reply });

    // JSON 파싱 시도 → 성공하면 시각화, 실패하면 텍스트
    try {
      const clean = reply.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      renderEffViz(msgs, parsed, camp);
    } catch(e) {
      const replyEl = document.createElement('div');
      replyEl.style.cssText = 'align-self:flex-start;max-width:92%;padding:12px 16px;background:#ebecf1;border:1px solid #d3d1c7;border-radius:3px 12px 12px 12px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap';
      replyEl.textContent = reply;
      msgs.appendChild(replyEl);
    }
    msgs.scrollTop = msgs.scrollHeight;

  } catch(e) {
    loadEl.remove();
    appendEffMsg(msgs, '✗ 연결 오류: ' + e.message, true);
    effAnalysisHistory[camp].pop();
  }
}

function appendEffMsg(container, text, isError) {
  const el = document.createElement('div');
  el.style.cssText = `align-self:flex-start;padding:10px 14px;border-radius:8px;font-size:13px;color:${isError?'#e03131':'var(--text)'};background:${isError?'#f6f7fc':'var(--surface2)'}`;
  el.textContent = text;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
}

// ── 시각화 렌더러
function renderEffViz(container, parsed, camp) {
  const el = document.createElement('div');
  el.style.cssText = 'align-self:stretch;background:#ebecf1;border:1px solid #d3d1c7;border-radius:12px;overflow:hidden;font-size:13px';

  const statusColor = s => s==='우수'?'#1a1a1a':s==='보통'?'#b5651d':'#e03131';
  const statusBg    = s => s==='우수'?'#e7e8ed':s==='보통'?'#f6f7fc':'#f6f7fc';

  // 시나리오 바 차트
  const scenarios = parsed.scenarios || [];
  const maxSales = Math.max(...scenarios.map(s=>s.monthlySales), 1);
  const maxCap   = 100;

  const scenarioBars = scenarios.map((s, i) => {
    const salesPct = Math.round(s.monthlySales / maxSales * 100);
    const colors = ['#94a3b8','#1a1a1a','#1a1a1a'];
    const color  = colors[i % colors.length];
    return `
    <div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
        <span style="font-weight:800;font-size:12px;color:${color}">${s.label}</span>
        <span style="font-size:11px;color:var(--text-sub)">${s.description||''}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
        <span style="font-size:11px;color:var(--text-sub);width:52px;flex-shrink:0">수용효율</span>
        <div style="flex:1;height:14px;background:#d3d1c7;border-radius:7px;overflow:hidden">
          <div style="width:${s.capRate}%;height:100%;background:${color};border-radius:7px;transition:width .6s ease"></div>
        </div>
        <span style="font-size:12px;font-weight:800;color:${color};width:40px;text-align:right">${s.capRate}%</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:11px;color:var(--text-sub);width:52px;flex-shrink:0">월 매출</span>
        <div style="flex:1;height:14px;background:#d3d1c7;border-radius:7px;overflow:hidden">
          <div style="width:${salesPct}%;height:100%;background:${color};opacity:.7;border-radius:7px"></div>
        </div>
        <span style="font-size:12px;font-weight:800;color:${color};width:60px;text-align:right">${Math.round(s.monthlySales).toLocaleString()}원</span>
      </div>
      <div style="margin-top:3px;font-size:11px;color:var(--text-sub);padding-left:60px">
        수강인원 ${s.students}명
      </div>
    </div>`;
  }).join('');

  // 호실 진단 카드
  const diagCards = (parsed.diagnosis||[]).map(d => `
    <div style="padding:8px 10px;border-radius:8px;background:${statusBg(d.status)};
                border-left:3px solid ${statusColor(d.status)};margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span style="font-weight:800;font-size:12px">${d.room}</span>
        <span style="font-size:10px;padding:1px 7px;border-radius:10px;
                     background:${statusColor(d.status)};color:#fff;font-weight:700">${d.status}</span>
      </div>
      <div style="font-size:11px;color:#555;margin-bottom:2px">△ ${d.issue}</div>
      <div style="font-size:11px;color:#333;font-weight:700">→ ${d.action}</div>
    </div>`).join('');

  el.innerHTML = `
    <!-- 헤더 요약 -->
    <div style="padding:12px 16px;background:linear-gradient(135deg,#1a1a1a,#5a5a5a);color:#fff">
      <div style="font-size:14px;font-weight:800;margin-bottom:2px">${camp} 분석 결과</div>
      <div style="font-size:12px;opacity:.9">${parsed.summary||''}</div>
    </div>

    <div style="padding:14px 16px">
      <!-- 시나리오 비교 -->
      ${scenarios.length ? `
      <div style="margin-bottom:16px">
        <div style="font-size:12px;font-weight:800;color:var(--text-sub);margin-bottom:10px;
                    text-transform:uppercase;letter-spacing:.4px">시나리오별 매출·효율 비교</div>
        ${scenarioBars}
      </div>` : ''}

      <!-- 호실 진단 -->
      ${parsed.diagnosis?.length ? `
      <div style="margin-bottom:14px">
        <div style="font-size:12px;font-weight:800;color:var(--text-sub);margin-bottom:8px;
                    text-transform:uppercase;letter-spacing:.4px">호실별 진단 & 액션</div>
        ${diagCards}
      </div>` : ''}

      <!-- 인사이트 -->
      ${parsed.insight ? `
      <div style="padding:10px 14px;background:#fff;border:1px solid #d3d1c7;border-radius:8px;
                  font-size:12px;line-height:1.7;color:var(--text)">
        ${parsed.insight}
      </div>` : ''}
    </div>`;

  container.appendChild(el);
}

function renderEffTable() {
  const thead = document.getElementById('eff_thead');
  const tbody = document.getElementById('eff_tbody');
  if (!thead || !tbody) return;

  // 헤더
  thead.innerHTML = `<tr style="background:var(--surface2)">` +
    EFF_COLS.map(c => {
      if (c.key === '_chk') return `
        <th style="padding:8px 10px;border-bottom:2px solid var(--border);width:36px;text-align:center">
          <input type="checkbox" id="eff_chk_all" onchange="toggleAllEffChk(this.checked)"
            title="전체 선택" style="cursor:pointer;width:14px;height:14px">
        </th>`;
      return `
      <th style="padding:8px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--text-sub);
                 white-space:nowrap;cursor:${c.calc?'default':'pointer'};border-bottom:2px solid var(--border)"
          ${c.calc?'':` onclick="sortEff('${c.key}')"`}>
        ${c.label}${effSortCol===c.key ? (effSortAsc?'▲':'▼') : ''}
      </th>`;
    }).join('') + `</tr>`;

  // ── classKey 기준으로 1행만 표시 (요일 합산)
  const classMap = new Map();
  getFilteredEff().forEach(r => {
    const ck = r.classKey || `${r.bldgKey||''}_${r.room}_${r.campus}_${r.className}`;
    if (!classMap.has(ck)) {
      classMap.set(ck, { ...r, _days: [], _classKey: ck });
    }
    const entry = classMap.get(ck);
    if (r.day && !entry._days.includes(r.day)) entry._days.push(r.day);
  });

  // 요일 정렬 순서
  const DAY_ORDER = ['월','화','수','목','금','토','일'];
  let data = [...classMap.values()].map(r => {
    const st = calcEffStats(r);
    r._days.sort((a,b) => DAY_ORDER.indexOf(a) - DAY_ORDER.indexOf(b));
    return {
      ...r,
      capRate:        +st.capRate.toFixed(1),
      stdSales:       st.totalMaxSales,
      curSales:       st.totalCurSales,
      salesRate:      +st.salesRate.toFixed(1),
      _totalStudents: st.totalStudents,
      _daysLabel:     r._days.join('/') || (r.day || '-'),
    };
  });

  if (effSortCol) {
    data.sort((a,b) => {
      const va = a[effSortCol], vb = b[effSortCol];
      return effSortAsc
        ? (typeof va==='number' ? va-vb : String(va).localeCompare(String(vb)))
        : (typeof vb==='number' ? vb-va : String(vb).localeCompare(String(va)));
    });
  }

  const campusColorMap = BUILDINGS.b7.campusColors || {};

  tbody.innerHTML = data.map(r => {
    const gr = r.capRate >= 80 ? {e:'●',c:'#595750',bg:'#e7e8ed'}
             : r.capRate >= 60 ? {e:'●',c:'#b45309',bg:'#f6f7fc'}
             :                   {e:'●',c:'#e03131',bg:'#f6f7fc'};
    const fmtNum   = n => Math.round(n||0).toLocaleString('ko-KR');
    const badgeCls = campusColorMap[r.campus] || '';
    const classLabel = (r.periods&&r.periods.length)
      ? (r.periods||[]).map((p,i) => `${i+1}교시: ${p.className||'-'}`).join(' / ')
      : (r.className || '-');

    // 요일 뱃지 (합산된 요일 표시)
    const daysLabel = r._daysLabel || r.day || '-';
    const dayBadge = `<span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:800;
      background:#e7e8ed;color:#1a1a1a;white-space:nowrap">${daysLabel}</span>`;

    // 수업구분 (classType)
    const typeTag = r.classType
      ? `<span style="font-size:10px;padding:1px 6px;border-radius:8px;background:#f5f3ff;color:#639922;font-weight:700;margin-left:4px">${r.classType}</span>`
      : '';

    return `<tr id="eff_row_${r.id}" style="border-bottom:1px solid var(--border)"
      onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background=''">
      <td style="padding:8px 10px;text-align:center;width:36px">
        <input type="checkbox" class="eff_row_chk" data-id="${r.id}"
          style="cursor:pointer;width:14px;height:14px">
      </td>
      <td style="padding:8px 10px;font-size:12px">${r.region||'-'}</td>
      <td style="padding:8px 10px;font-size:12px">${r.dept||'-'}</td>
      <td style="padding:8px 10px"><span class="badge ${badgeCls}">${r.campus}</span></td>
      <td style="padding:8px 10px;font-size:12px">${r.building||'-'}</td>
      <td style="padding:8px 10px;font-size:12px">${r.floor||'-'}</td>
      <td style="padding:8px 10px;text-align:center">
        <span style="padding:2px 7px;border-radius:4px;font-size:11px;font-weight:800;
          background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd">임차${r.spaceType}</span>
      </td>
      <td style="padding:8px 10px;font-weight:700">${r.room}</td>
      <td style="padding:8px 10px;text-align:center">${dayBadge}</td>
      <td style="padding:8px 10px;text-align:right;font-family:'JetBrains Mono',monospace">${r.area||'-'}평</td>
      <td style="padding:8px 10px;text-align:right;font-family:'JetBrains Mono',monospace">${r.maxCapacity}명</td>
      <td style="padding:8px 10px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700">${r._totalStudents}명</td>
      <td style="padding:8px 10px;font-size:11px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${classLabel}">
        ${classLabel}${typeTag}
      </td>
      <td style="padding:8px 10px;text-align:right;background:${gr.bg}">
        <span style="font-weight:800;color:${gr.c};font-family:'JetBrains Mono',monospace">${r.capRate}%</span>
      </td>
      <td style="padding:8px 10px;text-align:right;font-family:'JetBrains Mono',monospace">${fmtNum(r.stdFee)}원</td>
      <td style="padding:8px 10px;text-align:right;font-family:'JetBrains Mono',monospace">${fmtNum(r.stdSales)}원</td>
      <td style="padding:8px 10px;text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:#1a1a1a">${fmtNum(r.curSales)}원</td>
      <td style="padding:8px 10px;text-align:right;background:${gr.bg}">
        <span style="font-weight:800;color:${gr.c};font-family:'JetBrains Mono',monospace">${r.salesRate}%</span>
      </td>
      <td style="padding:8px 10px;text-align:center;font-size:16px">${gr.e}</td>
      <td style="padding:8px 10px;text-align:center">
        <button onclick="openEditEffRow(${r.id})"
          style="padding:3px 10px;border:1px solid var(--border);border-radius:5px;background:none;
                 font-size:11px;cursor:pointer;color:var(--text-sub);font-family:'Pretendard',-apple-system,sans-serif">수정</button>
        <button onclick="deleteEffRow(${r.id})"
          style="padding:3px 10px;border:1px solid #fca5a5;border-radius:5px;background:none;
                 font-size:11px;cursor:pointer;color:var(--danger);font-family:'Pretendard',-apple-system,sans-serif;margin-left:4px">삭제</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="${EFF_COLS.length}" style="padding:40px;text-align:center;color:var(--text-sub)">데이터 없음</td></tr>`;
}

function sortEff(col) {
  if (effSortCol === col) effSortAsc = !effSortAsc;
  else { effSortCol = col; effSortAsc = true; }
  renderEffTable();
}

let _editEffId = null;
// ── 건물 선택 → 관코드/호실 자동 세팅
function onEffBldgSelect(bldgId) {
  const campSel = document.getElementById('eff_in_campussel');
  const roomSel = document.getElementById('eff_in_roomsel');
  if (!campSel || !roomSel) return;

  // 자동 필드 초기화
  ['region','building','floor','campus','room','area'].forEach(k => {
    const el = document.getElementById('eff_in_' + k);
    if (el) el.value = '';
  });
  document.getElementById('eff_auto_preview').style.display = 'none';

  if (!bldgId) {
    campSel.innerHTML = '<option value="">-- 건물 먼저 선택 --</option>';
    roomSel.innerHTML = '<option value="">-- 관코드 먼저 선택 --</option>';
    return;
  }

  const b = BUILDINGS[bldgId];
  if (!b) return;

  // 지역/건물명/층수 자동 세팅
  const floorM = (b.name||'').match(/(\d+층)/);
  const floor  = floorM ? floorM[1] : '';
  const bldgBaseName = (b.name||'').replace(/\s*\d+층\s*/, '').trim();

  const setV = (id, val) => { const el = document.getElementById('eff_in_'+id); if(el) el.value = val; };
  setV('region',   b.region || '');
  setV('building', bldgBaseName);
  setV('floor',    floor);

  // 관코드 목록
  const campuses = b.campuses || [];
  campSel.innerHTML = '<option value="">-- 관코드 선택 --</option>' +
    campuses.map(c => `<option value="${c}">${c}</option>`).join('');
  roomSel.innerHTML = '<option value="">-- 관코드 선택 후 --</option>';

  // 미리보기
  const prev = document.getElementById('eff_auto_preview');
  const prevTxt = document.getElementById('eff_auto_text');
  if (prev && prevTxt) {
    prevTxt.textContent = `${b.region} · ${b.name}`;
    prev.style.display = 'block';
  }
}

function onEffCampusSelect(campus) {
  const bldgId = document.getElementById('eff_in_bldgkey')?.value;
  const roomSel = document.getElementById('eff_in_roomsel');
  if (!roomSel || !bldgId) return;

  const el = document.getElementById('eff_in_campus');
  if (el) el.value = campus;

  if (!campus) {
    roomSel.innerHTML = '<option value="">-- 관코드 먼저 선택 --</option>';
    return;
  }

  const b = BUILDINGS[bldgId];
  if (!b) return;

  // 해당 캠퍼스의 호실 목록 (calcRows 기반)
  const campRows = (b.calcRows||[]).filter(r => r.campus === campus || r.campus.includes(campus));
  const rooms = [...new Set(campRows.map(r => String(r.room)))];

  roomSel.innerHTML = '<option value="">-- 호실 선택 --</option>' +
    rooms.map(r => `<option value="${r}">${r}</option>`).join('');
}

function onEffRoomSelect(room) {
  const bldgId = document.getElementById('eff_in_bldgkey')?.value;
  const campus = document.getElementById('eff_in_campussel')?.value;
  if (!bldgId || !room) return;

  const b = BUILDINGS[bldgId];
  if (!b) return;

  const setV = (id, val) => { const el = document.getElementById('eff_in_'+id); if(el) el.value = val; };
  setV('room', room);

  // 호실 평수 자동 세팅 (calcRows에서)
  const calcRow = (b.calcRows||[]).find(r => String(r.room) === String(room) && (r.campus === campus || !campus));
  if (calcRow) {
    setV('area', calcRow.area);
    setV('spaceType', calcRow.type || 'A');
    // spaceType select
    const spSel = document.getElementById('eff_in_spaceType');
    if (spSel) spSel.value = calcRow.type || 'A';

    const prev = document.getElementById('eff_auto_text');
    if (prev) prev.textContent = `${b.region} · ${b.name} · ${campus} · ${room}호 (${calcRow.area}평, 임차${calcRow.type})`;
  }
}

const EFF_FIELDS = ['region','dept','campus','building','floor','spaceType','room','area','maxCapacity','curStudents','className','stdFee'];


// ── 교시 입력 관리
let _periodCount = 0;

function addPeriodRow(data) {
  const wrap = document.getElementById('eff_periods_wrap');
  if (!wrap) return;

  // 첫 추가 시 안내문구 제거
  if (_periodCount === 0) wrap.innerHTML = '';

  _periodCount++;
  const pid = 'p' + _periodCount;
  const row = document.createElement('div');
  row.id = 'period_row_' + pid;
  row.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 80px 90px auto;gap:6px;margin-bottom:6px;align-items:center';

  const inputStyle = 'padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:11px;outline:none;width:100%;font-family:Pretendard,sans-serif;color:var(--text);background:#fff';

  row.innerHTML = `
    <input type="text" id="${pid}_class" placeholder="수업명/반명" value="${data?.className||''}"
      style="${inputStyle}" oninput="updatePeriodSummary()">
    <input type="text" id="${pid}_time"  placeholder="시간 (예: 10:00~12:00)" value="${data?.time||''}"
      style="${inputStyle}">
    <input type="number" id="${pid}_students" placeholder="인원" value="${data?.students||''}" min="0"
      style="${inputStyle}" oninput="updatePeriodSummary()">
    <input type="number" id="${pid}_fee" placeholder="수강료" value="${data?.fee||''}" min="0"
      style="${inputStyle}" oninput="updatePeriodSummary()">
    <button onclick="removePeriodRow('${pid}')"
      style="padding:5px 8px;border:1px solid #fca5a5;border-radius:6px;background:none;
             color:var(--danger);font-size:12px;cursor:pointer;white-space:nowrap">✕</button>`;
  wrap.appendChild(row);

  // 헤더 없으면 추가
  if (_periodCount === 1) {
    const header = document.createElement('div');
    header.id = 'period_header';
    header.style.cssText = 'display:grid;grid-template-columns:1fr 1fr 80px 90px auto;gap:6px;margin-bottom:4px;font-size:10px;color:var(--text-sub);font-weight:700';
    header.innerHTML = '<div>수업명/반명</div><div>시간대</div><div>현재인원</div><div>수강료</div><div></div>';
    wrap.insertBefore(header, wrap.firstChild);
  }
  updatePeriodSummary();
}

function removePeriodRow(pid) {
  document.getElementById('period_row_' + pid)?.remove();
  _periodCount = Math.max(0, _periodCount - 1);
  if (_periodCount === 0) {
    const wrap = document.getElementById('eff_periods_wrap');
    if (wrap) wrap.innerHTML = '<div style="font-size:11px;color:var(--text-sub);text-align:center;padding:8px">교시 추가 버튼으로 수업을 입력하세요</div>';
    document.getElementById('eff_periods_summary').style.display = 'none';
  }
  updatePeriodSummary();
}

function getPeriodRows() {
  const rows = [];
  document.querySelectorAll('[id^="period_row_"]').forEach(rowEl => {
    const pid = rowEl.id.replace('period_row_','');
    const className = document.getElementById(pid+'_class')?.value.trim();
    const time      = document.getElementById(pid+'_time')?.value.trim();
    const students  = parseInt(document.getElementById(pid+'_students')?.value) || 0;
    const fee       = parseInt(document.getElementById(pid+'_fee')?.value)      || 0;
    if (className || students) rows.push({ className, time, students, fee });
  });
  return rows;
}

function updatePeriodSummary() {
  const periods = getPeriodRows();
  const summary = document.getElementById('eff_periods_summary');
  if (!summary) return;
  if (!periods.length) { summary.style.display = 'none'; return; }

  const maxCap = parseInt(document.getElementById('eff_in_maxCapacity')?.value) || 0;
  const totalStudents = periods.reduce((s,p) => s+p.students, 0);
  const totalMaxSales = periods.reduce((s,p) => s+(p.fee * maxCap), 0);
  const totalCurSales = periods.reduce((s,p) => s+(p.fee * p.students), 0);
  const avgCap = periods.length && maxCap ? (totalStudents / (periods.length * maxCap) * 100).toFixed(1) : 0;

  summary.style.display = 'block';
  summary.innerHTML = `
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <span><strong>${periods.length}교시</strong></span>
      <span>평균수용효율 <strong style="color:${avgCap>=80?'#1a1a1a':avgCap>=60?'#b5651d':'#e03131'}">${avgCap}%</strong></span>
      <span>총 최대매출 <strong>${Math.round(totalMaxSales).toLocaleString()}원</strong></span>
      <span>총 발생매출(추정) <strong style="color:#1a1a1a">${Math.round(totalCurSales).toLocaleString()}원</strong></span>
    </div>`;
}

function clearPeriodRows() {
  _periodCount = 0;
  const wrap = document.getElementById('eff_periods_wrap');
  if (wrap) wrap.innerHTML = '<div style="font-size:11px;color:var(--text-sub);text-align:center;padding:8px">교시 추가 버튼으로 수업을 입력하세요</div>';
  const hdr = document.getElementById('period_header');
  if (hdr) hdr.remove();
  const summary = document.getElementById('eff_periods_summary');
  if (summary) summary.style.display = 'none';
}

// ── periods 기반 집계 헬퍼
function calcEffStats(r) {
  if (r.periods && r.periods.length) {
    const maxCap = r.maxCapacity || 0;
    const totalStudents = r.periods.reduce((s,p) => s+p.students, 0);
    const totalMaxSales = r.periods.reduce((s,p) => s+(p.fee * maxCap), 0);
    const totalCurSales = r.periods.reduce((s,p) => s+(p.fee * p.students), 0);
    const capRate  = (r.periods.length && maxCap) ? totalStudents / (r.periods.length * maxCap) * 100 : 0;
    const salesRate= totalMaxSales ? totalCurSales / totalMaxSales * 100 : 0;
    return { totalStudents, totalMaxSales, totalCurSales, capRate, salesRate, periodCount: r.periods.length };
  }
  // 기존 단일 교시 방식 호환
  const curStudents  = r.curStudents  || 0;
  const maxCapacity  = r.maxCapacity  || 0;
  const stdFee       = r.stdFee       || 0;
  const totalMaxSales = maxCapacity * stdFee;
  const totalCurSales = curStudents  * stdFee;
  const capRate  = maxCapacity ? curStudents / maxCapacity * 100 : 0;
  const salesRate= totalMaxSales ? totalCurSales / totalMaxSales * 100 : 0;
  return { totalStudents: curStudents, totalMaxSales, totalCurSales, capRate, salesRate, periodCount: 1 };
}

function openEditEffRow(id) {
  _editEffId = id;
  const row = EFF_DATA.find(r => r.id === id);
  if (!row) return;
  document.getElementById('effModalTitle').textContent = '✎ 데이터 수정';
  EFF_FIELDS.forEach(k => {
    const el = document.getElementById('eff_in_' + k);
    if (el) el.value = row[k] ?? '';
  });
  clearPeriodRows();
  if (row.periods && row.periods.length) {
    row.periods.forEach(p => addPeriodRow(p));
  }
  document.getElementById('effRowModal').classList.add('open');
}

function saveEffRow() {
  const bldgKeyEl = document.getElementById('eff_in_bldgkey');
  const bldgKey = bldgKeyEl ? bldgKeyEl.value : '';

  const vals = {};
  let valid = true;
  EFF_FIELDS.forEach(k => {
    const el = document.getElementById('eff_in_' + k);
    if (!el) return;
    const v = el.value.trim();
    // 자동 세팅 필드는 빈 값 허용
    const autoFields = ['region','building','floor','campus','room','area'];
    if (!v && !autoFields.includes(k)) { el.style.borderColor = 'var(--danger)'; valid = false; }
    else { el.style.borderColor = 'var(--border)'; }
    vals[k] = ['area','maxCapacity','curStudents','stdFee'].includes(k) ? Number(v)||0 : v;
  });
  if (!valid) { alert('필수 항목을 입력해주세요.'); return; }

  // 교시 데이터 수집
  const periods = getPeriodRows();

  if (_editEffId) {
    const idx = EFF_DATA.findIndex(r => r.id === _editEffId);
    if (idx >= 0) EFF_DATA[idx] = { ...EFF_DATA[idx], ...vals, periods: periods.length ? periods : undefined };
  } else {
    const newId = Math.max(0, ...EFF_DATA.map(r=>r.id)) + 1;
    EFF_DATA.push({ id: newId, bldgKey, ...vals, periods: periods.length ? periods : undefined });
  }

  document.getElementById('effRowModal').classList.remove('open');
  initEffFilters();
  renderEffKPI();
  renderEffTable();
  showToast(_editEffId ? '수정되었습니다.' : '추가되었습니다.');
}

function toggleAllEffChk(checked) {
  document.querySelectorAll('.eff_row_chk').forEach(chk => chk.checked = checked);
}

function deleteSelectedEff() {
  const selected = [...document.querySelectorAll('.eff_row_chk:checked')].map(c => parseInt(c.dataset.id));
  if (!selected.length) { showToast('선택된 항목이 없습니다.', true); return; }
  if (!confirm(`선택한 ${selected.length}개를 삭제하시겠습니까?`)) return;
  EFF_DATA = EFF_DATA.filter(r => !selected.includes(r.id));

  showToast(`✓ ${selected.length}개 삭제 완료`);
}

function deleteAllEff() {
  if (!EFF_DATA.length) { showToast('데이터가 없습니다.', true); return; }
  if (!confirm(`전체 ${EFF_DATA.length}개를 모두 삭제하시겠습니까?`)) return;
  EFF_DATA = [];
  initEffFilters(); renderDeptKPI(); renderEffKPI(); renderEffTable();
  showToast('✓ 전체 삭제 완료');
}

// ── EFF_DATA localStorage 저장/복원
function saveEffData() {
  try {
    localStorage.setItem('effData', JSON.stringify(EFF_DATA));
    localStorage.setItem('effDataSavedAt', new Date().toISOString());
    showToast(`✓ ${EFF_DATA.length}개 데이터 저장 완료`);
    updateEffSaveStatus();
  } catch(e) {
    showToast('✗ 저장 실패: ' + (e.name==='QuotaExceededError'?'용량 초과':e.message), true);
  }
}

function loadEffData() {
  try {
    const saved = localStorage.getItem('effData');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length) {
        EFF_DATA = parsed;
        return true;
      }
    }
  } catch(e) {}
  return false;
}

function updateEffSaveStatus() {
  const el = document.getElementById('eff_save_status');
  if (!el) return;
  const savedAt = localStorage.getItem('effDataSavedAt');
  if (savedAt) {
    const d = new Date(savedAt);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    el.innerHTML = `마지막 저장: ${dateStr} · 현재 ${EFF_DATA.length}개 · <span style="color:#27500a">접속 시 자동 복원됩니다</span>`;
  } else {
    el.innerHTML = `△ 아직 저장된 데이터가 없습니다. 엑셀 업로드 후 <strong>저장</strong> 버튼을 눌러주세요.`;
  }
}

function deleteEffRow(id) {
  if (!confirm('이 데이터를 삭제하시겠습니까?')) return;
  EFF_DATA = EFF_DATA.filter(r => r.id !== id);
  initEffFilters();
  renderEffKPI();
  renderEffTable();
  showToast('삭제되었습니다.');
}

// ── 건물명+층수 → bldgKey 자동 매핑
function resolveBldgKey(building, floor) {
  const normalize = s => String(s||'').trim()
    .replace(/\s+/g,'')
    .replace(/빌딩|building/gi,'빌딩')
    .toLowerCase();
  const bStr = normalize(building);
  const fStr = normalize(floor);

  // BUILDINGS 전체에서 name 매칭
  for (const [id, b] of Object.entries(BUILDINGS)) {
    const bName = normalize(b.name||'');
    // 건물명 포함 + 층수 포함 둘 다 맞으면
    if (bName.includes(bStr) || bStr.includes(bName.replace(/\d+층/,''))) {
      if (!fStr || bName.includes(fStr) || (b.name||'').includes(floor)) {
        return id;
      }
    }
  }
  // 건물명만으로 매칭 (층수 무시)
  for (const [id, b] of Object.entries(BUILDINGS)) {
    const bName = normalize(b.name||'').replace(/\d+층/,'');
    if (bName.includes(bStr) && bStr.length > 2) return id;
  }
  return null; // 매핑 실패
}

function uploadEffExcel(input) {
  addAccessLog('엑셀 업로드');
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  const loadAndParse = () => {
    const XLSX = window.XLSX;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type:'array' });

        // 시트: 입력_데이터 (v4) 또는 구버전 강의실_기본정보 둘 다 지원
        const ws1 = wb.Sheets['입력_데이터'] || wb.Sheets['강의실_기본정보'];
        if (!ws1) { showToast('✗ "입력_데이터" 시트를 찾을 수 없습니다. 템플릿 v4를 사용해주세요.', true); return; }
        const raw1 = XLSX.utils.sheet_to_json(ws1, { header:1, defval:'', raw:false });

        // 헤더 행 찾기 (bldgKey 포함된 행)
        let hdrRow = -1;
        raw1.forEach((row, i) => {
          const r0 = String(row[0]||'').trim();
          const r1 = String(row[1]||'').trim();
          const r2 = String(row[2]||'').trim();
          // v4: 첫 컬럼이 region/지역
          if (r0 === 'region' || r0 === '지역' || r0.includes('region\n') || r0.includes('region')) {
            hdrRow = i; return;
          }
          // 구버전: bldgKey 포함
          if (r0.includes('bldgKey') || r0 === '건물키(bldgKey)') {
            hdrRow = i; return;
          }
          // 컬럼 조합으로 감지 (건물명+층수 or 관코드 등)
          if ((r1.includes('건물') || r1.includes('building')) &&
              (r2.includes('층') || r2.includes('floor'))) {
            hdrRow = i; return;
          }
        });
        if (hdrRow < 0) { showToast('✗ 헤더 행을 찾을 수 없습니다. 템플릿 형식을 확인해주세요.', true); return; }

        // 헤더 다음 행이 키행([region] 등)인지 확인해서 스킵 수 결정
        const nextRow = raw1[hdrRow + 1] ? String(raw1[hdrRow + 1][0]||'') : '';
        const isKeyRow = nextRow.startsWith('[') || nextRow.includes('BUILDINGS');
        // v4: 헤더+키행+안내행 = +3, 또는 헤더+안내행 = +2
        const guideRows = isKeyRow ? 2 : 1;  // 키행 있으면 2개, 없으면 1개 스킵
        const dataStart = hdrRow + 1 + guideRows;
        const rows1 = raw1.slice(dataStart).filter(r =>
          r[0] && String(r[0]).trim() && !String(r[0]).startsWith('△') && !String(r[0]).startsWith('[')
        );

        // 시트2: 교시별_수업정보 (선택)
        const ws2 = wb.Sheets['교시별_수업정보'];
        const periodMap = {}; // { rowId: [periods] }
        if (ws2) {
          const raw2 = XLSX.utils.sheet_to_json(ws2, { header:1, defval:'' });
          let hdr2 = -1;
          raw2.forEach((row, i) => { if (String(row[0]).includes('row_id') || row[0]==='기본정보 행번호(row_id)') hdr2 = i; });
          if (hdr2 >= 0) {
            raw2.slice(hdr2 + 2).filter(r => r[0] && !String(r[0]).startsWith('△')).forEach(r => {
              const rowId = parseInt(r[0]);
              if (isNaN(rowId)) return;
              if (!periodMap[rowId]) periodMap[rowId] = [];
              periodMap[rowId].push({
                campus:    String(r[1]||''),
                room:      String(r[2]||''),
                period_no: parseInt(r[3])||1,
                time:      String(r[4]||''),
                className: String(r[5]||''),
                students:  parseInt(r[6])||0,
                fee:       parseInt(r[7])||0,
              });
            });
          }
        }

        // EFF_DATA 생성
        const maxId = Math.max(0, ...EFF_DATA.map(r=>r.id));
        let addCount = 0, skipCount = 0;

        rows1.forEach((row, idx) => {
          const region     = String(row[0]||'').trim();
          const building   = String(row[1]||'').trim();
          const floor      = String(row[2]||'').trim();
          const dept       = String(row[3]||'').trim();
          const campus     = String(row[4]||'').trim();
          const room       = String(row[5]||'').trim();
          const spaceType  = String(row[6]||'A').trim();
          const maxCap     = parseInt(String(row[7]||'').replace(/,/g,''))||0;
          const area       = parseFloat(String(row[8]||'').replace(/,/g,''))||0;
          // v5: bldgKey(9), classKey(10), className(11), grade(12), teacher(13)
          //     classType(14), day(15), timeStart(16), timeEnd(17), duration(18)
          //     students(19), stdFee(20), ym(21)
          // v4: classKey(9), className(10), grade(11), teacher(12)
          //     day(13), timeStart(14), timeEnd(15), students(16), stdFee(17), ym(18)
          // v5: 22컬럼 (bldgKey자동+classKey+classType 포함)
          // v4: 20컬럼 (classKey+수업명+학년+강사명+요일+시작+종료+수강생+수강료+기준월)
          // 컬럼 수로 버전 판별 (v5=22, v4=20, 더 안전한 방법)
          const isV5 = row.length >= 21;
          const classKey   = String(row[isV5?10:9]||'').trim();
          const className  = String(row[isV5?11:10]||'').trim();
          const grade      = String(row[isV5?12:11]||'').trim();
          const teacher    = String(row[isV5?13:12]||'').trim();
          const classType  = isV5 ? String(row[14]||'').trim() : '';
          const day        = String(row[isV5?15:13]||'').trim();
          const timeStart  = String(row[isV5?16:14]||'').trim();
          const timeEnd    = String(row[isV5?17:15]||'').trim();
          // 숫자 파싱: raw:false 시 "320,000" 형식으로 오므로 쉼표 제거
          const parseNum = v => parseInt(String(v||'').replace(/,/g,''))||0;
          const parseFlt = v => parseFloat(String(v||'').replace(/,/g,''))||0;

          const students   = parseNum(row[isV5?19:16]);
          const stdFee     = parseNum(row[isV5?20:17]);
          const ym         = String(row[isV5?21:18]||'').trim();
          const memo       = '';
          // bldgKey 자동 매핑 (건물명+층수 기반)
          const bldgKey    = resolveBldgKey(building, floor) || 'unknown';

          if (!room || !campus) { skipCount++; return; }

          // 중복 체크: class_key + day 조합 (v4) 또는 bldgKey+campus+room (구버전)
          const dupKey = classKey
            ? EFF_DATA.find(r => r.classKey===classKey && r.day===day)
            : EFF_DATA.find(r => r.bldgKey===bldgKey && r.campus===campus && r.room===room && r.day===day);
          if (dupKey) { skipCount++; return; }

          EFF_DATA.push({
            id: maxId + addCount + 1,
            bldgKey,
            dept, campus, spaceType, room,
            area, maxCapacity: maxCap,
            curStudents: students, className, stdFee,
            classKey: classKey || `${bldgKey}_${room}_${campus}_${className}`,
            classType,  // v5: 수업구분 (1교시/2교시/특목 등, 고등은 빈칸)
            day, timeStart, timeEnd, grade, teacher, ym, memo,
          });
          addCount++;
        });

        initEffFilters();
        effFilter = { region:'', building:'', dept:'', campus:'', spaceType:'' };
        effFilterPending = { region:'', building:'', dept:'', campus:'', spaceType:'' };
        renderEffKPI();
        renderEffTable();
        showToast(`✓ 업로드 완료: ${addCount}개 추가, ${skipCount}개 건너뜀 | 저장 버튼을 눌러야 다음 접속 시 유지됩니다`);
        updateEffSaveStatus();
      } catch(err) {
        showToast('✗ 파일 파싱 오류: ' + err.message, true);
        console.error(err);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  if (!window.XLSX) {
    showToast('SheetJS 라이브러리 로드 중...', false);
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    script.onload = loadAndParse;
    document.head.appendChild(script);
  } else {
    loadAndParse();
  }
}

function exportEffExcel() {
  addAccessLog('강의실 데이터 다운로드');
  const data = getFilteredEff();
  const headers = ['지역','사업부','관코드','건물','층수','공간타입','호실','평수','최대수용','현재인원','수업명/반명','수용효율%','표준수강료','표준매출','발생매출(추정)','매출효율%'];
  const rows = data.map(r => {
    const capRate  = r.maxCapacity ? (r.curStudents/r.maxCapacity*100).toFixed(1) : 0;
    const stdSales = r.maxCapacity * r.stdFee;
    const curSales = r.curStudents * r.stdFee;
    return [r.region,r.dept,r.campus,r.building,r.floor,'임차'+r.spaceType,r.room,r.area,
            r.maxCapacity,r.curStudents,r.className,capRate+'%',r.stdFee,stdSales,curSales,capRate+'%'];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `강의실운영효율_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function renderCompare(b) {

  if (!prev || !b.allocation) return '';
  const cur = b.allocation;
  const pr  = prev.allocation;
  const campuses = Object.keys(cur);

  const diffClass = (c, p) => c > p ? 'diff-up' : c < p ? 'diff-dn' : 'diff-eq';
  const diffSign  = (c, p) => c > p ? '▲' : c < p ? '▼' : '–';

  const rows = campuses.map(camp => {
    const c = cur[camp]; const p = pr[camp] || { total:0 };
    const diff = c.total - p.total;
    return `
    <tr>
      <td><span class="badge ${b.campusColors[camp]}">${camp}</span></td>
      <td class="num">${fmt(p.total)}</td>
      <td class="num">${fmt(c.total)}</td>
      <td class="num ${diffClass(c.total, p.total)}">
        ${diffSign(c.total, p.total)} ${Math.abs(diff).toLocaleString()}원
      </td>
      <td class="num ${diffClass(c.total, p.total)}">
        ${p.total ? ((diff/p.total)*100).toFixed(1)+'%' : '-'}
      </td>
    </tr>`;
  }).join('');

  const detailRows = [
    ['B타입 유휴비용', prev.commons.idleB, b.commons.idleB],
    ['공용부 잔여금액', prev.commons.remainAmount, b.commons.remainAmount],
    ['공용부 합계(임차E 재원)', prev.commons.commonTotal, b.commons.commonTotal],
  ].map(([label, p, c]) => {
    const diff = c - p;
    return `
    <tr>
      <td style="color:var(--text-sub);font-size:12px">${label}</td>
      <td class="num">${fmt(p)}</td>
      <td class="num">${fmt(c)}</td>
      <td class="num ${diffClass(c,p)}">${diffSign(c,p)} ${Math.abs(diff).toLocaleString()}원</td>

  }).join('');

  return `
  <div class="card">
    <div class="card-title">전월/당월 비교 · ${prev.month} → 2026-04</div>
    <table style="margin-bottom:16px">
      <thead><tr>
        <th>캠퍼스</th>
        <th class="num">전월 (${prev.month})</th>
        <th class="num">당월 (2026-04)</th>
        <th class="num">증감액</th>
        <th class="num">증감률</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="font-size:11px;color:var(--text-sub);margin-bottom:8px;font-weight:700">공용부 세부 비교</div>
    <table>
      <thead><tr>
        <th>항목</th>
        <th class="num">전월</th>
        <th class="num">당월</th>
        <th class="num">증감</th>
      </tr></thead>
      <tbody>${detailRows}</tbody>
    </table>
    <div style="margin-top:10px;font-size:11px;color:var(--text-sub)">
      ※ 전월 데이터는 예시값입니다. 관리자 탭에서 실데이터 등록 시 자동 반영됩니다.

async function sendSidebarAI() {
  const input = document.getElementById('si_input');
  const q = input.value.trim();
  if (!q) return;
  if (!aiKey) { alert('API Key를 먼저 입력해주세요.'); return; }

  input.value = '';
  appendSIMsg('user', q);
  const loadingEl = appendSIMsg('ai', '◷ 분석 중...', 'loading');
  aiHistory.push({ role: 'user', content: q });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': aiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: buildAIContext(),
        messages: aiHistory,
      })
    });
    const data = await res.json();
    loadingEl.remove();
    if (data.error) {
      appendSIMsg('ai', '✗ ' + data.error.message);
      aiHistory.pop(); return;
    }
    const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
    aiHistory.push({ role: 'assistant', content: reply });
    appendSIMsg('ai', reply);
  } catch(e) {
    loadingEl.remove();
    appendSIMsg('ai', '✗ 연결 오류: ' + e.message);
    aiHistory.pop();
  }
}

function appendSIMsg(role, text, extra='') {
  const box = document.getElementById('si_messages');
  if (!box) return null;
  const el = document.createElement('div');
  el.className = 'si-msg ' + role + (extra ? ' ' + extra : '');
  el.textContent = text;
  box.appendChild(el);
  box.scrollTop = box.scrollHeight;
  return el;
}

function clearSidebarAI() {
  aiHistory = [];
  const box = document.getElementById('si_messages');
  if (!box) return;
  box.innerHTML = '<div class="si-msg ai">대화가 초기화되었습니다.</div>';
}

<script>

var grActiveBldg = 'b7';

function grRenderChips(){
  var box = document.getElementById('grChips'); if(!box) return;
  box.innerHTML = Object.keys(BUILDINGS).map(function(id){
    var b = BUILDINGS[id]; var on = id===grActiveBldg;
    return '<button onclick="grFlowRender(\'' + id + '\')" style="padding:5px 12px;border:1px solid '

function grFlowRender(id){
  grActiveBldg = id; grRenderChips();
  var b = BUILDINGS[id]; if(!b || !b.allocation) return;
  var camps = Object.keys(b.allocation).map(function(k){ return [k, b.allocation[k]]; });
  var W=920, H=Math.max(320, 80+camps.length*78);
  var svg = document.getElementById('grSvg'); if(!svg) return;
  svg.setAttribute('viewBox','0 0 '+W+' '+H);

  var tSum={A:0,B:0,E:0};
  camps.forEach(function(c){ var v=c[1]; tSum.A+=v.A||0; tSum.B+=v.B||0; tSum.E+=v.E||0; });
  var types=[['A',tSum.A,'#1d9e75'],['B',tSum.B,'#639922'],['E',tSum.E,'#378add']].filter(function(t){return t[1]>0;});
  var totA=camps.reduce(function(s,c){ var v=c[1]; return s+(v.A||0)+(v.B||0)+(v.E||0); },0) || 1;

  var bx=150, cx=W/2, tx=W-150, by=H/2;
  var cY=camps.map(function(_,i){ return 60+(H-120)*(camps.length===1?0.5:i/(camps.length-1)); });
  var tY=types.map(function(_,i){ return 80+(H-160)*(types.length===1?0.5:i/(types.length-1)); });
  var maxF=Math.max.apply(null, camps.map(function(c){ var v=c[1]; return (v.A||0)+(v.B||0)+(v.E||0); }).concat([1]));
  var w=function(a){ return Math.max(2, Math.min(26, a/maxF*26)); };
  var path=function(x1,y1,x2,y2){ var mx=(x1+x2)/2; return 'M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2; };

  g+='<text x="'+cx+'" y="26" text-anchor="middle" font-size="9.5" letter-spacing="2" font-weight="800" fill="#b4b2a9">CAMPUS</text>';
  g+='<text x="'+tx+'" y="26" text-anchor="middle" font-size="9.5" letter-spacing="2" font-weight="800" fill="#b4b2a9">TYPE</text>';
  // 엣지 건물→관
  camps.forEach(function(c,i){ var v=c[1]; var col=GR_PAL[i%GR_PAL.length]; var a=(v.A||0)+(v.B||0)+(v.E||0);
    g+='<path d="'+path(bx+62,by,cx-92,cY[i])+'" fill="none" stroke="'+col+'" stroke-width="'+w(a)+'" stroke-opacity=".30" stroke-linecap="round"/>'; });
  // 엣지 관→유형
  camps.forEach(function(c,i){ var v=c[1]; var col=GR_PAL[i%GR_PAL.length];
    [['A',v.A||0],['B',v.B||0],['E',v.E||0]].forEach(function(t){ if(t[1]<=0) return;
      var ti=-1; types.forEach(function(tt,j){ if(tt[0]===t[0]) ti=j; }); if(ti<0) return;
      g+='<path d="'+path(cx+92,cY[i],tx-58,tY[ti])+'" fill="none" stroke="'+col+'" stroke-width="'+w(t[1])+'" stroke-opacity=".22" stroke-linecap="round"/>'; }); });
  // 건물 노드
  g+='<g><rect x="'+(bx-62)+'" y="'+(by-26)+'" width="124" height="52" rx="8" fill="#ffffff" stroke="#639922" stroke-width="1.5"/>'
    +'<text x="'+bx+'" y="'+(by-4)+'" text-anchor="middle" fill="#2c2c2a" font-size="13" font-weight="800" font-family="Pretendard">'+b.name+'</text>'
    +'<text x="'+bx+'" y="'+(by+15)+'" text-anchor="middle" fill="#1a1a1a" font-size="11" font-family="JetBrains Mono" font-weight="700">'+grWon(b.rent)+'원</text></g>';
  // 관 노드
  camps.forEach(function(c,i){ var nm=c[0], v=c[1]; var col=GR_PAL[i%GR_PAL.length]; var a=(v.A||0)+(v.B||0)+(v.E||0); var pct=(a/totA*100).toFixed(0);
    g+='<g><circle cx="'+cx+'" cy="'+cY[i]+'" r="7" fill="'+col+'"/><circle cx="'+cx+'" cy="'+cY[i]+'" r="13" fill="none" stroke="'+col+'" stroke-opacity=".3" stroke-width="2"/>'
      +'<rect x="'+(cx-88)+'" y="'+(cY[i]-16)+'" width="76" height="32" rx="6" fill="#ffffff" stroke="'+col+'" stroke-width="1.2" stroke-opacity=".6"/>'
      +'<text x="'+(cx-50)+'" y="'+(cY[i]-2)+'" text-anchor="middle" fill="#2c2c2a" font-size="11.5" font-weight="800" font-family="Pretendard">'+nm+'</text>'

  // 유형 노드
  var tNm={A:'임차A',B:'임차B',E:'임차E'}, tDe={A:'전용',B:'공유',E:'공용부'};
  types.forEach(function(t,i){ var col=t[2];

function occBldgName(r){
  if(r.building) return String(r.building).trim();
  if(typeof BUILDINGS!=='undefined' && r.bldgKey && BUILDINGS[r.bldgKey]) return (BUILDINGS[r.bldgKey].name||'').replace(/\s*\d+층\s*/,'').trim();

function occMasterRooms(dp){ return ROOM_MASTER.filter(function(m){return m[2]===dp;}); }
/* 그 사업부·요일의 미가동 호실 = 배정 마스터 − 그 요일 가동(건물명+호실) */
function occIdleRooms(dp, dayKr){
  var used={};
  occData().filter(function(r){return r.dept===dp && r.day===dayKr;}).forEach(function(r){ used[occBldgName(r)+'|'+String(r.room||'').trim()]=1; });
  return occMasterRooms(dp).filter(function(m){ return !used[m[0]+'|'+m[1]]; }).map(function(m){return {b:m[0],room:m[1]};});
}
/* 사업부 미가동 패턴 → 활용 제안 */
function occIdleSuggest(dp){
  var WD=['월','화','수','목','금'], byDay={};
  occDays().forEach(function(d){ byDay[d]=occIdleRooms(dp,d); });
  var roomDays={}; WD.forEach(function(d){ byDay[d].forEach(function(r){ var k=r.b+' '+r.room; (roomDays[k]=roomDays[k]||[]).push(d); }); });
  var always=Object.keys(roomDays).filter(function(k){ return roomDays[k].length>=5; });
  var wd=WD.map(function(d){return {d:d,n:byDay[d].length};}).sort(function(a,b){return b.n-a.n;});
  var tips=[];
  if(always.length) tips.push('<b>'+always.length+'개 호실</b>이 평일(월~금) 내내 비어 있습니다 ('+always.slice(0,4).join(', ')+(always.length>4?' 외':'')+') → <b>신규 정규반 개설 1순위</b> 후보.');
  var top2=wd.slice(0,2).filter(function(x){return x.n>0;});
  if(top2.length===2 && top2[1].n>=2) tips.push('<b>'+top2[0].d+'·'+top2[1].d+'요일</b>에 미가동 집중(각 '+top2[0].n+'·'+top2[1].n+'개) → 이 두 요일로 <b>주2회 수업/특강</b> 개설 검토.');
  else if(top2[0] && top2[0].n>=2) tips.push('<b>'+top2[0].d+'요일</b> 미가동 최다('+top2[0].n+'개) → 해당 요일 보충·특강 우선 배치.');
  var sat=(byDay['토']||[]).length, sun=(byDay['일']||[]).length;
  if(sat+sun>0) tips.push('주말 미가동(토 '+sat+'·일 '+sun+'개) → 주말 단과/특강 또는 자습실 전환 여지.');
  if(!tips.length) tips.push('✓ 평일 미가동이 거의 없습니다. 현재 배정이 효율적으로 운영되고 있습니다.');
  return tips;
}

/* 주간 전체: 호실별 미가동 요일 맵 (미가동 일수 많은 순) */
function occWeekRoomMap(dept){
  var map={};
  occDays().forEach(function(d){ occIdleRooms(dept,d).forEach(function(r){ var k=r.b+'|'+r.room; if(!map[k])map[k]={b:r.b,room:r.room,days:[]}; map[k].days.push(d); }); });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.days.length-a.days.length;});
}

function occData(){ return window._occAllData || []; }
function occRoomKey(r){ return (r.bldgKey||'')+'::'+(r.room||''); }
function occUniq(a){ var s={},o=[]; a.forEach(function(v){ if(!s[v]){s[v]=1;o.push(v);} }); return o; }
function occDays(){ return (typeof DAYS_KR!=='undefined') ? DAYS_KR : ['월','화','수','목','금','토','일']; }
function occDepts(){
  return occUniq(occData().map(function(r){return r.dept;}).filter(Boolean))
    .filter(function(d){ return (typeof DEPT_ALLOC==='undefined') || DEPT_ALLOC[d]; })
    .sort(function(a,b){ var ai=DEPT_ORDER_C.indexOf(a),bi=DEPT_ORDER_C.indexOf(b); return (ai<0?99:ai)-(bi<0?99:bi); });
}
function occSafeToMin(t){
  if(!t && t!==0) return 0; var raw=String(t).trim();
  if(/^0\.\d+$/.test(raw)) return Math.round(parseFloat(raw)*24*60);
  var s=raw.replace(/오전|오후|분/g,'').replace(/시(?=\d|:|$)/g,':').replace(/시$/g,':00').trim();
  var p=s.replace(/[~\-]/g,':').split(':'); return (parseInt(p[0])||0)*60+(parseInt(p[1])||0);
}
function occClassStudents(r){
  if(typeof calcEffStats==='function'){ try{ return calcEffStats(r).totalStudents||0; }catch(e){} }
  if(r.periods && r.periods.length) return r.periods.reduce(function(s,p){return s+(p.students||0);},0);
  return r.curStudents||0;
}
function occDayCount(dp){
  var data=occData(), DAYS=occDays();
  return DAYS.map(function(d){
    var rows=data.filter(function(r){ return (dp==='전체'||r.dept===dp) && r.day===d; });
    var seen={}, sum=0;
    rows.forEach(function(r){
      var ck=(r.classKey||((r.bldgKey||'')+'_'+(r.room||'')+'_'+(r.campus||'')+'_'+(r.className||'')))+'@'+d;
      if(seen[ck]) return; seen[ck]=1; sum+=occClassStudents(r);
    });
    return sum;
  });
}
/* 요일 데이터: 사업부별 [{label,rate,count}] · metric:'room'|'time' */
function occDayData(filterDept, metric){
  var data=occData(), DAYS=occDays();
  var deps = (filterDept==='전체'||!filterDept) ? occDepts() : [filterDept];
  return deps.map(function(dp){
    var deptRows=data.filter(function(r){return r.dept===dp;});
    var tot=(typeof DEPT_ALLOC!=='undefined'&&DEPT_ALLOC[dp])?DEPT_ALLOC[dp].rooms:(occUniq(deptRows.map(occRoomKey)).length||1);
    var cnt=occDayCount(dp);
    var days=DAYS.map(function(d,i){
      var used=occUniq(deptRows.filter(function(r){return r.day===d;}).map(occRoomKey)).length;
      var rate;
      if(metric==='time'){
        var rows=deptRows.filter(function(r){return r.day===d;});
        var occSum=0;
        for(var h=9;h<22;h++){
          var hh=h*60, set={};
          rows.forEach(function(r){ var st=occSafeToMin(r.timeStart),en=occSafeToMin(r.timeEnd);
            if(!st||!en||en<=st) return; if(hh>=st&&hh<en) set[occRoomKey(r)]=1; });
          occSum+=Object.keys(set).length;
        }
        rate=occSum/(tot*13)*100;
      } else {
        rate=used/tot*100;
      }
      return { label:d+'요일', rate:rate, count:cnt[i], used:used, idle:Math.max(0,tot-used) };
    });
    return { name:dp, color:DEPT_COLOR[dp]||'#9aa6c0', days:days, alloc:tot };
  });
}
/* 시간대 시리즈 (가동률만) */
function occTimeSeries(kind){
  var data=occData(), ORDER=['1교시','2교시','3교시','특목','성대경시'];
  return occDepts().map(function(dp){
    var f=data.filter(function(r){return r.dept===dp;});
    var tot=((typeof DEPT_ALLOC!=='undefined'&&DEPT_ALLOC[dp])?DEPT_ALLOC[dp].rooms:occUniq(f.map(occRoomKey)).length)||1, pts=[];
    if(kind==='period'){
      var withType=f.filter(function(r){return r.classType&&String(r.classType).trim();});
      var stats={}; withType.forEach(function(r){ var t=String(r.classType).trim(); (stats[t]=stats[t]||[]).push(occRoomKey(r)); });
      var types=Object.keys(stats).sort(function(a,b){ var ai=ORDER.indexOf(a),bi=ORDER.indexOf(b); return (ai<0?99:ai)-(bi<0?99:bi); });
      pts=types.map(function(t){ return { label:t, value:occUniq(stats[t]).length/tot*100 }; });
    } else {
      var without=f.filter(function(r){return !r.classType||!String(r.classType).trim();});
      var slots={}; for(var h=9;h<22;h++) slots[(h<10?'0'+h:''+h)+':00']=[];
      without.forEach(function(r){ var st=occSafeToMin(r.timeStart),en=occSafeToMin(r.timeEnd);
        if(!st&&!en)return; if(en<=st)return; var rk=occRoomKey(r);
        Object.keys(slots).forEach(function(slot){ var sh=parseInt(slot)*60; if(sh>=st&&sh<en) slots[slot].push(rk); }); });
      pts=Object.keys(slots).filter(function(s){return slots[s].length>0;}).map(function(s){ return { label:s, value:occUniq(slots[s]).length/tot*100 }; });
    }
    return { name:dp, color:DEPT_COLOR[dp]||'#9aa6c0', points:pts };
  }).filter(function(s){return s.points.length>0;});
}

/* 요일 전체: 가동률 실선 멀티 + 인원 점선 멀티 (이중축) */
function occMultiDayChart(data){
  data=(data||[]).filter(function(d){return d.days&&d.days.length;});
  if(!data.length) return '<div style="padding:24px;text-align:center;color:var(--text-sub);font-size:12px">데이터 없음</div>';
  var labels=data[0].days.map(function(d){return d.label;}), n=labels.length;
  var allC=[]; data.forEach(function(d){ d.days.forEach(function(x){ allC.push(x.count||0); }); });
  var nice=Math.max(10,Math.ceil(Math.max.apply(null,allC.concat([1]))/50)*50);
  var W=580,H=250,padL=40,padR=52,padT=22,padB=34;
  var x=function(i){return padL+(W-padL-padR)*(n===1?0.5:i/(n-1));};
  var yR=function(v){return padT+(H-padT-padB)*(1-Math.min(100,Math.max(0,v))/100);};
  var yC=function(v){return padT+(H-padT-padB)*(1-Math.min(nice,Math.max(0,v))/nice);};
  var baseY=H-padB, topY=padT;
  var inner=occGrid(yR,W,padL,padR)+occAxisR(W,padR,topY,baseY,nice);
  inner+='<text x="'+(padL-7)+'" y="13" text-anchor="end" font-size="8.5" fill="#b4b2a9">%</text>';
  // 인원 점선
  data.forEach(function(dp,si){
    var _cc=occCnt(dp.name);
    inner+='<path class="occ-dash" style="animation-delay:'+(0.3+si*0.12).toFixed(2)+'s" d="M'+dp.days.map(function(d,i){return x(i)+','+yC(d.count);}).join(' L')+'" fill="none" stroke="'+_cc+'" stroke-width="2" stroke-linecap="round"/>';
    dp.days.forEach(function(d,i){ inner+=occNode(x(i),yC(d.count),d.count+'명',_cc,0.4+si*0.12+i*0.03,false); });
  });
  // 가동률 실선
  data.forEach(function(dp,si){
    inner+='<path class="occ-line" style="animation-delay:'+(si*0.16).toFixed(2)+'s;filter:drop-shadow(0 0 3px '+dp.color+'55)" d="M'+dp.days.map(function(d,i){return x(i)+','+yR(d.rate);}).join(' L')+'" fill="none" stroke="'+dp.color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';
    dp.days.forEach(function(d,i){ inner+=occNode(x(i),yR(d.rate),d.rate.toFixed(1)+'%',dp.color,0.5+si*0.16+i*0.03,false); });
  });
  labels.forEach(function(lb,i){ inner+='<text x="'+x(i)+'" y="'+(H-12)+'" text-anchor="middle" font-size="10.5" fill="#5f5e5a" font-family="Pretendard">'+lb+'</text>'; });
  return '<svg class="occ-chart" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;overflow:visible;display:block">'+inner+'</svg>'+occLegend(data,true);
}

/* 요일 개별: 가동률 실선 + 인원 점선 (이중축) */
function occComboDayChart(d){
  if(!d||!d.days||!d.days.length) return '<div style="padding:24px;text-align:center;color:var(--text-sub);font-size:12px">데이터 없음</div>';
  var items=d.days, color=d.color, n=items.length;
  var _cc=occCnt(d.name);
  var nice=Math.max(10,Math.ceil(Math.max.apply(null,items.map(function(it){return it.count||0;}).concat([1]))/10)*10);
  var W=580,H=232,padL=40,padR=52,padT=24,padB=34;
  var x=function(i){return padL+(W-padL-padR)*(n===1?0.5:i/(n-1));};
  var yR=function(v){return padT+(H-padT-padB)*(1-Math.min(100,Math.max(0,v))/100);};
  var yC=function(v){return padT+(H-padT-padB)*(1-Math.min(nice,Math.max(0,v))/nice);};
  var baseY=H-padB, topY=padT;
  var inner=occGrid(yR,W,padL,padR)+occAxisR(W,padR,topY,baseY,nice);
  inner+='<text x="'+(padL-7)+'" y="14" text-anchor="end" font-size="8.5" fill="#b4b2a9">%</text>';
  inner+='<path class="occ-dash" d="M'+items.map(function(it,i){return x(i)+','+yC(it.count);}).join(' L')+'" fill="none" stroke="'+_cc+'" stroke-width="2.2" stroke-linecap="round"/>';
  items.forEach(function(it,i){ var ry=yR(it.rate),cy=yC(it.count); inner+=occNode(x(i),cy,it.count+'명',_cc,0.4+i*0.06,true,(ry<=cy?'down':'up')); });
  inner+='<path class="occ-line" style="filter:drop-shadow(0 0 4px '+color+'66)" d="M'+items.map(function(it,i){return x(i)+','+yR(it.rate);}).join(' L')+'" fill="none" stroke="'+color+'" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>';
  items.forEach(function(it,i){ var ry=yR(it.rate),cy=yC(it.count); inner+=occNode(x(i),ry,it.rate.toFixed(1)+'%',color,0.5+i*0.06,true,(ry<=cy?'up':'down')); });
  items.forEach(function(it,i){ inner+='<text x="'+x(i)+'" y="'+(H-9)+'" text-anchor="middle" font-size="10.5" fill="#5f5e5a" font-family="Pretendard">'+it.label+'</text>'; });
  var leg='<div style="display:flex;gap:16px;justify-content:center;margin-top:2px;font-size:11px;color:var(--text-sub);font-weight:700">'
    +'<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:16px;height:3px;border-radius:2px;background:'+color+';display:inline-block"></span>가동률(%)</span>'
    +'<span style="display:inline-flex;align-items:center;gap:6px"><svg width="18" height="4"><line x1="0" y1="2" x2="18" y2="2" stroke="'+_cc+'" stroke-width="2" stroke-dasharray="4 3"/></svg>현재인원(명)</span></div>';
  return '<svg class="occ-chart" viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;overflow:visible;display:block">'+inner+'</svg>'+leg;
}

function occLegend(series, withBar){
  var items=series.map(function(s){ var c=s.color, nm=(s.name||'').replace('사업부','');
    return '<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-sub);font-weight:700"><span style="width:16px;height:3px;border-radius:2px;background:'+c+';display:inline-block"></span>'+nm+'</span>'; }).join('');
  if(withBar) items+='<span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-sub);font-weight:700;margin-left:6px;padding-left:12px;border-left:1px solid var(--border)"><svg width="34" height="6"><line x1="0" y1="3" x2="15" y2="3" stroke="#888780" stroke-width="2"/><line x1="19" y1="3" x2="34" y2="3" stroke="#888780" stroke-width="2" stroke-dasharray="4 3"/></svg>실선=가동률 · 점선=인원</span>';
  return '<div style="display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:4px">'+items+'</div>';
}

/* 하단 요약표 */
function occDayTable(data){
  if(!data||!data.length) return '';
  var DAYS=data[0].days.map(function(d){return d.label.replace('요일','');});
  var head='<tr><th style="text-align:left">사업부</th><th>배정</th>'+DAYS.map(function(d){return '<th>'+d+'</th>';}).join('')+'<th>주간</th></tr>';
  var body=data.map(function(dp,ri){
    var sum=dp.days.reduce(function(s,d){return s+d.count;},0);
    var avg=(dp.days.reduce(function(s,d){return s+d.rate;},0)/dp.days.length).toFixed(1);
    var avgIdle=Math.round(dp.days.reduce(function(s,d){return s+d.idle;},0)/dp.days.length);
    var cells=dp.days.map(function(d){
      var mc = d.idle>0 ? 'm' : 'm0';
      var ms = d.idle>0
        ? '<span class="'+mc+' occ-idle-clk" onclick="occShowIdle(\''+dp.name+'\',\''+d.label+'\')">미가동 '+d.idle+'</span>'
        : '<span class="'+mc+'">미가동 '+d.idle+'</span>';
      return '<td><span class="r">'+d.rate.toFixed(1)+'%</span>'+ms+'<span class="c">'+d.count+'명</span></td>';
    }).join('');
    return '<tr style="animation-delay:'+(ri*0.08).toFixed(2)+'s">'
      +'<td class="dp" style="color:'+dp.color+'">● '+dp.name.replace('사업부','')+'</td>'
      +'<td class="alloc">'+dp.alloc+'개</td>'
      +cells
      +'<td><span class="r">'+avg+'%</span><span class="m occ-idle-clk" onclick="occShowWeek(\''+dp.name+'\')">평균 '+avgIdle+'</span><span class="c">'+sum+'명</span></td></tr>';
  }).join('');
  return '<div class="occ-tbl-wrap"><table class="occ-tbl"><thead>'+head+'</thead><tbody>'+body+'</tbody></table>'
    +'<div class="occ-tbl-cap">배정 = 사업부 배정 강의실 수 · 셀: 가동률 / 미가동(노는 강의실) / 현재인원</div></div>';
}

function occActiveDept(tabsId){
  var tabs=document.getElementById(tabsId); if(!tabs) return null;
  var btns=[].slice.call(tabs.querySelectorAll('button'));
  for(var i=0;i<btns.length;i++){ var bg=getComputedStyle(btns[i]).backgroundColor;
    if(bg && bg!=='rgba(0, 0, 0, 0)' && bg!=='transparent') return btns[i].textContent.trim(); }
  return null;
}

var _occSec='font-size:12px;font-weight:800;color:var(--text-sub);margin:10px 0 2px;letter-spacing:.5px';

function occTranscode(cid){
  var c=document.getElementById(cid); if(!c) return;

  // 요일별: window._occAllData 직접 사용 (토글/탭에 반응, barRow 불필요)
  if(cid==='occ_day_chart'){
    if(!occData().length) return;
    var dep=occActiveDept('occ_day_dept_tabs')||'전체';
    var sig=dep+'|room|'+occData().length;
    if(c._occSig===sig && c.querySelector('.occ-chart')) return;
    c._occSig=sig;
    var ddata=occDayData(dep, 'room');
    var chart=(dep==='전체') ? occMultiDayChart(ddata) : occComboDayChart(ddata[0]);
    c.innerHTML = chart + occDayTable(ddata);
    return;
  }

  var target=(cid==='occ_time_chart') ? document.getElementById('occ_time_content') : c;
  if(!target) return;
  var rows=[].slice.call(target.querySelectorAll('.occ-bar-row[data-pct]'));
  if(!rows.length) return;
  var toItem=function(r){ return { label:r.getAttribute('data-label'), value:parseFloat(r.getAttribute('data-pct'))||0 }; };

  if(cid==='occ_time_chart'){
    if(occActiveDept('occ_time_dept_tabs')==='전체'){
      var html='', ps=occTimeSeries('period'), ss=occTimeSeries('slot');
      if(ps.length) html+='<div style="'+_occSec+'">교시별</div>'+occMultiChart(ps);
      if(ss.length) html+='<div style="'+_occSec+'">시간대별</div>'+occMultiChart(ss);
      target.innerHTML=html||'<div style="padding:24px;text-align:center;color:var(--text-sub);font-size:12px">데이터 없음</div>'; return;
    }
    var order=[],bucket={};
    rows.forEach(function(r){ var col=r.getAttribute('data-color')||'#378add'; if(!bucket[col]){bucket[col]=[];order.push(col);} bucket[col].push(r); });
    var h2='';
    order.forEach(function(col){ var items=bucket[col].map(toItem);
      var nm=col==='#639922'?'교시별':col==='#b5651d'?'시간대별':''; var cc=col==='#639922'?'#888780':'#378add';
      h2+=(nm?'<div style="'+_occSec+'">'+nm+'</div>':'')+occAreaChart(items,cc); });
    target.innerHTML=h2; return;
  }
  target.innerHTML=occDeptBars(rows.map(function(r){return {label:r.getAttribute('data-label'),value:parseFloat(r.getAttribute('data-pct'))||0};}));
}

function occBoot(){
  ['occ_day_chart','occ_dept_chart','occ_time_chart'].forEach(function(cid){
    var c=document.getElementById(cid); if(!c) return;
    if(!c._occObs){ c._occObs=new MutationObserver(function(){ occTranscode(cid); }); c._occObs.observe(c,{childList:true,subtree:true}); }
    occTranscode(cid);
  });
}
document.addEventListener('click', function(){ setTimeout(occBoot, 90); });
document.addEventListener('click', function(e){
  var c=(e.target && e.target.closest)?e.target.closest('.occ-hcell'):null;
  if(c && c.getAttribute('data-room')) occShowHeatCell(c.getAttribute('data-bld'), c.getAttribute('data-room'), c.getAttribute('data-day'));
});

</script>

// 실제 데이터 쌓이면 이 mock을 Supabase 조회로 교체
function genTSeries(room, curOcc){
  // 호실 ID로 시드 고정(새로고침해도 동일 추세)
  var seed=0; for(var i=0;i<room.length;i++) seed=(seed*31+room.charCodeAt(i))%9973;
  function rnd(n){ seed=(seed*1103515245+12345)&0x7fffffff; return (seed/0x7fffffff)*n; }
  var months=['2025-04','2025-05','2025-06','2025-07','2025-08','2025-09','2025-10','2025-11','2025-12','2026-01','2026-02','2026-03','2026-04'];
  // 추세 유형: 하락·회복·안정 중 하나(시드로 결정)
  var trendType = Math.floor(rnd(3)); // 0=하락 1=회복 2=안정
  var swing = 12 + rnd(14); // 1년간 변동폭
  var arr=[];
  for(var m=0;m<13;m++){
    var t=m/12; // 0~1
    var base;
    if(trendType===0){ base = curOcc + (1-t)*swing; }      // 하락: 과거 높음→현재 낮음
    else if(trendType===1){ base = curOcc - (1-t)*swing; } // 회복: 과거 낮음→현재 높음
    else { base = curOcc + (rnd(10)-5); }                   // 안정: 현재 근처 진동
    var noise = rnd(5)-2.5; // 월별 미세 변동
    var occ=Math.max(8,Math.min(98,Math.round(base+noise))); // 8~98% 범위로 클램프
    if(m===12) occ=curOcc; // 마지막달=실제 현재값 고정
    arr.push({ym:months[m],occ:occ});
  }
  return arr;
}

const AE={
  stats(){
    const s={};
    ['초등','중등','고등'].forEach(d=>{
      const rs=ROOMS.filter(r=>r.dept===d);
      s[d]={avg:rs.reduce((a,r)=>a+r.occ,0)/rs.length};
    });
    return s;
  },
  detect(r,s){
    const flags=[];
    const ds=s[r.dept], rr=r.std>0?r.cur/r.std:0, dev=ds.avg-r.occ;
    if(r.occ<30) flags.push({t:'danger',code:'OCC_CRITICAL',msg:`가동률 ${r.occ}% — 위험 임계치 미달`});
    else if(r.occ<50) flags.push({t:'warn',code:'OCC_낮음',msg:`가동률 ${r.occ}% — 주의 구간`});
    if(dev>=thDanger) flags.push({t:'danger',code:'DEPT_DEV',msg:`사업부 평균(${Math.round(ds.avg)}%) 대비 ${Math.round(dev)}%p 이탈`});
    else if(dev>=thWarn) flags.push({t:'warn',code:'DEPT_WARN',msg:`사업부 평균 대비 ${Math.round(dev)}%p 낮음`});
    if(r.occ>70&&rr<0.5) flags.push({t:'warn',code:'REV_INV',msg:`가동률 ${r.occ}%인데 달성률 ${Math.round(rr*100)}%`});
    if(rr<0.35&&r.std>0) flags.push({t:'danger',code:'REV_CRIT',msg:`매출달성률 ${Math.round(rr*100)}% — 심각`});
    const mis=r.free.filter(d=>DEPTP[r.dept].days.includes(d)).length;
    if(mis>=3) flags.push({t:'warn',code:'DAY_MIS',msg:`선호요일 중 ${mis}일 공실`});
    return {grade:flags.some(f=>f.t==='danger')?'danger':flags.some(f=>f.t==='warn')?'warn':'ok',flags};
  },
  ts(roomId,mode){
    const d=TS.mock[roomId], min=TS.minReq[mode];
    if(!d||d.length<min) return {status:'pending',cur:d?d.length:0,min};
    const sorted=[...d].sort((a,b)=>a.ym.localeCompare(b.ym));
    const latest=sorted[sorted.length-1];
    if(mode==='mom'){
      const prev=sorted[sorted.length-2];
      const delta=latest.occ-prev.occ;
      return {status:'active',delta,grade:delta<=-thDanger?'danger':delta<=-thWarn?'warn':'ok',msg:`MoM ${delta>0?'+':''}${delta}%p`,series:sorted.slice(-6),latest:latest.occ};
    }
    if(mode==='ma3'){
      const ma=Math.round(sorted.slice(-3).reduce((a,x)=>a+x.occ,0)/3);
      const delta=latest.occ-ma;
      return {status:'active',delta,grade:delta<=-thDanger?'danger':delta<=-thWarn?'warn':'ok',msg:`3MA(${ma}%) 대비 ${delta>0?'+':''}${delta}%p`,series:sorted.slice(-6),latest:latest.occ,ma3:ma};
    }
    if(mode==='yoy'){
      const prevYear=sorted[sorted.length-13];
      const delta=latest.occ-prevYear.occ;
      return {status:'active',delta,grade:delta<=-thDanger?'danger':delta<=-thWarn?'warn':'ok',msg:`전년동월(${prevYear.occ}%) 대비 ${delta>0?'+':''}${delta}%p`,series:sorted,latest:latest.occ,prevYear:prevYear.occ};
    }
    return {status:'pending',cur:0,min:13};
  }
};

function opsAggRooms(rows){
  const bl=rows.filter(function(r){return r.room;});   // ⓐ 수지캠퍼스 전 건물
  if(!bl.length) return null;
  const ymCnt={}; bl.forEach(function(r){ if(r.ym) ymCnt[r.ym]=(ymCnt[r.ym]||0)+1; });
  const ym=Object.keys(ymCnt).sort(function(a,b){return ymCnt[b]-ymCnt[a]||b.localeCompare(a);})[0]||'';
  const byRoom={};
  bl.filter(function(r){return r.ym===ym;}).forEach(function(r){
    const room=String(r.room||''); if(!room) return;
    const bldg=String(r.building||'').trim()||'(미지정)';
    const bk=bldg+'|'+room;                              // 건물+호실 복합키 (건물 간 호실번호 충돌 방지)
    if(!byRoom[bk]) byRoom[bk]={room:room,building:bldg,region:String(r.region||'').trim(),dept:String(r.dept||'').replace('사업부',''),
      floor:(parseInt((String(r.floor||'').match(/\d+/)||['0'])[0])||0),days:[],cls:{}};
    const g=byRoom[bk];
    if(r.day) g.days.push(r.day);
    const ck=r.class_key||(room+'_'+(r.class_name||r.time_start||''));
    if(!g.cls[ck]) g.cls[ck]={cap:+r.max_capacity||0,stu:+r.students||0,fee:+r.fee_monthly||0};
  });
  const arr=Object.keys(byRoom).map(function(bk){
    const g=byRoom[bk]; const cs=Object.keys(g.cls).map(function(x){return g.cls[x];});
    const busy=[...new Set(g.days)];
    return {room:g.room,building:g.building,region:g.region,key:g.building+'·'+g.room,dept:g.dept,
      cap:cs.reduce(function(m,c){return Math.max(m,c.cap);},0),
      busy:busy,free:_WK.filter(function(d){return busy.indexOf(d)<0;}),
      occ:Math.round(busy.length/7*100),
      cur:cs.reduce(function(s,c){return s+c.stu*c.fee;},0),
      std:cs.reduce(function(s,c){return s+c.cap*c.fee;},0),
      cls:cs.length,floor:g.floor};
  });
  arr._ym=ym;            // 사용 기준월(행 최다)
  return arr;
}
